<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영작 학습관</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
--card: #ffffff;
--line: #e5e7eb;
--text: #1f2937;
--muted: #6b7280;
--blue: #4f8cff;
--green: #4caf50;
--orange: #ff9800;
--shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
}

html, body {
margin: 0;
padding: 0;
height: 100%;
font-family: Arial, sans-serif;
background: linear-gradient(180deg, #eff5ff 0%, #f4f7fb 35%, #eef8f1 100%);
color: var(--text);
}

body { display: flex; }

.wrap {
width: 100%;
max-width: 1100px;
margin: 0 auto;
padding: 20px;
min-height: 100vh;
}

.topbar,
.panel-head,
.quiz-head {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
flex-wrap: wrap;
}

.topbar { margin-bottom: 18px; }

.title-box {
  display: flex;
  align-items: center;
  gap: 100px;
}

.title-box h1 {
  margin: 0;
  font-size: 30px;
  font-weight: 800;
}

.btns {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

button,
select,
input {
border: none;
border-radius: 14px;
font-size: 14px;
font-weight: 700;
}

button { cursor: pointer; }

.btn-light {
background: #fff;
color: #334155;
border: 1px solid var(--line);
padding: 11px 16px;
}

.summary-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
gap: 12px;
margin-bottom: 18px;
}

.summary-card,
.panel {
background: var(--card);
border-radius: 24px;
box-shadow: var(--shadow);
}

.summary-card { padding: 18px; }

.summary-card .label {
color: var(--muted);
font-size: 13px;
margin-bottom: 8px;
}

.summary-card .value {
font-size: 28px;
font-weight: 800;
}

.panel {
padding: 18px;
margin-bottom: 18px;
}

.panel-head p {
margin: 6px 0 0;
color: var(--muted);
font-size: 13px;
}

.filter-grid,
.unit-grid {
display: grid;
gap: 12px;
}

.filter-grid {
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.filter-card {
background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
border: 1px solid var(--line);
border-radius: 18px;
padding: 16px;
}

.filter-card label {
display: block;
font-size: 12px;
color: var(--muted);
margin-bottom: 8px;
font-weight: 800;
}

.filter-card select {
width: 100%;
height: 46px;
border: 1px solid var(--line);
background: #fff;
padding: 0 12px;
}

.unit-grid {
grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
}

.unit-card {
border: 1px solid var(--line);
background: linear-gradient(180deg, #fff 0%, #fbfdff 100%);
border-radius: 18px;
padding: 16px;
min-height: 160px;
display: flex;
flex-direction: column;
justify-content: space-between;
cursor: pointer;
}

.badge {
display: inline-flex;
width: max-content;
padding: 6px 10px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
background: #eef4ff;
color: #335ea8;
margin-bottom: 10px;
}

.unit-title {
font-size: 18px;
font-weight: 800;
margin-bottom: 10px;
}

.meta {
color: var(--muted);
font-size: 12px;
line-height: 1.6;
}

#stageView,
#gameView {
display: none;
}

.grid-container {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
gap: 12px;
}

.stage-btn {
aspect-ratio: 1;
font-size: 18px;
border-radius: 18px;
font-weight: 800;
}

.stage-unlocked {
background: linear-gradient(180deg, #5aa6ff 0%, #4f8cff 100%);
color: white;
}

.stage-locked {
background: #e5e7eb;
color: #9ca3af;
}

.stage-complete {
background: linear-gradient(180deg, #5fc776 0%, #4caf50 100%);
color: white;
}

.progress-pill {
display: inline-flex;
align-items: center;
background: #eef4ff;
color: #2f5da8;
border-radius: 999px;
padding: 8px 12px;
font-size: 13px;
font-weight: 700;
}

.progress-bar-wrap {
width: 100%;
height: 10px;
background: #e5e7eb;
border-radius: 999px;
overflow: hidden;
margin-bottom: 18px;
}

.progress-bar {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #4f8cff, #6fcf97);
}

.question-card {
background: linear-gradient(180deg, #fff 0%, #fafcff 100%);
border: 1px solid var(--line);
border-radius: 22px;
padding: 22px;
}

.step-label {
display: inline-block;
padding: 7px 12px;
border-radius: 999px;
background: #fff4e8;
color: #f97316;
font-size: 12px;
font-weight: 800;
margin-bottom: 14px;
}

.prompt-box {
padding: 14px 16px;
background: #eef6ff;
border: 1px solid #cfe1ff;
border-radius: 16px;
font-weight: 700;
font-size: 16px;
line-height: 1.6;
margin-bottom: 14px;
}

.hint-box {
padding: 12px 14px;
background: #fff;
border: 1px dashed #d7dbe3;
border-radius: 14px;
font-size: 13px;
color: var(--muted);
line-height: 1.6;
margin-bottom: 14px;
}

.drop-zone {
min-height: 120px;
border: 2px dashed #93c5fd;
border-radius: 18px;
background: #fff;
display: flex;
flex-wrap: wrap;
gap: 10px;
padding: 14px;
align-content: flex-start;
justify-content: center;
margin-bottom: 12px;
}

.word-bank {
display: flex;
flex-wrap: wrap;
gap: 10px;
justify-content: center;
}

.word-btn {
padding: 10px 14px;
font-size: 14px;
border-radius: 12px;
background: #4f8cff;
color: white;
border: none;
font-weight: 800;
cursor: pointer;
}

#typingArea { display: none; }

.type-input {
width: 100%;
min-height: 64px;
max-height: 220px;
padding: 14px 16px;
font-size: 18px;
line-height: 1.5;
border: 2px solid #bfdbfe;
border-radius: 18px;
outline: none;
resize: none;
overflow-y: auto;
font-family: Arial, sans-serif;
}

.type-input:focus {
border-color: #4f8cff;
box-shadow: 0 0 0 4px rgba(79,140,255,.12);
}

#checkBtn {
min-width: 140px;
background: #4caf50;
color: #fff;
padding: 13px 18px;
}

#modalOverlay {
position: fixed;
inset: 0;
background: rgba(15, 23, 42, 0.56);
display: none;
justify-content: center;
align-items: center;
padding: 20px;
}

.modal-content {
background: #fff;
border-radius: 24px;
padding: 24px;
width: min(92vw, 380px);
text-align: center;
box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
}

.m-btn {
width: 100%;
padding: 15px;
margin-top: 10px;
border-radius: 14px;
border: none;
font-weight: 800;
font-size: 16px;
cursor: pointer;
}

@media (max-width: 640px) {
.type-input {
min-height: 56px;
padding: 12px 14px;
font-size: 16px;
line-height: 1.5;
border-radius: 14px;
}
}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<div class="title-box">
        
        <h1>영작 학습관</h1>     <button id="homeBtn" class="btn-light">학습 홈</button>


</div>
<div class="btns">
        

        
        
        
</div>
</div>

<div id="menuView">
<div class="summary-grid">
<div class="summary-card">
<div class="label">학년</div>
<div class="value" id="summaryGrade">중3</div>
</div>
<div class="summary-card">
<div class="label">출판사</div>
<div class="value" id="summaryBook" style="font-size:22px;">동아(윤정미)</div>
</div>
<div class="summary-card">
<div class="label">최근 학습</div>
<div class="value" id="recentUnit" style="font-size:22px;">-</div>
</div>
</div>

<div class="panel">
<div class="panel-head">
<div>
<h2>카테고리 선택</h2>
<p>JSON 파일 기반으로 단원을 불러옵니다.</p>
</div>
</div>
<div class="filter-grid">
<div class="filter-card">
<label>학년</label>
<select id="gradeSelect"></select>
</div>
<div class="filter-card">
<label>출판사</label>
<select id="bookSelect"></select>
</div>
</div>
</div>

<div class="panel">
<div class="panel-head">
<div>
<h2>단원 선택</h2>
<p>단원을 누르면 번호 선택 화면으로 들어갑니다.</p>
</div>
</div>
<div id="unitGrid" class="unit-grid"></div>
</div>
</div>

<div id="stageView">
<div class="panel">
<div class="quiz-head">
<div>
<div class="progress-pill" id="stageTitle">단원</div>
<p id="stageDesc" style="margin:10px 0 0;color:#6b7280;font-size:14px;">번호를 선택해 시작하세요.</p>
</div>
<div class="btns">
<button class="btn-light" id="stageBackBtn">단원 목록</button>
</div>
</div>

</div>
</div>

<div id="gameView">
<div class="panel">
<div class="quiz-head">
<div>
<div class="progress-pill" id="progressText">1 / 1</div>
<p id="coursePath" style="margin:10px 0 0;color:#6b7280;font-size:14px;">중3 · 동아(윤정미) · 1과 · 1번</p>

<div class="btns">
<button class="btn-light" id="backBtn">번호 목록</button>
</div>

<div class="progress-bar-wrap">
<div id="progressBar" class="progress-bar"></div>

<div class="question-card">

<div id="wordBank" class="word-bank"></div>

<div id="typingArea">

</div>

<div style="display:flex;justify-content:flex-end;margin-top:12px;">
<button id="checkBtn">제출</button>

</div>
</div>
</div>

<div id="modalOverlay">
<div class="modal-content">
<h3 id="mTitle" style="margin:0 0 10px 0;">결과</h3>
<p id="mMsg" style="margin:0 0 20px 0; line-height:1.6;"></p>
<button class="m-btn" id="mYes" style="background:#4caf50;color:white;">확인</button>
<button class="m-btn" id="mNo" style="background:#eee;color:#333;">번호 목록</button>
</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
'https://uuzhdxangctewuklvmlv.supabase.co',
'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
);

const catalog = {
middle3: {
label: '중3',
books: {
donga_yoon: {
label: '동아(윤정미)',
units: [
{ id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/donga_yoon/unit1.json' },
{ id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/donga_yoon/unit2.json' },
{ id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/donga_yoon/unit3.json' }
]
},
ybm_song: {
label: 'YBM(송미정)',
units: [
{ id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/ybm_song/unit1.json' },
{ id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/ybm_song/unit2.json' },
{ id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/ybm_song/unit3.json' }
]
}
}
}
};

const qs = (selector) => document.querySelector(selector);

const menuView = qs('#menuView');
const stageView = qs('#stageView');
const gameView = qs('#gameView');
const gradeSelect = qs('#gradeSelect');
const bookSelect = qs('#bookSelect');
const unitGrid = qs('#unitGrid');
const stageGrid = qs('#stageGrid');
const typeInputEl = qs('#typeInput');

let currentGrade = 'middle3';
let currentBook = 'donga_yoon';
let currentUnitMeta = null;
let currentData = null;
let currentIndex = 0;
let currentStep = 1;
let typingWrongCount = 0;
let modalConfirmAction = null;
let authUserId = null;

let unitProgressMap = new Map();
let recentUnitText = '-';

async function ensureAuthUser() {
const { data, error } = await supabase.auth.getUser();
if (error || !data.user) {
location.href = 'login.html';
return null;
}
authUserId = data.user.id;
return data.user;
}

function getUnitProgressKey(gradeKey, bookKey, unitId) {
return `${gradeKey}__${bookKey}__${unitId}`;
}

function getCurrentUnitProgressKey(meta = currentUnitMeta) {
if (!meta) return '';
return getUnitProgressKey(currentGrade, currentBook, meta.id);
}

function defaultProgress() {
return {
completed: [],
maxUnlockedIndex: 0
};
}

function normalizeProgressRow(row) {
const completed = Array.isArray(row?.completed_indexes)
? row.completed_indexes
.map(v => Number(v))
.filter(v => Number.isInteger(v) && v >= 0)
: [];

const uniqueCompleted = [...new Set(completed)].sort((a, b) => a - b);
const maxUnlockedIndex = Number.isInteger(row?.max_unlocked_index)
? Math.max(0, row.max_unlocked_index)
: 0;

return {
completed: uniqueCompleted,
maxUnlockedIndex
};
}

async function loadAllUnitProgress() {
if (!authUserId) return;

const { data, error } = await supabase
.from('writing_unit_progress')
.select('grade_key, book_key, unit_id, completed_indexes, max_unlocked_index, updated_at')
.eq('user_id', authUserId);

if (error) {
console.error('writing_unit_progress 조회 실패:', error.message);
unitProgressMap = new Map();
recentUnitText = '-';
return;
}

unitProgressMap = new Map();

let latestUpdatedAt = 0;
let latestLabel = '-';

for (const row of data || []) {
const key = getUnitProgressKey(row.grade_key, row.book_key, row.unit_id);
unitProgressMap.set(key, normalizeProgressRow(row));

const updatedAt = row.updated_at ? new Date(row.updated_at).getTime() : 0;
if (updatedAt > latestUpdatedAt) {
latestUpdatedAt = updatedAt;

const gradeLabel = catalog[row.grade_key]?.label || row.grade_key;
const bookLabel = catalog[row.grade_key]?.books?.[row.book_key]?.label || row.book_key;

const unitMeta = catalog[row.grade_key]?.books?.[row.book_key]?.units?.find(
unit => unit.id === row.unit_id
);

const unitLabel = unitMeta?.label || row.unit_id;
latestLabel = `${gradeLabel} ${unitLabel}`;
}
}

recentUnitText = latestLabel;
}

function getProgress(meta = currentUnitMeta) {
if (!meta) return defaultProgress();

const key = getCurrentUnitProgressKey(meta);
return unitProgressMap.get(key) || defaultProgress();
}

async function saveUnitProgress(progressObj) {
if (!authUserId || !currentUnitMeta) return;

const normalized = normalizeProgressRow({
completed_indexes: progressObj.completed,
max_unlocked_index: progressObj.maxUnlockedIndex
});

const payload = {
user_id: authUserId,
grade_key: currentGrade,
book_key: currentBook,
unit_id: currentUnitMeta.id,
completed_indexes: normalized.completed,
max_unlocked_index: normalized.maxUnlockedIndex,
updated_at: new Date().toISOString()
};

const { error } = await supabase
.from('writing_unit_progress')
.upsert(payload, {
onConflict: 'user_id,grade_key,book_key,unit_id'
});

if (error) {
console.error('writing_unit_progress 저장 실패:', error.message);
return;
}

unitProgressMap.set(getCurrentUnitProgressKey(), {
completed: normalized.completed,
maxUnlockedIndex: normalized.maxUnlockedIndex
});

recentUnitText = `${catalog[currentGrade].label} ${currentUnitMeta.label}`;
}

function clean(text) {
return String(text || '')
.toLowerCase()
.replace(/[“”]/g, '"')
.replace(/[‘’]/g, "'")
.replace(/[.,!?"]/g, '')
.replace(/\s+/g, ' ')
.trim();
}

function shuffle(arr) {
const copied = [...arr];
for (let i = copied.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[copied[i], copied[j]] = [copied[j], copied[i]];
}
return copied;
}

function autoResizeTextarea(el) {
if (!el) return;
el.style.height = 'auto';
el.style.height = `${el.scrollHeight}px`;
}

function tokensOf(text) {
return clean(text).split(' ').filter(Boolean);
}

function getWrongIndexes(userInput, answer) {
const userTokens = tokensOf(userInput);
const answerTokens = tokensOf(answer);
const wrong = [];

for (let i = 0; i < answerTokens.length; i++) {
if (userTokens[i] !== answerTokens[i]) wrong.push(i);
}

return { wrong, answerTokens };
}

function buildHintMessage(userInput, answer, wrongCount) {
const { wrong, answerTokens } = getWrongIndexes(userInput, answer);

if (!wrong.length) return '다시 확인해 보세요.';

if (wrongCount === 1) {
return `틀린 단어가 ${wrong.length}개 있어요.`;
}

if (wrongCount === 2) {
const posText = wrong.map(i => `${i + 1}번째`).join(', ');
return `${posText} 단어를 다시 확인해 보세요.`;
}

const hintText = wrong.map(i => `${i + 1}번째(${answerTokens[i][0]})`).join(', ');
return `${hintText} 단어를 다시 확인해 보세요.`;
}

function updateSummary() {
qs('#summaryGrade').textContent = catalog[currentGrade].label;
qs('#summaryBook').textContent = catalog[currentGrade].books[currentBook].label;
qs('#recentUnit').textContent = recentUnitText || '-';
}

function buildWritingUnitLabel() {
return `${catalog[currentGrade].label} ${catalog[currentGrade].books[currentBook].label} ${currentUnitMeta.label}`;
}

async function syncWritingSummaryToSupabase() {
if (!authUserId || !currentUnitMeta || !currentData?.items?.length) return;

const progress = getProgress();
const completedCount = Array.isArray(progress.completed) ? progress.completed.length : 0;
const unitTotalCount = currentData.items.length;
const unitLabel = buildWritingUnitLabel();

const { error } = await supabase
.from('writing_progress')
.upsert({
user_id: authUserId,
completed_count: completedCount,
unit_total_count: unitTotalCount,
unit_label: unitLabel,
last_completed_at: new Date().toISOString()
}, {
onConflict: 'user_id'
});

if (error) {
console.error('writing_progress 저장 실패:', error.message);
}
}

function populate() {
gradeSelect.innerHTML = '<option value="middle3">중3</option>';

bookSelect.innerHTML = Object.entries(catalog[currentGrade].books)
.map(([key, value]) => `<option value="${key}">${value.label}</option>`)
.join('');

if (!catalog[currentGrade].books[currentBook]) {
currentBook = Object.keys(catalog[currentGrade].books)[0];
}

bookSelect.value = currentBook;
updateSummary();
}

async function renderUnits() {
unitGrid.innerHTML = '';

for (const unit of catalog[currentGrade].books[currentBook].units) {
const response = await fetch(unit.file);
const data = await response.json();
const progress = getProgress(unit);
const total = data.items.length;
const done = (progress.completed || []).length;
const percent = total > 0 ? Math.round(done / total * 100) : 0;

const button = document.createElement('button');
button.className = 'unit-card';
button.innerHTML = `
       <div>
         <div class="badge">${unit.label}</div>
         <div class="unit-title">${unit.title}</div>
       </div>
       <div class="meta">
         문장 수: ${total}<br>
         진도: ${done} / ${total} (${percent}%)
       </div>
     `;
button.onclick = () => openUnit(unit);
unitGrid.appendChild(button);
}
}

async function openUnit(unit) {
currentUnitMeta = unit;
currentData = await (await fetch(unit.file)).json();

menuView.style.display = 'none';
stageView.style.display = 'block';
gameView.style.display = 'none';

qs('#stageTitle').textContent =
`${catalog[currentGrade].label} · ${catalog[currentGrade].books[currentBook].label} · ${unit.label}`;
qs('#stageDesc').textContent = `${currentData.items.length}개 문장 중 번호를 선택하세요.`;

renderStageGrid();
}

function renderStageGrid() {
const progress = getProgress();
stageGrid.innerHTML = '';

currentData.items.forEach((_, idx) => {
const button = document.createElement('button');
const isDone = (progress.completed || []).includes(idx);
const isOpen = idx <= progress.maxUnlockedIndex;

button.className = 'stage-btn ' + (
isDone ? 'stage-complete' : isOpen ? 'stage-unlocked' : 'stage-locked'
);
button.textContent = isOpen ? idx + 1 : '🔒';

if (isOpen) {
button.onclick = () => startQuestion(idx);
}

stageGrid.appendChild(button);
});
}

function startQuestion(idx) {
currentIndex = idx;
currentStep = 1;
typingWrongCount = 0;

stageView.style.display = 'none';
gameView.style.display = 'block';

renderQuestion();
}

function renderQuestion() {
const item = currentData.items[currentIndex];
const total = currentData.items.length;

qs('#progressText').textContent = `${currentIndex + 1} / ${total}`;
qs('#progressBar').style.width = `${((currentIndex + 1) / total) * 100}%`;
qs('#coursePath').textContent =
`${catalog[currentGrade].label} · ${catalog[currentGrade].books[currentBook].label} · ${currentUnitMeta.label} · ${currentIndex + 1}번`;

qs('#promptBox').textContent = item.ko;
qs('#hintBox').textContent = `정답 문장 길이: ${item.en.split(' ').length}단어`;

if (currentStep === 1) {
qs('#stepLabel').textContent = 'Step 1 · 단어 배열';
qs('#arrangeArea').style.display = 'block';
qs('#typingArea').style.display = 'none';
qs('#answerArea').innerHTML = '';
qs('#wordBank').innerHTML = '';

shuffle(item.en.split(' ')).forEach((word) => {
const button = document.createElement('button');
button.className = 'word-btn';
button.textContent = word;
button.onclick = () => {
if (button.parentElement.id === 'wordBank') {
qs('#answerArea').appendChild(button);
} else {
qs('#wordBank').appendChild(button);
}
};
qs('#wordBank').appendChild(button);
});
} else {
qs('#stepLabel').textContent = 'Step 2 · 직접 타이핑';
qs('#arrangeArea').style.display = 'none';
qs('#typingArea').style.display = 'block';
typeInputEl.value = '';
typeInputEl.style.height = 'auto';
autoResizeTextarea(typeInputEl);
typeInputEl.focus();
}
}

function popup(ok, message) {
qs('#modalOverlay').style.display = 'flex';
qs('#mTitle').textContent = ok ? '정답입니다!' : '오답입니다';
qs('#mTitle').style.color = ok ? '#4caf50' : '#f44336';
qs('#mMsg').textContent = message;
}

async function complete() {
const progress = getProgress();
const completed = [...(progress.completed || [])];

if (!completed.includes(currentIndex)) {
completed.push(currentIndex);
}

let maxUnlockedIndex = progress.maxUnlockedIndex || 0;
if (currentIndex === maxUnlockedIndex && currentIndex < currentData.items.length - 1) {
maxUnlockedIndex += 1;
}

const nextProgress = { maxUnlockedIndex, completed };

await saveUnitProgress(nextProgress);
await syncWritingSummaryToSupabase();
renderStageGrid();
qs('#modalOverlay').style.display = 'none';
updateSummary();

if (currentIndex < currentData.items.length - 1) {
startQuestion(currentIndex + 1);
} else {
stageView.style.display = 'block';
gameView.style.display = 'none';
}
}

qs('#checkBtn').onclick = () => {
const answer = currentData.items[currentIndex].en;
let ok = false;

if (currentStep === 1) {
const arranged = [...qs('#answerArea').children]
.map(node => node.textContent)
.join(' ');

ok = clean(arranged) === clean(answer);

popup(
ok,
ok
? '배열이 정확합니다. 이제 직접 타이핑으로 넘어갑니다.'
: '단어 순서를 다시 확인해 보세요.'
);
} else {
const userInput = qs('#typeInput').value;
ok = clean(userInput) === clean(answer);

if (ok) {
popup(true, '직접 타이핑까지 완료했습니다.');
} else {
typingWrongCount += 1;
popup(false, buildHintMessage(userInput, answer, typingWrongCount));
}
}

modalConfirmAction = async () => {
if (ok) {
if (currentStep === 1) {
currentStep = 2;
qs('#modalOverlay').style.display = 'none';
renderQuestion();
} else {
await complete();
}
} else {
qs('#modalOverlay').style.display = 'none';
if (currentStep === 2) qs('#typeInput').focus();
}
};
};

qs('#mYes').onclick = async () => {
if (typeof modalConfirmAction === 'function') {
await modalConfirmAction();
}
};

qs('#mNo').onclick = () => {
qs('#modalOverlay').style.display = 'none';
stageView.style.display = 'block';
gameView.style.display = 'none';
};

qs('#backBtn').onclick = () => {
stageView.style.display = 'block';
gameView.style.display = 'none';
};

qs('#stageBackBtn').onclick = async () => {
stageView.style.display = 'none';
menuView.style.display = 'block';
await renderUnits();
updateSummary();
};

qs('#homeBtn').onclick = async () => {
const { data, error } = await supabase.auth.getUser();
if (error || !data.user) {
location.href = 'login.html';
return;
}

const { data: profileData } = await supabase
.from('profiles')
.select('role')
.eq('user_id', data.user.id)
.maybeSingle();

if (profileData?.role === 'admin') location.href = 'admin.html';
else location.href = 'class.html';
};

typeInputEl.addEventListener('input', () => {
autoResizeTextarea(typeInputEl);
});
qs('#typeInput').addEventListener('keydown', (event) => {
if (event.key !== 'Enter') return;

event.preventDefault();
event.stopPropagation();

if (qs('#modalOverlay').style.display === 'flex') {
qs('#mYes').click();
} else {
qs('#checkBtn').click();
}
});

gradeSelect.onchange = async () => {
currentGrade = gradeSelect.value;
populate();
await renderUnits();
};

bookSelect.onchange = async () => {
currentBook = bookSelect.value;
updateSummary();
await renderUnits();
};

await ensureAuthUser();
await loadAllUnitProgress();
populate();
await renderUnits();
updateSummary();
</script>
</body>
</html>
