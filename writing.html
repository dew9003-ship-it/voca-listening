<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영작 학습관</title>
    
    <!-- 1. 공통 디자인 파일 연결 -->
    <link rel="stylesheet" href="global.css">

    <style>
        /* 영작 학습관 전용 레이아웃 스타일 (global.css와 겹치지 않는 부분만 남김) */
        .panel { background: var(--card); border-radius: 20px; border: 1.5px solid var(--line); padding: 15px; margin-bottom: 15px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .filter-card { background: #fbfdff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px 14px; }
        .filter-card label { display: block; font-size: 11px; color: var(--muted); font-weight: 800; margin-bottom: 4px; }
        .filter-card select { width: 100%; height: 36px; border: 1px solid var(--line); background: #fff; border-radius: 8px; font-size: 14px; font-weight: 700; outline: none; }

        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .unit-card {
            border: 2px solid var(--line);
            background: #fff; border-radius: 18px; padding: 18px;
            min-height: 140px; display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; box-shadow: var(--shadow); text-align: left;
        }
        .unit-card:hover { border-color: var(--blue); }
        .badge { display: inline-flex; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; background: #eef4ff; color: #335ea8; margin-bottom: 8px; width: max-content; }
        .unit-title { font-size: 19px; font-weight: 800; margin-bottom: 6px; color: #1e293b; }
        .meta { color: var(--muted); font-size: 13px; font-weight: 500; }

        #stageView, #gameView { display: none; }
        .quiz-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; }
        .stage-btn { aspect-ratio: 1; font-size: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; border: 2px solid var(--line); background: #fff; }
        .stage-unlocked { background: #4f8cff; color: white; border: none; }
        .stage-locked { background: #f1f5f9; color: #94a3b8; }
        .stage-complete { background: #4caf50; color: white; border: none; }

        .progress-pill { display: inline-flex; background: #eef4ff; color: #2f5da8; border-radius: 8px; padding: 5px 12px; font-size: 13px; font-weight: 800; }
        .progress-bar-wrap { width: 100%; height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.3s; }

        .question-card { background: #fff; border: 2px solid var(--line); border-radius: 20px; padding: 15px; box-shadow: var(--shadow); }
        .step-label { display: inline-block; padding: 4px 10px; border-radius: 8px; background: #fff4e8; color: #f97316; font-size: 11px; font-weight: 800; margin-bottom: 8px; }
        .prompt-box { padding: 15px; background: #f0f7ff; border: 1.5px solid #cbd5e1; border-radius: 14px; font-weight: 700; font-size: 17px; line-height: 1.5; color: #1e40af; margin-bottom: 12px; text-align: center; }

        .action-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .hint-box { width: 90px; height: 44px; padding: 0 5px; background: #f8fafc; border: 1.5px solid var(--line); border-radius: 10px; font-size: 13px; color: var(--muted); text-align: center; display: flex; align-items: center; justify-content: center; }
        #checkBtn { flex: 1; height: 44px; background: #4caf50; color: #fff; border-radius: 10px; font-weight: 800; font-size: 17px; border: none; cursor: pointer; }

        .drop-zone { min-height: 90px; border: 2px dashed #94a3b8; border-radius: 16px; background: #fbfdff; display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; margin-bottom: 12px; justify-content: center; align-content: center; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .word-btn { padding: 8px 14px; font-size: 14px; border-radius: 10px; background: #4f8cff; color: white; font-weight: 800; border: none; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .type-input { 
            width: 100%; min-height: 60px; padding: 12px; font-size: 18px; 
            border: 2px solid #bfdbfe; border-radius: 14px; outline: none; 
            resize: none; background: #fff; font-family: Arial, sans-serif;
        }

        @media (max-width: 640px) {
            .unit-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .grid-container { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .prompt-box { font-size: 16px; padding: 12px; }
            .hint-box { width: 75px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="wrap">
    <!-- 상단 바는 global.js가 자동으로 삽입합니다 -->

    <!-- 메인 메뉴 화면 -->
    <div id="menuView">
        <div class="panel">
            <div class="filter-grid">
                <div class="filter-card"><label>학년</label><select id="gradeSelect"></select></div>
                <div class="filter-card"><label>출판사</label><select id="bookSelect"></select></div>
            </div>
        </div>
        <div id="unitGrid" class="unit-grid"></div>
    </div>

    <!-- 단계 선택 화면 (번호판) -->
    <div id="stageView">
        <div class="panel">
            <div class="quiz-head">
                <div class="progress-pill" id="stageTitle">단원</div>
                <button class="btn-std" id="stageBackBtn">목록</button>
            </div>
            <div id="stageGrid" class="grid-container" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- 실제 학습 화면 -->
    <div id="gameView">
        <div class="panel">
            <div class="quiz-head">
                <div class="progress-pill" id="progressText">1 / 1</div>
                <button class="btn-std" id="backBtn">뒤로</button>
            </div>
            <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
            
            <div class="question-card">
                <div id="stepLabel" class="step-label">Step 1</div>
                <div id="promptBox" class="prompt-box"></div>
                
                <div class="action-row">
                    <div id="hintBox" class="hint-box"></div>
                    <button id="checkBtn">제출</button>
                </div>

                <div id="arrangeArea">
                    <div id="answerArea" class="drop-zone"></div>
                    <div id="wordBank" class="word-bank"></div>
                </div>
                <div id="typingArea" style="display:none;">
                    <textarea id="typeInput" class="type-input" placeholder="영작 문장을 입력하세요..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // 2. 공통 로직 연결
    import { supabase, showAlert, initHeader, initSecurity } from './global.js';

    const catalog = {
        middle3: { label: '중3', books: {
            donga_yoon: { label: '동아(윤정미)', units: [
                { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/donga_yoon/unit1.json' },
                { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/donga_yoon/unit2.json' },
                { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/donga_yoon/unit3.json' }
            ]},
            ybm_song: { label: 'YBM(송미정)', units: [
                { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/ybm_song/unit1.json' },
                { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/ybm_song/unit2.json' },
                { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/ybm_song/unit3.json' }
            ]}
        }}
    };

    const qs = s => document.querySelector(s);
    const menuView = qs('#menuView'), stageView = qs('#stageView'), gameView = qs('#gameView');
    const gradeSelect = qs('#gradeSelect'), bookSelect = qs('#bookSelect'), unitGrid = qs('#unitGrid'), stageGrid = qs('#stageGrid'), typeInputEl = qs('#typeInput');

    let currentGrade = 'middle3', currentBook = 'donga_yoon', currentUnitMeta = null, currentData = null;
    let currentIndex = 0, currentStep = 1, typingWrongCount = 0, authUserId = null;
    let unitProgressMap = new Map(), isProcessing = false;

    // 유틸리티 함수
    const clean = t => String(t||'').toLowerCase().replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/[.,!?"]/g,'').replace(/\s+/g,' ').trim();
    const shuffle = a => { let c=[...a]; for(let i=c.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [c[i],c[j]]=[c[j],c[i]]; } return c; };
    const tokensOf = t => clean(t).split(' ').filter(Boolean);
    const autoResize = el => { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };

    // 진도 관련 함수
    function normalizeProgress(row) {
        const completed = Array.isArray(row?.completed_indexes) ? row.completed_indexes.map(v => Number(v)).filter(v => Number.isInteger(v) && v >= 0) : [];
        return { completed: [...new Set(completed)].sort((a,b)=>a-b), maxUnlockedIndex: Number.isInteger(row?.max_unlocked_index) ? Math.max(0, row.max_unlocked_index) : 0 };
    }

    async function loadProgress() {
        if (!authUserId) return;
        const { data } = await supabase.from('writing_unit_progress').select('*').eq('user_id', authUserId);
        unitProgressMap.clear();
        data?.forEach(r => unitProgressMap.set(`${r.grade_key}__${r.book_key}__${r.unit_id}`, normalizeProgress(r)));
    }

    function getProg(meta = currentUnitMeta) { return unitProgressMap.get(`${currentGrade}__${currentBook}__${meta.id}`) || { completed: [], maxUnlockedIndex: 0 }; }

    async function saveProgress(idx) {
        const key = `${currentGrade}__${currentBook}__${currentUnitMeta.id}`;
        let p = getProg();
        if (!p.completed.includes(idx)) p.completed.push(idx);
        p.completed = [...new Set(p.completed)].map(Number).sort((a,b)=>a-b);
        p.maxUnlockedIndex = Math.max(p.maxUnlockedIndex, (idx + 1 < currentData.items.length ? idx + 1 : idx));

        try {
            const { error: err1 } = await supabase.from('writing_unit_progress').upsert({
                user_id: authUserId, grade_key: currentGrade, book_key: currentBook, unit_id: currentUnitMeta.id,
                completed_indexes: p.completed, max_unlocked_index: p.maxUnlockedIndex, updated_at: new Date().toISOString()
            }, { onConflict: 'user_id,grade_key,book_key,unit_id' });
            if (err1) throw err1;

            const { error: err2 } = await supabase.from('writing_progress').upsert({
                user_id: authUserId, completed_count: p.completed.length, unit_total_count: currentData.items.length,
                unit_label: `${catalog[currentGrade].label} ${currentUnitMeta.label}`, last_completed_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
            if (err2) throw err2;

            unitProgressMap.set(key, p);
        } catch (e) {
            console.error('Save failed:', e);
            showAlert('저장 실패', '서버와 연결이 불안정합니다. 잠시 후 다시 시도해 주세요.', true);
            throw e;
        }
    }

    // 문제 화면 제어
    function buildHintMessage(uI, ans, count) {
        const uT = tokensOf(uI), aT = tokensOf(ans), wrong = [];
        aT.forEach((w, i) => { if(uT[i] !== w) wrong.push(i); });
        if (!wrong.length) return '다시 확인해 보세요.';
        if (count === 1) return `틀린 단어가 ${wrong.length}개 있어요.`;
        if (count === 2) return `${wrong.map(i => i+1).join(', ')}번째를 확인하세요.`;
        return wrong.map(i => `${i+1}번째(${aT[i][0]}...)`).join(', ') + " 확인 필요";
    }

    async function renderUnits() {
        unitGrid.innerHTML = '';
        for (const u of catalog[currentGrade].books[currentBook].units) {
            const res = await fetch(u.file), data = await res.json(), p = getProg(u);
            const card = document.createElement('button'); card.className = 'unit-card';
            card.innerHTML = `<div><div class="badge">${u.label}</div><div class="unit-title">${u.title}</div></div>
                              <div class="meta">진도: ${p.completed.length}/${data.items.length} (${Math.round(p.completed.length/data.items.length*100)||0}%)</div>`;
            card.onclick = () => openUnit(u, data); unitGrid.appendChild(card);
        }
    }

    function openUnit(u, data) {
        currentUnitMeta = u; currentData = data;
        menuView.style.display = 'none'; stageView.style.display = 'block';
        qs('#stageTitle').textContent = u.label; renderStages();
    }

    function renderStages() {
        const p = getProg(); stageGrid.innerHTML = '';
        currentData.items.forEach((_, i) => {
            const btn = document.createElement('button');
            const done = p.completed.includes(i), open = i <= p.maxUnlockedIndex;
            btn.className = `stage-btn ${done ? 'stage-complete' : open ? 'stage-unlocked' : 'stage-locked'}`;
            btn.textContent = open ? i + 1 : '🔒';
            if (open) btn.onclick = () => startQuiz(i); stageGrid.appendChild(btn);
        });
    }

    function startQuiz(i) {
        currentIndex = i; currentStep = 1; typingWrongCount = 0;
        stageView.style.display = 'none'; gameView.style.display = 'block'; showQuestion();
    }

    function showQuestion() {
        const item = currentData.items[currentIndex];
        qs('#progressText').textContent = `${currentIndex + 1} / ${currentData.items.length}`;
        qs('#progressBar').style.width = `${((currentIndex+1)/currentData.items.length)*100}%`;
        qs('#promptBox').textContent = item.ko; qs('#hintBox').textContent = `${item.en.split(' ').length}단어`;
        if (currentStep === 1) {
            qs('#stepLabel').textContent = 'Step 1. 단어 배열';
            qs('#arrangeArea').style.display = 'block'; qs('#typingArea').style.display = 'none';
            qs('#answerArea').innerHTML = ''; qs('#wordBank').innerHTML = '';
            shuffle(item.en.split(' ')).forEach(w => {
                const b = document.createElement('button'); b.className = 'word-btn'; b.textContent = w;
                b.onclick = () => (b.parentElement.id==='wordBank'?qs('#answerArea'):qs('#wordBank')).appendChild(b);
                qs('#wordBank').appendChild(b);
            });
        } else {
            qs('#stepLabel').textContent = 'Step 2. 직접 타이핑';
            qs('#arrangeArea').style.display = 'none'; qs('#typingArea').style.display = 'block';
            typeInputEl.value = ''; autoResize(typeInputEl); typeInputEl.focus();
        }
    }

    // 제출 버튼 동작
    qs('#checkBtn').onclick = async () => {
        if (isProcessing) return;
        const ans = currentData.items[currentIndex].en;
        let ok = false;

        if (currentStep === 1) {
            const user = [...qs('#answerArea').children].map(n => n.textContent).join(' ');
            ok = clean(user) === clean(ans);
            if (ok) {
                showAlert('정답!', '잘하셨습니다. 타이핑 단계로 넘어갑니다.', false, () => {
                    currentStep = 2; showQuestion();
                });
            } else {
                showAlert('오답', '배열 순서가 틀렸습니다. 다시 확인하세요.', true);
            }
        } else {
            const user = typeInputEl.value;
            ok = clean(user) === clean(ans);
            if (ok) {
                // 성공 시 서버 저장 및 다음 문제
                try {
                    isProcessing = true;
                    // showAlert를 통해 로딩 메시지를 띄워도 좋지만, 여기서는 바로 저장 시도
                    await saveProgress(currentIndex);
                    showAlert('완료!', '마스터했습니다!', false, () => {
                        isProcessing = false;
                        if (currentIndex < currentData.items.length - 1) startQuiz(currentIndex + 1);
                        else { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); }
                    });
                } catch (e) {
                    isProcessing = false;
                }
            } else {
                typingWrongCount++;
                showAlert('오답', buildHintMessage(user, ans, typingWrongCount), true, () => {
                    typeInputEl.focus();
                });
            }
        }
    };

    // 버튼 및 이벤트 바인딩
    qs('#backBtn').onclick = () => { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); };
    qs('#stageBackBtn').onclick = () => { stageView.style.display = 'none'; menuView.style.display = 'block'; renderUnits(); };
    typeInputEl.oninput = () => autoResize(typeInputEl);
    typeInputEl.onkeydown = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            qs('#checkBtn').click();
        }
    };

    gradeSelect.onchange = async () => { currentGrade = gradeSelect.value; await renderUnits(); };
    bookSelect.onchange = async () => { currentBook = bookSelect.value; await renderUnits(); };

    // 3. 페이지 초기화 로직
    (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) { location.href = 'login.html'; return; }
        authUserId = user.id;

        await initHeader('영작 학습관'); 
        initSecurity(typeInputEl);
        await loadProgress();

        gradeSelect.innerHTML = '<option value="middle3">중3</option>';
        bookSelect.innerHTML = Object.entries(catalog.middle3.books).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
        renderUnits();
    })();
</script>
</body>
</html>
