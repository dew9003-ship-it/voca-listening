<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영작 학습관</title>
<style>
/* [반응형 디자인 시스템] */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
    --card: #ffffff; --line: #e5e7eb; --text: #1f2937; --muted: #6b7280;
    --blue: #4f8cff; --green: #4caf50; --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
}
html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #f8fafc; color: var(--text); }
.wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 30px 20px; min-height: 100vh; }

/* 상단 바 */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.topbar h1 { margin: 0; font-size: 28px; font-weight: 800; }
.btn-light { background: #fff; color: #334155; border: 1px solid var(--line); padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* 필터 패널 */
.panel { background: var(--card); border-radius: 24px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
.filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.filter-card { background: #fbfdff; border: 1px solid #edf2f7; border-radius: 16px; padding: 12px 16px; }
.filter-card label { display: block; font-size: 13px; color: var(--muted); font-weight: 800; margin-bottom: 6px; }
.filter-card select { width: 100%; height: 44px; border: 1px solid var(--line); background: #fff; border-radius: 10px; font-size: 15px; font-weight: 700; outline: none; }

/* 단원 카드 그리드 - PC에서는 크게! */
.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.unit-card {
    border: 1px solid var(--line); background: #fff; border-radius: 20px; padding: 20px;
    min-height: 160px; display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; box-shadow: var(--shadow); text-align: left; transition: transform 0.2s;
}
.unit-card:hover { transform: translateY(-5px); }
.badge { display: inline-flex; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; background: #eef4ff; color: #335ea8; margin-bottom: 10px; width: max-content; }
.unit-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
.meta { color: var(--muted); font-size: 13px; line-height: 1.6; }

/* 번호 선택 화면 */
#stageView, #gameView { display: none; }
.quiz-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
.stage-btn { aspect-ratio: 1; font-size: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; border: none; }
.stage-unlocked { background: linear-gradient(180deg, #5aa6ff, #4f8cff); color: white; }
.stage-locked { background: #e5e7eb; color: #9ca3af; }
.stage-complete { background: linear-gradient(180deg, #5fc776, #4caf50); color: white; }

/* 문제 풀이 화면 */
.progress-pill { display: inline-flex; background: #eef4ff; color: #2f5da8; border-radius: 999px; padding: 8px 16px; font-size: 14px; font-weight: 800; }
.progress-bar-wrap { width: 100%; height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin: 20px 0; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4f8cff, #6fcf97); transition: width 0.3s; }

.question-card { background: #fff; border-radius: 24px; padding: 24px; border: 1px solid var(--line); }
.step-label { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #fff4e8; color: #f97316; font-size: 12px; font-weight: 800; margin-bottom: 15px; }
.prompt-box { padding: 20px; background: #f0f7ff; border-radius: 16px; font-weight: 700; font-size: 18px; line-height: 1.6; margin-bottom: 16px; }
.hint-box { padding: 15px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 14px; font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
.drop-zone { min-height: 110px; border: 2px dashed #93c5fd; border-radius: 18px; display: flex; flex-wrap: wrap; gap: 10px; padding: 16px; margin-bottom: 16px; justify-content: center; }
.word-btn { padding: 12px 18px; font-size: 16px; border-radius: 12px; background: #4f8cff; color: white; font-weight: 700; border: none; cursor: pointer; }
.type-input { width: 100%; min-height: 80px; padding: 18px; font-size: 20px; border: 2px solid #bfdbfe; border-radius: 18px; outline: none; resize: none; overflow-y: auto; }
#checkBtn { width: 100%; background: #4caf50; color: #fff; padding: 18px; font-size: 18px; border-radius: 16px; font-weight: 800; margin-top: 15px; }

/* 모달 */
#modalOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 2000; }
.modal-content { background: #fff; border-radius: 24px; padding: 30px; width: 100%; max-width: 380px; text-align: center; }
.m-btn { width: 100%; padding: 16px; margin-top: 12px; border-radius: 14px; font-weight: 800; font-size: 17px; cursor: pointer; border: none; }

/* 📱 [모바일 최적화 미디어 쿼리] - 화면이 작을 때만 컴팩트하게! */
@media (max-width: 640px) {
    .wrap { padding: 15px 12px; }
    .topbar h1 { font-size: 20px; }
    .topbar .btn-light { padding: 8px 14px; font-size: 13px; }
    
    .panel { padding: 12px; border-radius: 16px; }
    .filter-card { padding: 8px; border-radius: 12px; }
    .filter-card select { height: 36px; font-size: 14px; }
    
    .unit-grid { grid-template-columns: 1fr 1fr; gap: 10px; } /* 모바일은 2열 */
    .unit-card { padding: 12px; min-height: 100px; border-radius: 16px; }
    .badge { font-size: 10px; padding: 3px 8px; margin-bottom: 6px; }
    .unit-title { font-size: 15px; margin-bottom: 4px; }
    .meta { font-size: 11px; }

    .grid-container { grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; }
    .stage-btn { font-size: 17px; border-radius: 14px; }
    
    .prompt-box { font-size: 16px; padding: 15px; }
    .type-input { font-size: 17px; padding: 14px; }
}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <h1>영작 학습관</h1>
        <button id="homeBtn" class="btn-light">홈으로</button>
    </div>

    <div id="menuView">
        <div class="panel">
            <div class="filter-grid">
                <div class="filter-card"><label>학년</label><select id="gradeSelect"></select></div>
                <div class="filter-card"><label>출판사</label><select id="bookSelect"></select></div>
            </div>
        </div>
        <div id="unitGrid" class="unit-grid"></div>
    </div>

    <div id="stageView">
        <div class="panel">
            <div class="quiz-head">
                <div class="progress-pill" id="stageTitle">단원</div>
                <button class="btn-light" id="stageBackBtn">목록</button>
            </div>
            <div id="stageGrid" class="grid-container" style="margin-top:12px;"></div>
        </div>
    </div>

    <div id="gameView">
        <div class="panel">
            <div class="quiz-head">
                <div class="progress-pill" id="progressText">1 / 1</div>
                <button class="btn-light" id="backBtn">뒤로</button>
            </div>
            <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
            <div class="question-card">
                <div id="stepLabel" class="step-label">Step 1</div>
                <div id="promptBox" class="prompt-box"></div>
                <div id="hintBox" class="hint-box"></div>
                <div id="arrangeArea"><div id="answerArea" class="drop-zone"></div><div id="wordBank" class="word-bank"></div></div>
                <div id="typingArea" style="display:none;"><textarea id="typeInput" class="type-input" placeholder="영작 문장을 입력하세요..."></textarea></div>
                <button id="checkBtn">제출</button>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-content">
        <h3 id="mTitle" style="margin:0 0 10px 0;"></h3>
        <p id="mMsg" style="margin:0 0 20px 0; line-height:1.6; color:#475569;"></p>
        <button class="m-btn" id="mYes" style="background:#4caf50; color:white;">확인</button>
        <button class="m-btn" id="mNo" style="background:#f1f5f9; color:#475569;">번호 목록</button>
    </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('https://uuzhdxangctewuklvmlv.supabase.co', 'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F');

// [복구] 기존 카탈로그 100% 유지
const catalog = {
    middle3: { label: '중3', books: {
        donga_yoon: { label: '동아(윤정미)', units: [
            { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/donga_yoon/unit1.json' },
            { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/donga_yoon/unit2.json' },
            { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/donga_yoon/unit3.json' }
        ]},
        ybm_song: { label: 'YBM(송미정)', units: [
            { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/ybm_song/unit1.json' },
            { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/ybm_song/unit2.json' },
            { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/ybm_song/unit3.json' }
        ]}
    }}
};

const qs = s => document.querySelector(s);
const menuView = qs('#menuView'), stageView = qs('#stageView'), gameView = qs('#gameView');
const gradeSelect = qs('#gradeSelect'), bookSelect = qs('#bookSelect'), unitGrid = qs('#unitGrid'), stageGrid = qs('#stageGrid'), typeInputEl = qs('#typeInput');

let currentGrade = 'middle3', currentBook = 'donga_yoon', currentUnitMeta = null, currentData = null;
let currentIndex = 0, currentStep = 1, typingWrongCount = 0, modalConfirmAction = null, authUserId = null;
let unitProgressMap = new Map(), isProcessing = false;

// [복구] 기존 유틸리티 로직 (clean, shuffle, autoResize 등)
const clean = t => String(t||'').toLowerCase().replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/[.,!?"]/g,'').replace(/\s+/g,' ').trim();
const shuffle = a => { let c=[...a]; for(let i=c.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [c[i],c[j]]=[c[j],c[i]]; } return c; };
const tokensOf = t => clean(t).split(' ').filter(Boolean);
const autoResize = el => { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };

async function ensureAuth() {
    const { data } = await supabase.auth.getUser();
    if (!data.user) { location.href = 'login.html'; return; }
    authUserId = data.user.id;
}

// [복구] 정교한 데이터 정규화 로직
function normalizeProgress(row) {
    const completed = Array.isArray(row?.completed_indexes) ? row.completed_indexes.map(v => Number(v)).filter(v => Number.isInteger(v) && v >= 0) : [];
    return { completed: [...new Set(completed)].sort((a,b)=>a-b), maxUnlockedIndex: Number.isInteger(row?.max_unlocked_index) ? Math.max(0, row.max_unlocked_index) : 0 };
}

async function loadProgress() {
    if (!authUserId) return;
    const { data } = await supabase.from('writing_unit_progress').select('*').eq('user_id', authUserId);
    unitProgressMap.clear();
    data?.forEach(r => unitProgressMap.set(`${r.grade_key}__${r.book_key}__${r.unit_id}`, normalizeProgress(r)));
}

function getProg(meta = currentUnitMeta) { return unitProgressMap.get(`${currentGrade}__${currentBook}__${meta.id}`) || { completed: [], maxUnlockedIndex: 0 }; }

// [버그 수정] 저장 로직 유지
async function saveProgress(idx) {
    const key = `${currentGrade}__${currentBook}__${currentUnitMeta.id}`;
    let p = getProg();
    if (!p.completed.includes(idx)) p.completed.push(idx);
    p.maxUnlockedIndex = Math.max(p.maxUnlockedIndex, (idx + 1 < currentData.items.length ? idx + 1 : idx));
    
    await supabase.from('writing_unit_progress').upsert({
        user_id: authUserId, grade_key: currentGrade, book_key: currentBook, unit_id: currentUnitMeta.id,
        completed_indexes: p.completed, max_unlocked_index: p.maxUnlockedIndex, updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,grade_key,book_key,unit_id' });

    unitProgressMap.set(key, p);
    // [복구] 전체 통계 업데이트
    await supabase.from('writing_progress').upsert({
        user_id: authUserId, completed_count: p.completed.length, unit_total_count: currentData.items.length,
        unit_label: `${catalog[currentGrade].label} ${catalog[currentGrade].books[currentBook].label} ${currentUnitMeta.label}`, last_completed_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
}

// [복구] 정교한 3단계 힌트 로직
function getWrongIndexes(uI, ans) {
    const uT = tokensOf(uI), aT = tokensOf(ans), wrong = [];
    for(let i=0; i<aT.length; i++) { if(uT[i] !== aT[i]) wrong.push(i); }
    return { wrong, answerTokens: aT };
}
function buildHintMessage(uI, ans, count) {
    const { wrong, answerTokens } = getWrongIndexes(uI, ans);
    if (!wrong.length) return '다시 확인해 보세요.';
    if (count === 1) return `틀린 단어가 ${wrong.length}개 있어요.`;
    if (count === 2) return `${wrong.map(i => i+1).join(', ')}번째를 확인하세요.`;
    return wrong.map(i => `${i+1}번째(${answerTokens[i][0]}...)`).join(', ') + " 확인 필요";
}

// 렌더링 함수
async function renderUnits() {
    unitGrid.innerHTML = '';
    for (const u of catalog[currentGrade].books[currentBook].units) {
        const res = await fetch(u.file), data = await res.json(), p = getProg(u);
        const card = document.createElement('button');
        card.className = 'unit-card';
        card.innerHTML = `<div><div class="badge">${u.label}</div><div class="unit-title">${u.title}</div></div>
                          <div class="meta">진도: ${p.completed.length}/${data.items.length} (${Math.round(p.completed.length/data.items.length*100)||0}%)</div>`;
        card.onclick = () => openUnit(u, data);
        unitGrid.appendChild(card);
    }
}

function openUnit(u, data) {
    currentUnitMeta = u; currentData = data;
    menuView.style.display = 'none'; stageView.style.display = 'block';
    qs('#stageTitle').textContent = u.label;
    renderStages();
}

function renderStages() {
    const p = getProg(); stageGrid.innerHTML = '';
    currentData.items.forEach((_, i) => {
        const btn = document.createElement('button');
        const done = p.completed.includes(i), open = i <= p.maxUnlockedIndex;
        btn.className = `stage-btn ${done ? 'stage-complete' : open ? 'stage-unlocked' : 'stage-locked'}`;
        btn.textContent = open ? i + 1 : '🔒';
        if (open) btn.onclick = () => startQuiz(i);
        stageGrid.appendChild(btn);
    });
}

function startQuiz(i) {
    currentIndex = i; currentStep = 1; typingWrongCount = 0;
    stageView.style.display = 'none'; gameView.style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const item = currentData.items[currentIndex];
    qs('#progressText').textContent = `${currentIndex + 1} / ${currentData.items.length}`;
    qs('#progressBar').style.width = `${((currentIndex + 1) / currentData.items.length) * 100}%`;
    qs('#promptBox').textContent = item.ko;
    qs('#hintBox').textContent = `${item.en.split(' ').length}단어`;
    
    if (currentStep === 1) {
        qs('#stepLabel').textContent = 'Step 1. 단어 배열';
        qs('#arrangeArea').style.display = 'block'; qs('#typingArea').style.display = 'none';
        qs('#answerArea').innerHTML = ''; qs('#wordBank').innerHTML = '';
        shuffle(item.en.split(' ')).forEach(w => {
            const b = document.createElement('button'); b.className = 'word-btn'; b.textContent = w;
            b.onclick = () => (b.parentElement.id==='wordBank'?qs('#answerArea'):qs('#wordBank')).appendChild(b);
            qs('#wordBank').appendChild(b);
        });
    } else {
        qs('#stepLabel').textContent = 'Step 2. 직접 타이핑';
        qs('#arrangeArea').style.display = 'none'; qs('#typingArea').style.display = 'block';
        typeInputEl.value = ''; autoResize(typeInputEl); typeInputEl.focus();
    }
}

function popup(ok, msg) {
    qs('#modalOverlay').style.display = 'flex';
    qs('#mTitle').textContent = ok ? "정답입니다!" : "오답입니다";
    qs('#mTitle').style.color = ok ? '#4caf50' : '#f44336';
    qs('#mMsg').textContent = msg;
}

qs('#checkBtn').onclick = () => {
    if (isProcessing) return;
    const ans = currentData.items[currentIndex].en;
    let ok = false;
    if (currentStep === 1) {
        const user = [...qs('#answerArea').children].map(n => n.textContent).join(' ');
        ok = clean(user) === clean(ans);
        popup(ok, ok ? "정확합니다. 다음 단계로 갑니다." : "배열 순서를 확인하세요.");
    } else {
        const user = typeInputEl.value;
        ok = clean(user) === clean(ans);
        if (ok) popup(true, "완료했습니다!");
        else { typingWrongCount++; popup(false, buildHintMessage(user, ans, typingWrongCount)); }
    }
    modalConfirmAction = async () => {
        if (ok) {
            if (currentStep === 1) { currentStep = 2; qs('#modalOverlay').style.display = 'none'; showQuestion(); }
            else {
                isProcessing = true;
                await saveProgress(currentIndex);
                qs('#modalOverlay').style.display = 'none';
                isProcessing = false;
                if (currentIndex < currentData.items.length - 1) startQuiz(currentIndex + 1);
                else { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); }
            }
        } else { qs('#modalOverlay').style.display = 'none'; if(currentStep===2) typeInputEl.focus(); }
    };
};

qs('#mYes').onclick = async () => { if(modalConfirmAction) await modalConfirmAction(); };
qs('#mNo').onclick = () => { qs('#modalOverlay').style.display = 'none'; stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); };
qs('#backBtn').onclick = () => { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); };
qs('#stageBackBtn').onclick = () => { stageView.style.display = 'none'; menuView.style.display = 'block'; renderUnits(); };
qs('#homeBtn').onclick = async () => {
    const { data } = await supabase.auth.getUser();
    if (!data?.user) { location.href = 'login.html'; return; }
    const { data: pD } = await supabase.from('profiles').select('role').eq('user_id', data.user.id).single();
    location.href = pD?.role === 'admin' ? 'admin.html' : 'class.html';
};

typeInputEl.oninput = () => autoResize(typeInputEl);
typeInputEl.onkeydown = (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        if (isProcessing) return;
        if (qs('#modalOverlay').style.display === 'flex') qs('#mYes').click();
        else qs('#checkBtn').click();
    }
};

gradeSelect.onchange = async () => { currentGrade = gradeSelect.value; await renderUnits(); };
bookSelect.onchange = async () => { currentBook = bookSelect.value; await renderUnits(); };

(async () => {
    await ensureAuth();
    await loadProgress();
    gradeSelect.innerHTML = '<option value="middle3">중3</option>';
    bookSelect.innerHTML = Object.entries(catalog.middle3.books).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    renderUnits();
})();
</script>
</body>
</html>
