<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영작 학습관</title>
<style>
/* 기본 스타일 최적화 */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
--card: #ffffff;
--line: #e5e7eb;
--text: #1f2937;
--muted: #6b7280;
--blue: #4f8cff;
--green: #4caf50;
--shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
}

html, body {
margin: 0; padding: 0; height: 100%;
font-family: Arial, sans-serif;
background: #f8fafc;
color: var(--text);
}

.wrap {
width: 100%; max-width: 800px;
margin: 0 auto; padding: 12px;
min-height: 100vh;
}

/* 상단 타이틀 간소화 */
.topbar {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 12px;
}

.title-box h1 {
margin: 0; font-size: 20px; font-weight: 800;
}

/* 필터 영역 컴팩트화 */
.panel {
background: var(--card);
border-radius: 16px;
box-shadow: var(--shadow);
padding: 12px;
margin-bottom: 12px;
}

.filter-grid {
display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}

.filter-card {
background: #f1f5f9; border-radius: 10px; padding: 8px;
}

.filter-card label {
display: block; font-size: 11px; color: var(--muted); font-weight: 800; margin-bottom: 2px;
}

.filter-card select {
width: 100%; height: 32px; border: 1px solid var(--line);
background: #fff; border-radius: 6px; font-size: 13px; font-weight: 700;
}

/* 단원 카드 그리드 - 작게 만들기 */
.unit-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
}

.unit-card {
border: 1px solid var(--line);
background: #fff; border-radius: 14px;
padding: 10px;
min-height: 100px; /* 높이 대폭 축소 */
display: flex; flex-direction: column; justify-content: space-between;
cursor: pointer; box-shadow: var(--shadow);
}

.badge {
display: inline-flex; padding: 3px 8px;
border-radius: 6px; font-size: 11px; font-weight: 800;
background: #eef4ff; color: #335ea8; margin-bottom: 6px;
}

.unit-title {
font-size: 14px; font-weight: 800; margin-bottom: 4px;
line-height: 1.2;
}

.meta {
color: var(--muted); font-size: 11px; line-height: 1.3;
}

/* 학습 화면 UI */
#stageView, #gameView { display: none; }

.grid-container {
display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px;
}

.stage-btn {
aspect-ratio: 1; font-size: 16px; border-radius: 12px; font-weight: 800;
}

.stage-unlocked { background: linear-gradient(180deg, #5aa6ff, #4f8cff); color: white; }
.stage-locked { background: #e2e8f0; color: #94a3b8; }
.stage-complete { background: linear-gradient(180deg, #5fc776, #4caf50); color: white; }

.progress-pill {
display: inline-flex; background: #eef4ff; color: #2f5da8;
border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 800;
}

.progress-bar-wrap {
width: 100%; height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 12px;
}

.progress-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.3s; }

.question-card {
background: #fff; border-radius: 18px; padding: 16px; border: 1px solid var(--line);
}

.prompt-box {
padding: 12px; background: #f0f7ff; border-radius: 12px;
font-weight: 700; font-size: 15px; margin-bottom: 10px;
}

.hint-box {
padding: 10px; background: #fff; border: 1px dashed #cbd5e1;
border-radius: 10px; font-size: 12px; color: var(--muted); margin-bottom: 10px;
}

.drop-zone {
min-height: 80px; border: 2px dashed #93c5fd; border-radius: 14px;
display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; margin-bottom: 10px;
}

.word-btn {
padding: 8px 12px; font-size: 13px; border-radius: 8px;
background: #4f8cff; color: white; font-weight: 700;
}

.type-input {
width: 100%; min-height: 60px; padding: 12px; font-size: 16px;
border: 2px solid #bfdbfe; border-radius: 12px; outline: none;
}

#checkBtn {
width: 100%; background: #4caf50; color: #fff; padding: 12px; font-size: 16px;
}

/* 모달 */
#modalOverlay {
position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
display: none; justify-content: center; align-items: center; padding: 20px; z-index: 2000;
}

.modal-content {
background: #fff; border-radius: 20px; padding: 20px; width: 100%; max-width: 320px; text-align: center;
}

.m-btn {
width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; font-weight: 800;
}

@media (max-width: 480px) {
    .unit-grid { grid-template-columns: 1fr 1fr; } /* 모달에서 단원 카드는 무조건 2열 */
}
</style>
</head>
<body>
<div class="wrap">
    <!-- 상단 바 (요약 정보 삭제됨) -->
    <div class="topbar">
        <div class="title-box"><h1>영작 학습관</h1></div>
        <button id="homeBtn" class="btn-light">홈</button>
    </div>

    <div id="menuView">
        <!-- 필터 영역 (학년/출판사 선택) -->
        <div class="panel">
            <div class="filter-grid">
                <div class="filter-card"><label>학년</label><select id="gradeSelect"></select></div>
                <div class="filter-card"><label>출판사</label><select id="bookSelect"></select></div>
            </div>
        </div>
        <!-- 단원 리스트 -->
        <div id="unitGrid" class="unit-grid"></div>
    </div>

    <!-- 번호 선택 화면 -->
    <div id="stageView">
        <div class="panel">
            <div class="quiz-head">
                <div><div class="progress-pill" id="stageTitle"></div></div>
                <button class="btn-light" id="stageBackBtn">목록</button>
            </div>
            <div id="stageGrid" class="grid-container" style="margin-top:12px;"></div>
        </div>
    </div>

    <!-- 문제 풀이 화면 -->
    <div id="gameView">
        <div class="panel">
            <div class="quiz-head">
                <div class="progress-pill" id="progressText"></div>
                <button class="btn-light" id="backBtn">뒤로</button>
            </div>
            <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
            <div class="question-card">
                <div id="stepLabel" class="step-label" style="font-size:11px; font-weight:800; color:#f97316; margin-bottom:8px; display:block;">Step 1</div>
                <div id="promptBox" class="prompt-box"></div>
                <div id="hintBox" class="hint-box"></div>
                <div id="arrangeArea"><div id="answerArea" class="drop-zone"></div><div id="wordBank" class="word-bank"></div></div>
                <div id="typingArea" style="display:none;"><textarea id="typeInput" class="type-input" placeholder="문장을 입력하세요..."></textarea></div>
                <div style="margin-top:12px;"><button id="checkBtn">제출</button></div>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-content">
        <h3 id="mTitle" style="margin:0 0 8px 0; font-size:18px;"></h3>
        <p id="mMsg" style="margin:0 0 16px 0; font-size:14px; line-height:1.5; color:#475569;"></p>
        <button class="m-btn" id="mYes" style="background:#4caf50; color:white;">확인</button>
        <button class="m-btn" id="mNo" style="background:#f1f5f9; color:#475569;">번호 목록</button>
    </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('https://uuzhdxangctewuklvmlv.supabase.co', 'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F');

const catalog = {
    middle3: { label: '중3', books: {
        donga_yoon: { label: '동아(윤정미)', units: [
            { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/donga_yoon/unit1.json' },
            { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/donga_yoon/unit2.json' },
            { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/donga_yoon/unit3.json' }
        ]},
        ybm_song: { label: 'YBM(송미정)', units: [
            { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/ybm_song/unit1.json' },
            { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/ybm_song/unit2.json' },
            { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/ybm_song/unit3.json' }
        ]}
    }}
};

const qs = s => document.querySelector(s);
const menuView = qs('#menuView'), stageView = qs('#stageView'), gameView = qs('#gameView');
const gradeSelect = qs('#gradeSelect'), bookSelect = qs('#bookSelect'), unitGrid = qs('#unitGrid'), stageGrid = qs('#stageGrid'), typeInputEl = qs('#typeInput');

let currentGrade = 'middle3', currentBook = 'donga_yoon', currentUnitMeta = null, currentData = null;
let currentIndex = 0, currentStep = 1, typingWrongCount = 0, modalConfirmAction = null, authUserId = null;
let unitProgressMap = new Map(), isProcessing = false;

// 유틸리티
const clean = t => String(t||'').toLowerCase().replace(/[.,!?“”‘’]/g,'').replace(/\s+/g,' ').trim();
const shuffle = a => { let c=[...a]; for(let i=c.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [c[i],c[j]]=[c[j],c[i]]; } return c; };

async function ensureAuth() {
    const { data } = await supabase.auth.getUser();
    if (!data.user) { location.href = 'login.html'; return; }
    authUserId = data.user.id;
}

async function loadProgress() {
    if (!authUserId) return;
    const { data } = await supabase.from('writing_unit_progress').select('*').eq('user_id', authUserId);
    unitProgressMap.clear();
    data?.forEach(r => unitProgressMap.set(`${r.grade_key}__${r.book_key}__${r.unit_id}`, { completed: r.completed_indexes || [], max: r.max_unlocked_index || 0 }));
}

function getProg(meta = currentUnitMeta) { return unitProgressMap.get(`${currentGrade}__${currentBook}__${meta.id}`) || { completed: [], max: 0 }; }

async function saveProgress(idx) {
    if (isProcessing) return;
    const key = `${currentGrade}__${currentBook}__${currentUnitMeta.id}`;
    let p = getProg();
    if (!p.completed.includes(idx)) p.completed.push(idx);
    p.max = Math.max(p.max, (idx + 1 < currentData.items.length ? idx + 1 : idx));
    
    await supabase.from('writing_unit_progress').upsert({
        user_id: authUserId, grade_key: currentGrade, book_key: currentBook, unit_id: currentUnitMeta.id,
        completed_indexes: p.completed, max_unlocked_index: p.max, updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,grade_key,book_key,unit_id' });

    unitProgressMap.set(key, p);
    // 전체 통계 동기화
    await supabase.from('writing_progress').upsert({
        user_id: authUserId, completed_count: p.completed.length, unit_total_count: currentData.items.length,
        unit_label: `${catalog[currentGrade].label} ${currentUnitMeta.label}`, last_completed_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
}

async function renderUnits() {
    unitGrid.innerHTML = '';
    for (const u of catalog[currentGrade].books[currentBook].units) {
        const res = await fetch(u.file), data = await res.json(), p = getProg(u);
        const card = document.createElement('button');
        card.className = 'unit-card';
        card.innerHTML = `<div><div class="badge">${u.label}</div><div class="unit-title">${u.title}</div></div>
                          <div class="meta">진도: ${p.completed.length}/${data.items.length} (${Math.round(p.completed.length/data.items.length*100)||0}%)</div>`;
        card.onclick = () => openUnit(u, data);
        unitGrid.appendChild(card);
    }
}

function openUnit(u, data) {
    currentUnitMeta = u; currentData = data;
    menuView.style.display = 'none'; stageView.style.display = 'block';
    qs('#stageTitle').textContent = u.label;
    renderStages();
}

function renderStages() {
    const p = getProg(); stageGrid.innerHTML = '';
    currentData.items.forEach((_, i) => {
        const btn = document.createElement('button');
        const done = p.completed.includes(i), open = i <= p.max;
        btn.className = `stage-btn ${done ? 'stage-complete' : open ? 'stage-unlocked' : 'stage-locked'}`;
        btn.textContent = open ? i + 1 : '🔒';
        if (open) btn.onclick = () => startQuiz(i);
        stageGrid.appendChild(btn);
    });
}

function startQuiz(i) {
    currentIndex = i; currentStep = 1; typingWrongCount = 0;
    stageView.style.display = 'none'; gameView.style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const item = currentData.items[currentIndex];
    qs('#progressText').textContent = `${currentIndex + 1} / ${currentData.items.length}`;
    qs('#progressBar').style.width = `${((currentIndex + 1) / currentData.items.length) * 100}%`;
    qs('#promptBox').textContent = item.ko;
    qs('#hintBox').textContent = `${item.en.split(' ').length}단어`;
    
    if (currentStep === 1) {
        qs('#stepLabel').textContent = 'Step 1. 단어 배열';
        qs('#arrangeArea').style.display = 'block'; qs('#typingArea').style.display = 'none';
        qs('#answerArea').innerHTML = ''; qs('#wordBank').innerHTML = '';
        shuffle(item.en.split(' ')).forEach(w => {
            const b = document.createElement('button'); b.className = 'word-btn'; b.textContent = w;
            b.onclick = () => (b.parentElement.id==='wordBank'?qs('#answerArea'):qs('#wordBank')).appendChild(b);
            qs('#wordBank').appendChild(b);
        });
    } else {
        qs('#stepLabel').textContent = 'Step 2. 직접 입력';
        qs('#arrangeArea').style.display = 'none'; qs('#typingArea').style.display = 'block';
        typeInputEl.value = ''; typeInputEl.focus();
    }
}

function buildHint(input, answer, count) {
    const inW = clean(input).split(' '), anW = clean(answer).split(' '), wrong = [];
    anW.forEach((w, i) => { if(inW[i] !== w) wrong.push(i); });
    if (count === 1) return `틀린 단어가 ${wrong.length}개 있습니다.`;
    if (count === 2) return `${wrong.map(i => i+1).join(', ')}번째를 확인하세요.`;
    return wrong.map(i => `${i+1}번째(${anW[i][0]}...)`).join(', ') + " 확인 필요";
}

qs('#checkBtn').onclick = () => {
    if (isProcessing) return;
    const ans = currentData.items[currentIndex].en;
    let ok = false;
    if (currentStep === 1) {
        const user = [...qs('#answerArea').children].map(n => n.textContent).join(' ');
        ok = clean(user) === clean(ans);
        qs('#mTitle').textContent = ok ? "정답!" : "오답";
        qs('#mMsg').textContent = ok ? "정확합니다. 다음 단계로 갑니다." : "배열 순서를 확인하세요.";
    } else {
        const user = typeInputEl.value;
        ok = clean(user) === clean(ans);
        if (ok) { qs('#mTitle').textContent = "참 잘했어요!"; qs('#mMsg').textContent = "이 문장을 마스터했습니다."; }
        else { typingWrongCount++; qs('#mTitle').textContent = "오답"; qs('#mMsg').textContent = buildHint(user, ans, typingWrongCount); }
    }
    qs('#modalOverlay').style.display = 'flex';
    
    modalConfirmAction = async () => {
        if (ok) {
            if (currentStep === 1) { currentStep = 2; qs('#modalOverlay').style.display = 'none'; showQuestion(); }
            else {
                isProcessing = true;
                await saveProgress(currentIndex);
                qs('#modalOverlay').style.display = 'none';
                isProcessing = false;
                if (currentIndex < currentData.items.length - 1) startQuiz(currentIndex + 1);
                else { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); }
            }
        } else { qs('#modalOverlay').style.display = 'none'; if(currentStep===2) typeInputEl.focus(); }
    };
};

qs('#mYes').onclick = async () => { if(modalConfirmAction) await modalConfirmAction(); };
qs('#mNo').onclick = () => { qs('#modalOverlay').style.display = 'none'; stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); };
qs('#backBtn').onclick = () => { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStages(); };
qs('#stageBackBtn').onclick = () => { stageView.style.display = 'none'; menuView.style.display = 'block'; renderUnits(); };
qs('#homeBtn').onclick = async () => {
    const { data } = await supabase.auth.getUser();
    if (!data?.user) { location.href = 'login.html'; return; }
    const { data: pD } = await supabase.from('profiles').select('role').eq('user_id', data.user.id).single();
    location.href = pD?.role === 'admin' ? 'admin.html' : 'class.html';
};

typeInputEl.onkeydown = (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        if (qs('#modalOverlay').style.display === 'flex') qs('#mYes').click();
        else qs('#checkBtn').click();
    }
};

gradeSelect.onchange = async () => { currentGrade = gradeSelect.value; await renderUnits(); };
bookSelect.onchange = async () => { currentBook = bookSelect.value; await renderUnits(); };

(async () => {
    await ensureAuth();
    await loadProgress();
    gradeSelect.innerHTML = '<option value="middle3">중3</option>';
    bookSelect.innerHTML = Object.entries(catalog.middle3.books).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    renderUnits();
})();
</script>
</body>
</html>
