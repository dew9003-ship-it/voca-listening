<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영작 학습관</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--card:#ffffff;--line:#e5e7eb;--text:#1f2937;--muted:#6b7280;--blue:#4f8cff;--green:#4caf50;--shadow:0 10px 30px rgba(15,23,42,.08)}
html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;background:linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%);color:var(--text)}
body{display:flex}.wrap{width:100%;max-width:1100px;margin:0 auto;padding:20px;min-height:100vh}
.topbar,.panel-head,.quiz-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.topbar{margin-bottom:18px}.title-box h1{margin:0;font-size:30px;font-weight:800}.title-box p{margin:8px 0 0;color:var(--muted);font-size:14px}
.btns{display:flex;gap:8px;flex-wrap:wrap}button,select,input{border:none;border-radius:14px;font-size:14px;font-weight:700}button{cursor:pointer}.btn-light{background:#fff;color:#334155;border:1px solid var(--line);padding:11px 16px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px}.summary-card,.panel{background:var(--card);border-radius:24px;box-shadow:var(--shadow)}.summary-card{padding:18px}.summary-card .label{color:var(--muted);font-size:13px;margin-bottom:8px}.summary-card .value{font-size:28px;font-weight:800}
.panel{padding:18px;margin-bottom:18px}.panel-head p{margin:6px 0 0;color:var(--muted);font-size:13px}.filter-grid,.unit-grid{display:grid;gap:12px}.filter-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.filter-card{background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);border:1px solid var(--line);border-radius:18px;padding:16px}.filter-card label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:800}.filter-card select{width:100%;height:46px;border:1px solid var(--line);background:#fff;padding:0 12px}
.unit-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}.unit-card{border:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);border-radius:18px;padding:16px;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}.badge{display:inline-flex;width:max-content;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;background:#eef4ff;color:#335ea8;margin-bottom:10px}.unit-title{font-size:18px;font-weight:800;margin-bottom:10px}.meta{color:var(--muted);font-size:12px;line-height:1.6}
#stageView,#gameView{display:none}.grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:12px}.stage-btn{aspect-ratio:1;font-size:18px;border-radius:18px;font-weight:800}.stage-unlocked{background:linear-gradient(180deg,#5aa6ff 0%, #4f8cff 100%);color:white}.stage-locked{background:#e5e7eb;color:#9ca3af}.stage-complete{background:linear-gradient(180deg,#5fc776 0%, #4caf50 100%);color:white}
.progress-pill{display:inline-flex;align-items:center;background:#eef4ff;color:#2f5da8;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700}.progress-bar-wrap{width:100%;height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:18px}.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#4f8cff,#6fcf97)}
.question-card{background:linear-gradient(180deg,#fff 0%,#fafcff 100%);border:1px solid var(--line);border-radius:22px;padding:22px}.step-label{display:inline-block;padding:7px 12px;border-radius:999px;background:#fff4e8;color:#f97316;font-size:12px;font-weight:800;margin-bottom:14px}.prompt-box{padding:14px 16px;background:#eef6ff;border:1px solid #cfe1ff;border-radius:16px;font-weight:700;font-size:16px;line-height:1.6;margin-bottom:14px}.hint-box{padding:12px 14px;background:#fff;border:1px dashed #d7dbe3;border-radius:14px;font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.drop-zone{min-height:120px;border:2px dashed #93c5fd;border-radius:18px;background:#fff;display:flex;flex-wrap:wrap;gap:10px;padding:14px;align-content:flex-start;justify-content:center;margin-bottom:12px}.word-bank{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.word-btn{padding:10px 14px;font-size:14px;border-radius:12px;background:#4f8cff;color:white;border:none;font-weight:800;cursor:pointer}
#typingArea{display:none}.type-input{width:100%;min-height:64px;padding:14px 16px;font-size:18px;border:2px solid #bfdbfe;border-radius:18px;outline:none}
#checkBtn{min-width:140px;background:#4caf50;color:#fff;padding:13px 18px}
#modalOverlay{position:fixed;inset:0;background:rgba(15,23,42,.56);display:none;justify-content:center;align-items:center;padding:20px}.modal-content{background:#fff;border-radius:24px;padding:24px;width:min(92vw,380px);text-align:center;box-shadow:0 24px 60px rgba(15,23,42,.18)}.m-btn{width:100%;padding:15px;margin-top:10px;border-radius:14px;border:none;font-weight:800;font-size:16px;cursor:pointer}
@media (max-width:640px){.wrap{padding:12px}.title-box h1{font-size:25px}.grid-container{grid-template-columns:repeat(4,minmax(0,1fr))}.word-btn{padding:8px 10px;font-size:13px}.type-input{min-height:56px;padding:12px 14px;font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar"><div class="title-box"><h1>영작 학습관</h1><p>학년 → 출판사 → 단원 → 번호 선택 후 2단계로 학습합니다.</p></div><div class="btns"><button id="homeBtn" class="btn-light">학습 홈</button></div></div>
<div id="menuView">
<div class="summary-grid">
<div class="summary-card"><div class="label">학년</div><div class="value" id="summaryGrade">중3</div></div>
<div class="summary-card"><div class="label">출판사</div><div class="value" id="summaryBook" style="font-size:22px;">동아(윤정미)</div></div>
<div class="summary-card"><div class="label">최근 학습</div><div class="value" id="recentUnit" style="font-size:22px;">-</div></div>
</div>
<div class="panel"><div class="panel-head"><div><h2>카테고리 선택</h2><p>JSON 파일 기반으로 단원을 불러옵니다.</p></div></div><div class="filter-grid"><div class="filter-card"><label>학년</label><select id="gradeSelect"></select></div><div class="filter-card"><label>출판사</label><select id="bookSelect"></select></div></div></div>
<div class="panel"><div class="panel-head"><div><h2>단원 선택</h2><p>단원을 누르면 번호 선택 화면으로 들어갑니다.</p></div></div><div id="unitGrid" class="unit-grid"></div></div>
</div>
<div id="stageView"><div class="panel"><div class="quiz-head"><div><div class="progress-pill" id="stageTitle">단원</div><p id="stageDesc" style="margin:10px 0 0;color:#6b7280;font-size:14px;">번호를 선택해 시작하세요.</p></div><div class="btns"><button class="btn-light" id="stageBackBtn">단원 목록</button></div></div><div id="stageGrid" class="grid-container"></div></div></div>
<div id="gameView"><div class="panel"><div class="quiz-head"><div><div class="progress-pill" id="progressText">1 / 1</div><p id="coursePath" style="margin:10px 0 0;color:#6b7280;font-size:14px;">중3 · 동아(윤정미) · 1과 · 1번</p></div><div class="btns"><button class="btn-light" id="backBtn">번호 목록</button></div></div><div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div><div class="question-card"><div id="stepLabel" class="step-label">Step 1 · 단어 배열</div><div id="promptBox" class="prompt-box"></div><div id="hintBox" class="hint-box"></div><div id="arrangeArea"><div id="answerArea" class="drop-zone"></div><div id="wordBank" class="word-bank"></div></div><div id="typingArea"><input id="typeInput" class="type-input" type="text" placeholder="영어 문장을 입력하세요..." /></div><div style="display:flex;justify-content:flex-end;margin-top:12px;"><button id="checkBtn">제출</button></div></div></div></div>
</div>
<div id="modalOverlay"><div class="modal-content"><h3 id="mTitle" style="margin:0 0 10px 0;">결과</h3><p id="mMsg" style="margin:0 0 20px 0; line-height:1.6;"></p><button class="m-btn" id="mYes" style="background:#4caf50;color:white;">확인</button><button class="m-btn" id="mNo" style="background:#eee;color:#333;">번호 목록</button></div></div>
<script>
const catalog={middle3:{label:'중3',books:{donga_yoon:{label:'동아(윤정미)',units:[{id:'unit1',label:'1과',title:'Lesson 1',file:'writing/middle3/donga_yoon/unit1.json'},{id:'unit2',label:'2과',title:'Lesson 2',file:'writing/middle3/donga_yoon/unit2.json'},{id:'unit3',label:'3과',title:'Lesson 3',file:'writing/middle3/donga_yoon/unit3.json'}]}}}};
const qs=s=>document.querySelector(s), menuView=qs('#menuView'), stageView=qs('#stageView'), gameView=qs('#gameView'), gradeSelect=qs('#gradeSelect'), bookSelect=qs('#bookSelect'), unitGrid=qs('#unitGrid'), stageGrid=qs('#stageGrid');
let currentGrade='middle3', currentBook='donga_yoon', currentUnitMeta=null, currentData=null, currentIndex=0, currentStep=1;
const getProgress=(meta=currentUnitMeta)=>JSON.parse(localStorage.getItem(`writing_progress_${currentGrade}_${currentBook}_${meta.id}`)||'{"maxUnlockedIndex":0,"completed":[]}');
const setProgress=(obj)=>{localStorage.setItem(`writing_progress_${currentGrade}_${currentBook}_${currentUnitMeta.id}`,JSON.stringify(obj));localStorage.setItem('writing_recent_unit',JSON.stringify({grade:catalog[currentGrade].label,unit:currentUnitMeta.label}))};
const clean=t=>String(t||'').toLowerCase().replace(/[’']/g,"'").replace(/[^a-z0-9'\s.,?!-]/g,'').replace(/\s+/g,' ').trim();
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function updateSummary(){qs('#summaryGrade').textContent=catalog[currentGrade].label;qs('#summaryBook').textContent=catalog[currentGrade].books[currentBook].label;const r=JSON.parse(localStorage.getItem('writing_recent_unit')||'null');qs('#recentUnit').textContent=r?`${r.grade} ${r.unit}`:'-'}
function populate(){gradeSelect.innerHTML='<option value="middle3">중3</option>';bookSelect.innerHTML='<option value="donga_yoon">동아(윤정미)</option>';updateSummary()}
async function renderUnits(){unitGrid.innerHTML='';for(const unit of catalog[currentGrade].books[currentBook].units){const res=await fetch(unit.file);const data=await res.json();const p=getProgress(unit), total=data.items.length, done=(p.completed||[]).length, percent=Math.round(done/total*100);const b=document.createElement('button');b.className='unit-card';b.innerHTML=`<div><div class="badge">${unit.label}</div><div class="unit-title">${unit.title}</div></div><div class="meta">문장 수: ${total}<br>진도: ${done} / ${total} (${percent}%)</div>`;b.onclick=()=>openUnit(unit);unitGrid.appendChild(b)}}
async function openUnit(unit){currentUnitMeta=unit;currentData=await (await fetch(unit.file)).json();menuView.style.display='none';stageView.style.display='block';gameView.style.display='none';qs('#stageTitle').textContent=`${catalog[currentGrade].label} · ${catalog[currentGrade].books[currentBook].label} · ${unit.label}`;qs('#stageDesc').textContent=`${currentData.items.length}개 문장 중 번호를 선택하세요.`;renderStageGrid()}
function renderStageGrid(){const p=getProgress();stageGrid.innerHTML='';currentData.items.forEach((_,idx)=>{const b=document.createElement('button');const done=(p.completed||[]).includes(idx), open=idx<=p.maxUnlockedIndex;b.className='stage-btn '+(done?'stage-complete':open?'stage-unlocked':'stage-locked');b.textContent=open?idx+1:'🔒';if(open)b.onclick=()=>startQuestion(idx);stageGrid.appendChild(b)})}
function startQuestion(idx){currentIndex=idx;currentStep=1;stageView.style.display='none';gameView.style.display='block';renderQuestion()}
function renderQuestion(){const item=currentData.items[currentIndex], total=currentData.items.length;qs('#progressText').textContent=`${currentIndex+1} / ${total}`;qs('#progressBar').style.width=`${(currentIndex+1)/total*100}%`;qs('#coursePath').textContent=`중3 · 동아(윤정미) · ${currentUnitMeta.label} · ${currentIndex+1}번`;qs('#promptBox').textContent=item.ko;qs('#hintBox').textContent=`정답 문장 길이: ${item.en.split(' ').length}단어`;if(currentStep===1){qs('#stepLabel').textContent='Step 1 · 단어 배열';qs('#arrangeArea').style.display='block';qs('#typingArea').style.display='none';qs('#answerArea').innerHTML='';qs('#wordBank').innerHTML='';shuffle(item.en.split(' ')).forEach(w=>{const b=document.createElement('button');b.className='word-btn';b.textContent=w;b.onclick=()=>b.parentElement.id==='wordBank'?qs('#answerArea').appendChild(b):qs('#wordBank').appendChild(b);qs('#wordBank').appendChild(b)})}else{qs('#stepLabel').textContent='Step 2 · 직접 타이핑';qs('#arrangeArea').style.display='none';qs('#typingArea').style.display='block';qs('#typeInput').value='';qs('#typeInput').focus()}}
function popup(ok,msg){qs('#modalOverlay').style.display='flex';qs('#mTitle').textContent=ok?'정답입니다!':'오답입니다';qs('#mTitle').style.color=ok?'#4caf50':'#f44336';qs('#mMsg').textContent=msg}
function complete(){const p=getProgress(), c=[...(p.completed||[])];if(!c.includes(currentIndex))c.push(currentIndex);let m=p.maxUnlockedIndex||0;if(currentIndex===m && currentIndex<currentData.items.length-1)m++;setProgress({maxUnlockedIndex:m,completed:c});renderStageGrid();stageView.style.display='block';gameView.style.display='none';qs('#modalOverlay').style.display='none';updateSummary()}
qs('#checkBtn').onclick=()=>{const ans=currentData.items[currentIndex].en;let ok=false;if(currentStep===1){ok=clean([...qs('#answerArea').children].map(n=>n.textContent).join(' '))===clean(ans);popup(ok,ok?'배열이 정확합니다. 이제 직접 타이핑으로 넘어갑니다.':'단어 순서를 다시 확인해 보세요.')}else{ok=clean(qs('#typeInput').value)===clean(ans);popup(ok,ok?'직접 타이핑까지 완료했습니다.':'다시 입력해 보세요.')}qs('#mYes').onclick=()=>{if(ok){if(currentStep===1){currentStep=2;qs('#modalOverlay').style.display='none';renderQuestion()}else complete()}else{qs('#modalOverlay').style.display='none';if(currentStep===2)qs('#typeInput').focus()}}};
qs('#mNo').onclick=()=>{qs('#modalOverlay').style.display='none';stageView.style.display='block';gameView.style.display='none'};qs('#backBtn').onclick=()=>{stageView.style.display='block';gameView.style.display='none'};qs('#stageBackBtn').onclick=()=>{stageView.style.display='none';menuView.style.display='block';renderUnits();updateSummary()};qs('#homeBtn').onclick=()=>alert('학습 홈 경로로 연결해 주세요.');qs('#typeInput').addEventListener('keydown',e=>{if(e.key==='Enter')qs('#checkBtn').click()});
populate();renderUnits();updateSummary();
</script>
</body>
</html>
