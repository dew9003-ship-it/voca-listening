<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영작 학습관</title>
<style>
/* 원본 스타일 100% 유지 */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --card: #ffffff; --line: #e5e7eb; --text: #1f2937; --muted: #6b7280; --blue: #4f8cff; --green: #4caf50; --orange: #ff9800; --shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: linear-gradient(180deg, #eff5ff 0%, #f4f7fb 35%, #eef8f1 100%); color: var(--text); }
body { display: flex; }
.wrap { width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px; min-height: 100vh; }
.topbar, .panel-head, .quiz-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
.topbar { margin-bottom: 18px; }
.title-box { display: flex; align-items: center; gap: 100px; }
.title-box h1 { margin: 0; font-size: 30px; font-weight: 800; }
.btns { display: flex; gap: 8px; flex-wrap: wrap; }
button, select, input { border: none; border-radius: 14px; font-size: 14px; font-weight: 700; }
button { cursor: pointer; }
.btn-light { background: #fff; color: #334155; border: 1px solid var(--line); padding: 11px 16px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin-bottom: 18px; }
.summary-card, .panel { background: var(--card); border-radius: 24px; box-shadow: var(--shadow); }
.summary-card { padding: 18px; }
.summary-card .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
.summary-card .value { font-size: 28px; font-weight: 800; }
.panel { padding: 18px; margin-bottom: 18px; }
.panel-head p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
.filter-grid, .unit-grid { display: grid; gap: 12px; }
.filter-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
.filter-card { background: linear-gradient(180deg, #fff 0%, #fbfdff 100%); border: 1px solid var(--line); border-radius: 18px; padding: 16px; }
.filter-card label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 800; }
.filter-card select { width: 100%; height: 46px; border: 1px solid var(--line); background: #fff; padding: 0 12px; }
.unit-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
.unit-card { border: 1px solid var(--line); background: linear-gradient(180deg, #fff 0%, #fbfdff 100%); border-radius: 18px; padding: 16px; min-height: 160px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
.badge { display: inline-flex; width: max-content; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #eef4ff; color: #335ea8; margin-bottom: 10px; }
.unit-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
.meta { color: var(--muted); font-size: 12px; line-height: 1.6; }
#stageView, #gameView { display: none; }
.grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 12px; }
.stage-btn { aspect-ratio: 1; font-size: 18px; border-radius: 18px; font-weight: 800; }
.stage-unlocked { background: linear-gradient(180deg, #5aa6ff 0%, #4f8cff 100%); color: white; }
.stage-locked { background: #e5e7eb; color: #9ca3af; }
.stage-complete { background: linear-gradient(180deg, #5fc776 0%, #4caf50 100%); color: white; }
.progress-pill { display: inline-flex; align-items: center; background: #eef4ff; color: #2f5da8; border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
.progress-bar-wrap { width: 100%; height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4f8cff, #6fcf97); transition: width 0.3s; }
.question-card { background: linear-gradient(180deg, #fff 0%, #fafcff 100%); border: 1px solid var(--line); border-radius: 22px; padding: 22px; }
.step-label { display: inline-block; padding: 7px 12px; border-radius: 999px; background: #fff4e8; color: #f97316; font-size: 12px; font-weight: 800; margin-bottom: 14px; }
.prompt-box { padding: 14px 16px; background: #eef6ff; border: 1px solid #cfe1ff; border-radius: 16px; font-weight: 700; font-size: 16px; line-height: 1.6; margin-bottom: 14px; }
.hint-box { padding: 12px 14px; background: #fff; border: 1px dashed #d7dbe3; border-radius: 14px; font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
.drop-zone { min-height: 120px; border: 2px dashed #93c5fd; border-radius: 18px; background: #fff; display: flex; flex-wrap: wrap; gap: 10px; padding: 14px; align-content: flex-start; justify-content: center; margin-bottom: 12px; }
.word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.word-btn { padding: 10px 14px; font-size: 14px; border-radius: 12px; background: #4f8cff; color: white; border: none; font-weight: 800; cursor: pointer; }
#typingArea { display: none; }
.type-input { width: 100%; min-height: 64px; max-height: 220px; padding: 14px 16px; font-size: 18px; line-height: 1.5; border: 2px solid #bfdbfe; border-radius: 18px; outline: none; resize: none; overflow-y: auto; font-family: Arial, sans-serif; }
#checkBtn { min-width: 140px; background: #4caf50; color: #fff; padding: 13px 18px; }
#modalOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.56); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 1000; }
.modal-content { background: #fff; border-radius: 24px; padding: 24px; width: min(92vw, 380px); text-align: center; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18); }
.m-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 14px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
<div class="topbar"><div class="title-box"><h1>영작 학습관</h1><button id="homeBtn" class="btn-light">학습 홈</button></div></div>
<div id="menuView">
<div class="summary-grid">
<div class="summary-card"><div class="label">학년</div><div class="value" id="summaryGrade">중3</div></div>
<div class="summary-card"><div class="label">출판사</div><div class="value" id="summaryBook" style="font-size:22px;">동아(윤정미)</div></div>
<div class="summary-card"><div class="label">최근 학습</div><div class="value" id="recentUnit" style="font-size:22px;">-</div></div>
</div>
<div class="panel">
<div class="panel-head"><h2>카테고리 선택</h2></div>
<div class="filter-grid">
<div class="filter-card"><label>학년</label><select id="gradeSelect"></select></div>
<div class="filter-card"><label>출판사</label><select id="bookSelect"></select></div>
</div>
</div>
<div class="panel"><div class="panel-head"><h2>단원 선택</h2><p>단원을 누르면 번호 선택 화면으로 들어갑니다.</p></div><div id="unitGrid" class="unit-grid"></div></div>
</div>
<div id="stageView">
<div class="panel">
<div class="quiz-head">
<div><div class="progress-pill" id="stageTitle">단원</div><p id="stageDesc" style="margin:10px 0 0;color:#6b7280;font-size:14px;"></p></div>
<div class="btns"><button class="btn-light" id="stageBackBtn">단원 목록</button></div>
</div>
<div id="stageGrid" class="grid-container" style="margin-top:20px;"></div>
</div>
</div>
<div id="gameView">
<div class="panel">
<div class="quiz-head">
<div><div class="progress-pill" id="progressText">1 / 1</div><p id="coursePath" style="margin:10px 0 0;color:#6b7280;font-size:14px;"></p></div>
<div class="btns"><button class="btn-light" id="backBtn">번호 목록</button></div>
</div>
<div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
<div class="question-card">
<div id="stepLabel" class="step-label">Step 1</div>
<div id="promptBox" class="prompt-box"></div>
<div id="hintBox" class="hint-box"></div>
<div id="arrangeArea"><div id="answerArea" class="drop-zone"></div><div id="wordBank" class="word-bank"></div></div>
<div id="typingArea"><textarea id="typeInput" class="type-input" placeholder="영어 문장을 입력하세요..." rows="2"></textarea></div>
<div style="display:flex;justify-content:flex-end;margin-top:12px;"><button id="checkBtn">제출</button></div>
</div>
</div>
</div>
</div>
<div id="modalOverlay">
<div class="modal-content"><h3 id="mTitle">결과</h3><p id="mMsg"></p><button class="m-btn" id="mYes" style="background:#4caf50;color:white;">확인</button><button class="m-btn" id="mNo" style="background:#eee;color:#333;">번호 목록</button></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('https://uuzhdxangctewuklvmlv.supabase.co', 'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F');

// [복구] 기존 카탈로그 100% 유지
const catalog = {
  middle3: { label: '중3', books: {
    donga_yoon: { label: '동아(윤정미)', units: [
      { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/donga_yoon/unit1.json' },
      { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/donga_yoon/unit2.json' },
      { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/donga_yoon/unit3.json' }
    ]},
    ybm_song: { label: 'YBM(송미정)', units: [
      { id: 'unit1', label: '1과', title: 'Lesson 1', file: 'writing/middle3/ybm_song/unit1.json' },
      { id: 'unit2', label: '2과', title: 'Lesson 2', file: 'writing/middle3/ybm_song/unit2.json' },
      { id: 'unit3', label: '3과', title: 'Lesson 3', file: 'writing/middle3/ybm_song/unit3.json' }
    ]}
  }}
};

const qs = s => document.querySelector(s);
const menuView = qs('#menuView'), stageView = qs('#stageView'), gameView = qs('#gameView');
const gradeSelect = qs('#gradeSelect'), bookSelect = qs('#bookSelect'), unitGrid = qs('#unitGrid'), stageGrid = qs('#stageGrid');
const typeInputEl = qs('#typeInput');

let currentGrade = 'middle3', currentBook = 'donga_yoon', currentUnitMeta = null, currentData = null;
let currentIndex = 0, currentStep = 1, typingWrongCount = 0, modalConfirmAction = null, authUserId = null;
let unitProgressMap = new Map(), recentUnitText = '-', isProcessing = false;

// [복구] 기존 유틸리티 함수 100% 보존
async function ensureAuthUser() {
  const { data, error } = await supabase.auth.getUser();
  if (error || !data.user) { location.href = 'login.html'; return null; }
  authUserId = data.user.id; return data.user;
}
function getUnitProgressKey(g, b, u) { return `${g}__${b}__${u}`; }
function getCurrentUnitProgressKey(meta = currentUnitMeta) { if(!meta) return ''; return getUnitProgressKey(currentGrade, currentBook, meta.id); }
function normalizeProgressRow(row) {
  const completed = Array.isArray(row?.completed_indexes) ? row.completed_indexes.map(v => Number(v)).filter(v => Number.isInteger(v) && v >= 0) : [];
  const uniqueCompleted = [...new Set(completed)].sort((a, b) => a - b);
  const maxUnlockedIndex = Number.isInteger(row?.max_unlocked_index) ? Math.max(0, row.max_unlocked_index) : 0;
  return { completed: uniqueCompleted, maxUnlockedIndex };
}
async function loadAllUnitProgress() {
  if (!authUserId) return;
  const { data, error } = await supabase.from('writing_unit_progress').select('*').eq('user_id', authUserId);
  if (error) return;
  unitProgressMap = new Map(); let latestT = 0, latestL = '-';
  for (const row of data || []) {
    const key = getUnitProgressKey(row.grade_key, row.book_key, row.unit_id);
    unitProgressMap.set(key, normalizeProgressRow(row));
    const ut = row.updated_at ? new Date(row.updated_at).getTime() : 0;
    if (ut > latestT) {
      latestT = ut;
      const bL = catalog[row.grade_key]?.books[row.book_key]?.label || row.book_key;
      const uM = catalog[row.grade_key]?.books[row.book_key]?.units?.find(u => u.id === row.unit_id);
      latestL = `${catalog[row.grade_key]?.label} ${uM?.label || row.unit_id}`;
    }
  }
  recentUnitText = latestL; updateSummary();
}
function getProgress(meta = currentUnitMeta) { return unitProgressMap.get(getCurrentUnitProgressKey(meta)) || { completed: [], maxUnlockedIndex: 0 }; }
async function saveUnitProgress(pObj) {
  if (!authUserId || !currentUnitMeta) return;
  const norm = normalizeProgressRow({ completed_indexes: pObj.completed, max_unlocked_index: pObj.maxUnlockedIndex });
  await supabase.from('writing_unit_progress').upsert({
    user_id: authUserId, grade_key: currentGrade, book_key: currentBook, unit_id: currentUnitMeta.id,
    completed_indexes: norm.completed, max_unlocked_index: norm.maxUnlockedIndex, updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,grade_key,book_key,unit_id' });
  unitProgressMap.set(getCurrentUnitProgressKey(), norm);
  recentUnitText = `${catalog[currentGrade].label} ${currentUnitMeta.label}`;
}
function clean(t) { return String(t || '').toLowerCase().replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/[.,!?"]/g, '').replace(/\s+/g, ' ').trim(); }
function shuffle(a) { let c = [...a]; for (let i = c.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [c[i], c[j]] = [c[j], c[i]]; } return c; }
function autoResizeTextarea(el) { if (!el) return; el.style.height = 'auto'; el.style.height = `${el.scrollHeight}px`; }
function tokensOf(t) { return clean(t).split(' ').filter(Boolean); }
function getWrongIndexes(userInput, answer) {
  const uT = tokensOf(userInput), aT = tokensOf(answer), wrong = [];
  for (let i = 0; i < aT.length; i++) { if (uT[i] !== aT[i]) wrong.push(i); }
  return { wrong, answerTokens: aT };
}
function buildHintMessage(userInput, answer, wrongCount) {
  const { wrong, answerTokens } = getWrongIndexes(userInput, answer);
  if (!wrong.length) return '다시 확인해 보세요.';
  if (wrongCount === 1) return `틀린 단어가 ${wrong.length}개 있어요.`;
  if (wrongCount === 2) return `${wrong.map(i => `${i + 1}번째`).join(', ')} 단어를 다시 확인해 보세요.`;
  return wrong.map(i => `${i + 1}번째(${answerTokens[i][0]})`).join(', ') + " 단어를 확인하세요.";
}
function updateSummary() {
  qs('#summaryGrade').textContent = catalog[currentGrade].label;
  qs('#summaryBook').textContent = catalog[currentGrade].books[currentBook].label;
  qs('#recentUnit').textContent = recentUnitText || '-';
}
async function syncWritingSummaryToSupabase() {
  if (!authUserId || !currentUnitMeta || !currentData?.items?.length) return;
  const p = getProgress();
  await supabase.from('writing_progress').upsert({
    user_id: authUserId, completed_count: p.completed.length, unit_total_count: currentData.items.length,
    unit_label: `${catalog[currentGrade].label} ${catalog[currentGrade].books[currentBook].label} ${currentUnitMeta.label}`, last_completed_at: new Date().toISOString()
  }, { onConflict: 'user_id' });
}
function populate() {
  gradeSelect.innerHTML = '<option value="middle3">중3</option>';
  bookSelect.innerHTML = Object.entries(catalog[currentGrade].books).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('');
  if (!catalog[currentGrade].books[currentBook]) currentBook = Object.keys(catalog[currentGrade].books)[0];
  bookSelect.value = currentBook; updateSummary();
}
async function renderUnits() {
  unitGrid.innerHTML = '';
  for (const u of catalog[currentGrade].books[currentBook].units) {
    const res = await fetch(u.file), data = await res.json(), p = getProgress(u);
    const total = data.items.length, done = p.completed.length;
    const btn = document.createElement('button'); btn.className = 'unit-card';
    btn.innerHTML = `<div><div class="badge">${u.label}</div><div class="unit-title">${u.title}</div></div><div class="meta">문장 수: ${total}<br>진도: ${done} / ${total} (${total > 0 ? Math.round(done / total * 100) : 0}%)</div>`;
    btn.onclick = () => openUnit(u); unitGrid.appendChild(btn);
  }
}
async function openUnit(unit) {
  currentUnitMeta = unit; currentData = await (await fetch(unit.file)).json();
  menuView.style.display = 'none'; stageView.style.display = 'block'; gameView.style.display = 'none';
  qs('#stageTitle').textContent = `${catalog[currentGrade].label} · ${catalog[currentGrade].books[currentBook].label} · ${unit.label}`;
  qs('#stageDesc').textContent = `${currentData.items.length}개 문장 중 번호를 선택하세요.`;
  renderStageGrid();
}
function renderStageGrid() {
  const p = getProgress(); stageGrid.innerHTML = '';
  currentData.items.forEach((_, idx) => {
    const btn = document.createElement('button'), isDone = p.completed.includes(idx), isOpen = idx <= p.maxUnlockedIndex;
    btn.className = 'stage-btn ' + (isDone ? 'stage-complete' : isOpen ? 'stage-unlocked' : 'stage-locked');
    btn.textContent = isOpen ? idx + 1 : '🔒';
    if (isOpen) btn.onclick = () => startQuestion(idx);
    stageGrid.appendChild(btn);
  });
}
function startQuestion(idx) {
  currentIndex = idx; currentStep = 1; typingWrongCount = 0;
  stageView.style.display = 'none'; gameView.style.display = 'block'; renderQuestion();
}
function renderQuestion() {
  const item = currentData.items[currentIndex], total = currentData.items.length;
  qs('#progressText').textContent = `${currentIndex + 1} / ${total}`;
  qs('#progressBar').style.width = `${((currentIndex + 1) / total) * 100}%`;
  qs('#coursePath').textContent = `${catalog[currentGrade].label} · ${catalog[currentGrade].books[currentBook].label} · ${currentUnitMeta.label} · ${currentIndex + 1}번`;
  qs('#promptBox').textContent = item.ko; qs('#hintBox').textContent = `정답 문장 길이: ${item.en.split(' ').length}단어`;
  if (currentStep === 1) {
    qs('#stepLabel').textContent = 'Step 1 · 단어 배열'; qs('#arrangeArea').style.display = 'block'; qs('#typingArea').style.display = 'none';
    qs('#answerArea').innerHTML = ''; qs('#wordBank').innerHTML = '';
    shuffle(item.en.split(' ')).forEach(w => {
      const b = document.createElement('button'); b.className = 'word-btn'; b.textContent = w;
      b.onclick = () => (b.parentElement.id === 'wordBank' ? qs('#answerArea') : qs('#wordBank')).appendChild(b);
      qs('#wordBank').appendChild(b);
    });
  } else {
    qs('#stepLabel').textContent = 'Step 2 · 직접 타이핑'; qs('#arrangeArea').style.display = 'none'; qs('#typingArea').style.display = 'block';
    typeInputEl.value = ''; autoResizeTextarea(typeInputEl); typeInputEl.focus();
  }
}
function popup(ok, msg) {
  qs('#modalOverlay').style.display = 'flex';
  qs('#mTitle').textContent = ok ? '정답입니다!' : '오답입니다';
  qs('#mTitle').style.color = ok ? '#4caf50' : '#f44336';
  qs('#mMsg').textContent = msg;
}

// [버그수정] 중복 클릭 방지 및 잠금 정체 해결 로직 삽입
async function complete() {
  if (isProcessing) return; // 중복 실행(점프) 방지
  isProcessing = true;
  const p = getProgress(); const completed = [...new Set([...p.completed, currentIndex])];
  
  // 핵심 수정: 점프가 일어나더라도 현재 푼 문제의 다음 번호까지 확실히 열어줌
  const maxUnlockedIndex = Math.max(p.maxUnlockedIndex, (currentIndex + 1 < currentData.items.length ? currentIndex + 1 : currentIndex));
  
  await saveUnitProgress({ completed, maxUnlockedIndex });
  await syncWritingSummaryToSupabase();
  renderStageGrid(); updateSummary();

  qs('#modalOverlay').style.display = 'none';
  if (currentIndex < currentData.items.length - 1) {
    startQuestion(currentIndex + 1);
  } else {
    stageView.style.display = 'block'; gameView.style.display = 'none';
  }
  isProcessing = false;
}

qs('#checkBtn').onclick = () => {
  if (isProcessing) return;
  const answer = currentData.items[currentIndex].en; let ok = false;
  if (currentStep === 1) {
    const arranged = [...qs('#answerArea').children].map(n => n.textContent).join(' ');
    ok = clean(arranged) === clean(answer);
    popup(ok, ok ? '배열 성공! 직접 타이핑으로 넘어갑니다.' : '단어 순서를 확인하세요.');
  } else {
    const input = qs('#typeInput').value; ok = clean(input) === clean(answer);
    if (ok) popup(true, '모두 완료했습니다!');
    else { typingWrongCount++; popup(false, buildHintMessage(input, answer, typingWrongCount)); }
  }
  modalConfirmAction = async () => {
    if (ok) {
      if (currentStep === 1) { currentStep = 2; qs('#modalOverlay').style.display = 'none'; renderQuestion(); }
      else await complete();
    } else { qs('#modalOverlay').style.display = 'none'; if(currentStep===2) typeInputEl.focus(); }
  };
};

qs('#mYes').onclick = async () => { if (modalConfirmAction) await modalConfirmAction(); };
qs('#mNo').onclick = () => { qs('#modalOverlay').style.display = 'none'; stageView.style.display = 'block'; gameView.style.display = 'none'; renderStageGrid(); };
qs('#backBtn').onclick = () => { stageView.style.display = 'block'; gameView.style.display = 'none'; renderStageGrid(); };
qs('#stageBackBtn').onclick = async () => { stageView.style.display = 'none'; menuView.style.display = 'block'; await renderUnits(); updateSummary(); };

// [복구] 관리자 분기 로직 포함
qs('#homeBtn').onclick = async () => {
  const { data, error } = await supabase.auth.getUser();
  if (error || !data.user) { location.href = 'login.html'; return; }
  const { data: pD } = await supabase.from('profiles').select('role').eq('user_id', data.user.id).maybeSingle();
  location.href = pD?.role === 'admin' ? 'admin.html' : 'class.html';
};

typeInputEl.addEventListener('input', () => autoResizeTextarea(typeInputEl));
qs('#typeInput').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return; e.preventDefault();
  if (qs('#modalOverlay').style.display === 'flex') qs('#mYes').click(); else qs('#checkBtn').click();
});
gradeSelect.onchange = async () => { currentGrade = gradeSelect.value; populate(); await renderUnits(); };
bookSelect.onchange = async () => { currentBook = bookSelect.value; updateSummary(); await renderUnits(); };

(async () => { await ensureAuthUser(); await loadAllUnitProgress(); populate(); await renderUnits(); updateSummary(); })();
</script>
</body>
