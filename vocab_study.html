<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>보카엔딩 학습</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      --bg:#f4f7fb; --card:#ffffff; --line:#e5e7eb; --text:#1f2937;
      --blue:#4f8cff; --green:#4caf50; --red:#ef4444; --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    body{ margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
    .wrap{ max-width:1100px; margin:0 auto; padding:15px; min-height:100vh; }
    
    /* 게임 모드 시 UI 제거 */
    body.is-game .summary-grid, body.is-game .topbar, body.is-game .progress-wrap, body.is-game #status { display: none; }
    body.is-game .panel { background: transparent; box-shadow: none; padding: 0; }
    body.is-game .word-card { border: none; background: transparent; min-height: auto; padding: 0; }

    .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .summary-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:10px; }
    .summary-card{ background:#fff; border-radius:12px; padding:10px; text-align:center; box-shadow:var(--shadow); }
    .summary-card .label{ font-size:10px; color:var(--muted); }
    .summary-card .value{ font-size:13px; font-weight:800; }

    .panel{ padding:15px; background:#fff; border-radius:20px; box-shadow:var(--shadow); margin-bottom:10px; }
    .progress-wrap{ width:100%; height:8px; background:#e5e7eb; border-radius:10px; overflow:hidden; margin-bottom:10px; }
    .progress-bar{ height:100%; width:0%; background:var(--blue); transition:width .2s ease; }

    .word-card{ text-align:center; min-height:380px; display:flex; flex-direction:column; justify-content:center; }
    .word-text{ font-size:42px; font-weight:900; margin-bottom:20px; }
    .pill{ display:inline-flex; padding:5px 12px; border-radius:999px; background:#eef4ff; color:#355ea9; font-size:12px; font-weight:800; margin:0 auto 10px; }

    /* 매칭 게임 레이아웃 (좌우 분리) */
    .game-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
    .game-column { display: flex; flex-direction: column; gap: 10px; }
    .game-btn { 
      background:#fff; border:2.5px solid var(--line); border-radius:12px; 
      padding:15px 10px; font-size:15px; font-weight:800; cursor:pointer; 
      min-height:65px; display:flex; align-items:center; justify-content:center; 
      transition: all 0.1s; word-break: keep-all; 
    }
    .game-btn.selected { border-color: var(--blue); background: #f0f7ff; color: var(--blue); }
    .game-btn.matched { visibility: hidden; opacity: 0; pointer-events: none; }
    .game-btn.error { border-color: var(--red); background: #fff1f1; animation: shake 0.3s; }

    @keyframes shake{ 0%, 100%{ transform:translateX(0); } 25%{ transform:translateX(-5px); } 50%{ transform:translateX(5px); } }

    .scratch-card{ position:relative; width:100%; height:130px; border-radius:18px; overflow:hidden; border:2px dashed #bfd5ff; background:#f8fbff; display:flex; align-items:center; justify-content:center; }
    .scratch-canvas{ position:absolute; inset:0; z-index:2; }
    .choice-wrap{ display:grid; gap:10px; max-width: 500px; margin: 0 auto; width: 100%; }
    .choice-btn{ width:100%; padding:16px; background:#fff; border:1px solid var(--line); border-radius:16px; font-size:16px; font-weight:700; cursor:pointer; }
    .choice-btn.correct { background:#dcfce7 !important; border-color:#22c55e !important; color:#166534 !important; }
    .choice-btn.wrong { background:#fee2e2 !important; border-color:#ef4444 !important; color:#991b1b !important; }
    
    .answer-input{ width:100%; max-width:500px; border:2.5px solid var(--line); border-radius:16px; padding:18px; font-size:20px; font-weight:800; text-align:center; outline:none; }
    .footer-actions{ display:flex; gap:10px; justify-content:center; margin-top:20px; }
    .status { text-align:center; font-size:14px; margin-top:10px; min-height:20px; color:var(--red); font-weight:800; }
    
    #gameQuitBtn { position: fixed; top: 15px; right: 15px; z-index: 1000; background:rgba(0,0,0,0.6); color:#fff; border-radius:10px; padding:8px 15px; display:none; }
    body.is-game #gameQuitBtn { display: block; }

    @media (orientation: landscape) {
      .game-btn { min-height: 48px; padding: 5px; font-size: 13px; }
      .game-container { gap: 10px; }
      .word-text { font-size: 32px; margin-bottom: 10px; }
    }
  </style>
</head>
<body id="mainBody">
  <button id="gameQuitBtn" onclick="location.href='vocab.html'">그만하기</button>
  <div class="wrap">
    <div class="topbar">
      <h2 id="modeTitle" style="margin:0;">단어 학습</h2>
      <button onclick="location.href='vocab.html'" class="btn-light">로비로</button>
    </div>

    <div class="summary-grid">
      <div class="summary-card"><div class="label">전체</div><div id="totalCount" class="value">-</div></div>
      <div class="summary-card"><div class="label">진행</div><div id="progressCount" class="value">-</div></div>
      <div class="summary-card"><div class="label">하트</div><div id="heartDisplay" class="value" style="color:var(--red);">❤ x 1</div></div>
    </div>

    <div class="panel">
      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
      
      <div id="studyBox">
        <div class="word-card">
          <div id="questionArea">
            <div id="phaseBadge" class="pill">모드</div>
            <div id="wordText" class="word-text">word</div>
          </div>

          <!-- 카드 학습용 스크래치 -->
          <div id="scratchArea" style="display:none;">
            <div class="scratch-card" id="scratchCard">
              <div id="scratchAnswer" style="font-size:28px; font-weight:800;"></div>
              <canvas id="scratchCanvas" class="scratch-canvas"></canvas>
            </div>
          </div>

          <!-- 기초 테스트용 4지선다 -->
          <div id="choiceArea" class="choice-wrap" style="display:none;"></div>

          <!-- 심화 테스트용 주관식 -->
          <div id="typingArea" style="display:none;">
            <input id="answerInput" class="answer-input" type="text" placeholder="정답을 입력하세요" autocomplete="off" />
            <button id="answerSubmitBtn" class="btn-green" style="width:100%; max-width:500px; margin-top:15px; padding:18px;">정답 확인</button>
          </div>
          
          <!-- 매칭 게임용 2열 영역 -->
          <div id="gameArea" class="game-container" style="display:none;">
            <div id="gameLeftCol" class="game-column"></div>
            <div id="gameRightCol" class="game-column"></div>
          </div>

          <div class="footer-actions" id="cardActions">
            <button id="speakBtn" class="btn-light">🔊 발음</button>
            <button id="revealBtn" class="btn-blue">정답 공개</button>
            <button id="nextBtn" class="btn-green">다음 카드</button>
          </div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <div id="appModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:9999; padding:20px;">
    <div style="width:100%; max-width:350px; background:#fff; border-radius:24px; padding:25px; text-align:center;">
      <h3 id="modalTitle" style="margin:0 0 10px;">알림</h3>
      <p id="modalMsg" style="font-size:15px; color:#444; line-height:1.6; margin-bottom:20px;"></p>
      <button id="modalConfirm" class="btn-blue" style="width:100%; padding:12px;">확인</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://uuzhdxangctewuklvmlv.supabase.co', 'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F');

    const params = new URLSearchParams(window.location.search);
    const studyMode = params.get('mode') || 'card';
    let currentWords = []; let currentIndex = 0; let studyPhase = ''; let hearts = 1; let initialHearts = 1; let isProcessing = false; let gameSelected = null;

    const el = { body: document.getElementById('mainBody'), wordText: document.getElementById('wordText'), scratchCanvas: document.getElementById('scratchCanvas'), scratchAnswer: document.getElementById('scratchAnswer'), scratchCard: document.getElementById('scratchCard'), choiceArea: document.getElementById('choiceArea'), typingArea: document.getElementById('typingArea'), gameArea: document.getElementById('gameArea'), gameLeftCol: document.getElementById('gameLeftCol'), gameRightCol: document.getElementById('gameRightCol'), scratchArea: document.getElementById('scratchArea'), questionArea: document.getElementById('questionArea'), cardActions: document.getElementById('cardActions'), progressBar: document.getElementById('progressBar'), answerInput: document.getElementById('answerInput'), status: document.getElementById('status'), phaseBadge: document.getElementById('phaseBadge'), modeTitle: document.getElementById('modeTitle') };

    // [사운드 복구] 디로링~ 상승음
    function playSound(type) {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const start = audioCtx.currentTime;
      if (type === 'correct') {
        [523.25, 659.25, 783.99].forEach((f, i) => {
          const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
          o.type = 'triangle'; o.frequency.setValueAtTime(f, start + (i * 0.07));
          g.gain.setValueAtTime(0.1, start + (i * 0.07)); g.gain.exponentialRampToValueAtTime(0.01, start + (i * 0.07) + 0.1);
          o.connect(g).connect(audioCtx.destination); o.start(start + (i * 0.07)); o.stop(start + (i * 0.07) + 0.12);
        });
      } else {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(200, start);
        g.gain.setValueAtTime(0.1, start); o.connect(g).connect(audioCtx.destination);
        o.start(); o.stop(start + 0.2);
      }
    }

    function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); }

    async function loadData() {
      const { data: { user } } = await supabase.auth.getUser();
      const today = new Date().toISOString().slice(0, 10);
      const { data: set } = await supabase.from('user_vocab_daily_sets').select('*').eq('user_id', user.id).eq('study_date', today).maybeSingle();
      if (!set) return alert('오늘의 학습 세트가 없습니다. 로비에서 먼저 선택하세요.');

      const { data: words } = await supabase.from('vocab_words').select('*').in('id', set.total_words);
      const orderMap = new Map(set.total_words.map((id, i) => [id, i]));
      currentWords = words.sort((a, b) => orderMap.get(a.id) - orderMap.get(b.id));

      initialHearts = set.heart_count || 1; hearts = initialHearts;
      document.getElementById('totalCount').textContent = currentWords.length;
      
      if (studyMode === 'game') { el.body.classList.add('is-game'); el.modeTitle.textContent = "매칭 게임"; }
      else if (studyMode === 'card') { studyPhase = 'w2m'; el.modeTitle.textContent = "카드 학습"; }
      else if (studyMode === 'basic') { studyPhase = 't1'; el.modeTitle.textContent = "기초 테스트"; }
      else { studyPhase = 't4'; el.modeTitle.textContent = "심화 테스트"; }
      render();
    }

    function render() {
      el.status.textContent = '';
      document.getElementById('progressCount').textContent = `${currentIndex + 1} / ${currentWords.length}`;
      document.getElementById('heartDisplay').textContent = `❤ x ${hearts}`;
      const item = currentWords[currentIndex];
      
      [el.questionArea, el.scratchArea, el.choiceArea, el.typingArea, el.gameArea, el.cardActions].forEach(a => a.style.display = 'none');

      if (studyMode === 'card') {
        el.questionArea.style.display = 'block'; el.scratchArea.style.display = 'block'; el.cardActions.style.display = 'flex';
        if (studyPhase === 'w2m') { el.phaseBadge.textContent = '영단어 → 뜻'; el.wordText.textContent = item.word; el.scratchAnswer.textContent = item.primary_meaning_ko; speak(item.word); }
        else { el.phaseBadge.textContent = '뜻 → 영단어'; el.wordText.textContent = item.primary_meaning_ko; el.scratchAnswer.textContent = item.word; }
        initScratch();
      } else if (studyMode === 'basic') {
        el.questionArea.style.display = 'block'; el.choiceArea.style.display = 'grid';
        if (studyPhase === 't1') { el.phaseBadge.textContent = 'T1: 단어→뜻'; el.wordText.textContent = item.word; renderChoices(item, 'm'); }
        else if (studyPhase === 't2') { el.phaseBadge.textContent = 'T2: 발음→뜻'; el.wordText.textContent = '🔊'; speak(item.word); renderChoices(item, 'm', true); }
        else { el.phaseBadge.textContent = 'T3: 뜻→단어'; el.wordText.textContent = item.primary_meaning_ko; renderChoices(item, 'w'); }
      } else if (studyMode === 'advanced') {
        el.questionArea.style.display = 'block'; el.typingArea.style.display = 'block'; el.answerInput.value = '';
        if (studyPhase === 't4') { el.phaseBadge.textContent = 'T4: 단어→뜻(입력)'; el.wordText.textContent = item.word; }
        else { el.phaseBadge.textContent = 'T5: 뜻→단어(입력)'; el.wordText.textContent = item.primary_meaning_ko; }
        setTimeout(() => el.answerInput.focus(), 100);
      } else if (studyMode === 'game') {
        el.gameArea.style.display = 'grid'; renderMatchingGame();
      }
      el.progressBar.style.width = ((currentIndex + 1) / currentWords.length * 100) + '%';
    }

    function renderChoices(item, type, audio = false) {
      const correct = (type === 'm') ? item.primary_meaning_ko : item.word;
      const pool = currentWords.filter(w => w.id !== item.id).map(w => (type === 'm' ? w.primary_meaning_ko : w.word));
      const choices = [...new Set(pool)].sort(() => 0.5 - Math.random()).slice(0, 3);
      choices.push(correct);
      el.choiceArea.innerHTML = choices.sort(() => 0.5 - Math.random()).map(c => `<button class="choice-btn">${c}</button>`).join('');
      if (audio) { const b = document.createElement('button'); b.className = 'choice-btn'; b.style.background="#f8fafc"; b.textContent = '🔊 발음 다시듣기'; b.onclick = () => speak(item.word); el.choiceArea.appendChild(b); }
      el.choiceArea.querySelectorAll('.choice-btn').forEach(btn => {
        btn.onclick = () => {
          if (isProcessing) return; isProcessing = true;
          if (btn.textContent === correct) { playSound('correct'); btn.classList.add('correct'); setTimeout(() => { isProcessing = false; next(); }, 220); }
          else { playSound('wrong'); btn.classList.add('wrong'); handleFail(); }
        };
      });
    }

    // [매칭 게임 복구] 왼쪽 영어 10개 / 오른쪽 뜻 10개
    function renderMatchingGame() {
      const items = currentWords.slice(currentIndex, currentIndex + 10);
      const leftWords = items.map(it => ({ id: it.id, text: it.word, type: 'w' })).sort(() => Math.random() - 0.5);
      const rightMeanings = items.map(it => ({ id: it.id, text: it.primary_meaning_ko, type: 'm' })).sort(() => Math.random() - 0.5);
      el.gameLeftCol.innerHTML = leftWords.map(b => `<button class="game-btn" data-id="${b.id}" data-type="w">${b.text}</button>`).join('');
      el.gameRightCol.innerHTML = rightMeanings.map(b => `<button class="game-btn" data-id="${b.id}" data-type="m">${b.text}</button>`).join('');
      document.querySelectorAll('.game-btn').forEach(btn => {
        btn.onclick = () => {
          if (isProcessing || btn.classList.contains('matched')) return;
          if (!gameSelected) { gameSelected = btn; btn.classList.add('selected'); }
          else {
            if (gameSelected === btn) { btn.classList.remove('selected'); gameSelected = null; return; }
            if (gameSelected.dataset.id === btn.dataset.id && gameSelected.dataset.type !== btn.dataset.type) {
              playSound('correct'); btn.classList.add('selected'); isProcessing = true;
              setTimeout(() => { btn.classList.add('matched'); gameSelected.classList.add('matched'); gameSelected = null; isProcessing = false;
                if (document.querySelectorAll('.game-btn.matched').length === items.length * 2) { currentIndex += 10; if (currentIndex >= currentWords.length) showModal('학습을 모두 마쳤습니다!', '완료', () => location.href='vocab.html'); else render(); }
              }, 220);
            } else { playSound('wrong'); btn.classList.add('error'); gameSelected.classList.add('error'); isProcessing = true;
              setTimeout(() => { btn.classList.remove('error', 'selected'); gameSelected.classList.remove('error', 'selected'); gameSelected = null; isProcessing = false; }, 400);
            }
          }
        };
      });
    }

    function handleFail() {
      hearts--; document.getElementById('heartDisplay').textContent = `❤ x ${hearts}`;
      if (hearts < 0) { showModal("하트를 모두 소진했습니다. 처음부터 다시 도전하세요!", "다시 도전", () => { hearts = initialHearts; currentIndex = 0; render(); }); }
      else { el.status.textContent = '틀렸습니다! 다시 생각해보세요.'; isProcessing = false; }
    }

    function next() {
      currentIndex++;
      if (currentIndex >= currentWords.length) {
        if (studyMode === 'card' && studyPhase === 'w2m') { studyPhase = 'm2w'; currentIndex = 0; render(); }
        else if (studyMode === 'basic' && studyPhase === 't1') { studyPhase = 't2'; currentIndex = 0; render(); }
        else if (studyMode === 'basic' && studyPhase === 't2') { studyPhase = 't3'; currentIndex = 0; render(); }
        else if (studyMode === 'advanced' && studyPhase === 't4') { studyPhase = 't5'; currentIndex = 0; render(); }
        else { showModal('해당 모드를 완료했습니다!', '축하합니다', () => location.href='vocab.html'); }
      } else render();
    }

    function initScratch() {
      const c = el.scratchCanvas; const ctx = c.getContext('2d'); const r = el.scratchCard.getBoundingClientRect();
      c.width = r.width; c.height = r.height; ctx.fillStyle = '#dfe6ef'; ctx.fillRect(0,0,c.width,c.height);
      ctx.fillStyle = '#334155'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center'; ctx.fillText('긁어서 정답 확인', c.width/2, c.height/2 + 5);
      let draw = false; const sc = (x, y) => { ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill(); };
      c.onpointerdown = (e) => { draw = true; sc(e.offsetX, e.offsetY); }; c.onpointermove = (e) => { if(draw) sc(e.offsetX, e.offsetY); }; c.onpointerup = () => draw = false;
      el.scratchCard.classList.remove('revealed');
    }

    function showModal(msg, title, cb) {
      document.getElementById('modalTitle').textContent = title; document.getElementById('modalMsg').textContent = msg;
      const m = document.getElementById('appModal'); m.style.display = 'flex';
      document.getElementById('modalConfirm').onclick = () => { m.style.display = 'none'; if(cb) cb(); };
    }

    document.getElementById('nextBtn').onclick = next;
    document.getElementById('revealBtn').onclick = () => el.scratchCard.classList.add('revealed');
    document.getElementById('speakBtn').onclick = () => speak(currentWords[currentIndex].word);
    document.getElementById('answerSubmitBtn').onclick = () => {
      const item = currentWords[currentIndex]; const inp = el.answerInput.value.trim().toLowerCase();
      const cor = (studyPhase === 't4') ? item.primary_meaning_ko.toLowerCase() : item.word.toLowerCase();
      if (inp === cor) { playSound('correct'); next(); } else { playSound('wrong'); handleFail(); }
    };
    loadData();
  </script>
</body>
</html>
