<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보카엔딩 단어 학습</title>
  <style>
    /* CSS 스타일은 기존과 동일하게 유지 (변화 없음) */
    * { box-sizing: border-box; }
    :root{
      --bg:#f4f7fb; --card:#ffffff; --line:#e5e7eb; --text:#1f2937;
      --muted:#6b7280; --blue:#4f8cff; --green:#4caf50; --red:#ef4444;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    body{ margin:0; font-family:Arial,sans-serif; background:linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%); color:var(--text); }
    .wrap{ max-width:900px; margin:0 auto; padding:20px; min-height:100vh; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .title-box h1{ margin:0; font-size:30px; font-weight:800; }
    .title-box p{ margin:8px 0 0; color:var(--muted); font-size:14px; line-height:1.6; }
    .btns{ display:flex; gap:8px; flex-wrap:wrap; }
    button{ border:none; border-radius:14px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .btn-blue{ background:var(--blue); color:#fff; }
    .btn-green{ background:var(--green); color:#fff; }
    .btn-red{ background:var(--red); color:#fff; }
    .btn-slate{ background:#607d8b; color:#fff; }
    .btn-light{ background:#fff; color:#334155; border:1px solid var(--line); }
    .summary-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:18px; }
    .summary-card,.panel{ background:var(--card); border-radius:24px; box-shadow:var(--shadow); }
    .summary-card{ padding:18px; }
    .summary-card .label{ color:var(--muted); font-size:13px; margin-bottom:8px; }
    .summary-card .value{ font-size:26px; font-weight:800; }
    .panel{ padding:18px; margin-bottom:18px; }
    .progress-wrap{ width:100%; height:10px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin-bottom:18px; }
    .progress-bar{ height:100%; width:0%; background:linear-gradient(90deg,#4f8cff,#6fcf97); transition:width .2s ease; }
    .word-card{ position:relative; border:1px solid var(--line); background:linear-gradient(180deg,#fff 0%,#fbfdff 100%); border-radius:22px; padding:24px; text-align:center; min-height:450px; display:flex; flex-direction:column; justify-content:center; gap:16px; }
    .card-hearts{ display:flex; align-items:center; gap:6px; font-size:18px; font-weight:800; color:var(--red); }
    .pill{ display:inline-flex; align-items:center; justify-content:center; padding:7px 12px; border-radius:999px; background:#eef4ff; color:#355ea9; font-size:12px; font-weight:800; width:max-content; margin:0 auto; }
    .word-text{ font-size:52px; font-weight:900; line-height:1.15; word-break:break-word; }
    .sub-text{ color:var(--muted); font-size:14px; line-height:1.7; }
    .scratch-wrap{ width:100%; max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }
    .scratch-label{ color:var(--muted); font-size:13px; text-align:center; }
    .scratch-card{ position:relative; width:100%; min-height:140px; height:140px; border-radius:22px; overflow:hidden; border:2px dashed #bfd5ff; background:#f8fbff; display:flex; align-items:center; justify-content:center; padding:20px; }
    .scratch-answer{ position:relative; z-index:1; font-size:34px; font-weight:800; line-height:1.5; text-align:center; word-break:keep-all; padding:10px; }
    .scratch-canvas{ position:absolute; inset:0; z-index:2; width:100%; height:100%; display:block; cursor:grab; touch-action:none; }
    .scratch-card.revealed .scratch-canvas{ opacity:0; pointer-events:none; transition:opacity .25s ease; }
    .choice-wrap{ display:grid; gap:10px; width:100%; max-width:560px; margin:0 auto; grid-template-columns:1fr; }
    .choice-btn{ width:100%; text-align:center; background:#fff; color:#334155; border:1px solid var(--line); border-radius:16px; padding:14px 16px; font-size:16px; font-weight:700; transition: all 0.2s; }
    .choice-btn.correct{ background:#dcfce7 !important; border-color:#22c55e !important; color:#166534 !important; }
    .choice-btn.wrong{ background:#fee2e2 !important; border-color:#ef4444 !important; color:#991b1b !important; }
    @keyframes shake{ 0%, 100%{ transform:translateX(0); } 25%{ transform:translateX(-6px); } 50%{ transform:translateX(6px); } 75%{ transform:translateX(-4px); } }
    .shake{ animation:shake .3s ease; }
    .heart-hit{ animation:heartPop .25s ease; }
    @keyframes heartPop{ 0%{ transform:scale(1); } 50%{ transform:scale(1.4); } 100%{ transform:scale(1); } }
    .answer-form{ width:100%; max-width:560px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
    .answer-input{ width:100%; border:1.5px solid var(--line); border-radius:16px; padding:16px 18px; font-size:18px; font-weight:700; outline:none; text-align: center; }
    .answer-input:focus{ border-color:#4f8cff; box-shadow:0 0 0 4px rgba(79,140,255,.12); }
    .footer-actions{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
    .status{ margin-top:14px; min-height:24px; color:#334155; font-size:14px; text-align:center; }
    .empty,.loading{ padding:36px 14px; text-align:center; color:var(--muted); font-weight:700; }
    .app-modal{ position:fixed; inset:0; background:rgba(15,23,42,.38); display:none; align-items:center; justify-content:center; z-index:9999; padding:20px; }
    .app-modal.show{ display:flex; }
    .app-modal-card{ width:min(100%, 420px); background:#fff; border-radius:24px; box-shadow:0 20px 60px rgba(15,23,42,.22); padding:24px 22px 18px; animation:modalUp .18s ease; }
    @keyframes modalUp{ from{ opacity:0; transform:translateY(12px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
    .app-modal-title{ font-size:20px; font-weight:800; margin-bottom:10px; color:#0f172a; }
    .app-modal-message{ font-size:15px; line-height:1.65; color:#475569; white-space:pre-line; }
    .app-modal-actions{ display:flex; justify-content:flex-end; margin-top:18px; }
    .app-modal-btn{ border:none; border-radius:14px; background:#4f8cff; color:#fff; padding:11px 18px; font-size:14px; font-weight:800; cursor:pointer; }
    @media (max-width:640px){ .wrap{ padding:14px; } .word-text{ font-size:38px; } .scratch-answer{ font-size:26px; } .footer-actions button{ width:100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 상단바 -->
    <div class="topbar">
      <div class="title-box">
        <h1>오늘의 단어 학습</h1>
        <p>카드 학습 2단계 후 테스트 4단계가 진행됩니다.</p>
      </div>
      <div class="btns">
        <button id="backBtn" class="btn-light" type="button">단어장 선택</button>
        <button id="refreshBtn" class="btn-blue" type="button">새로고침</button>
        <button id="logoutBtn" class="btn-slate" type="button">로그아웃</button>
      </div>
    </div>

    <!-- 요약 정보 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">오늘 학습 단어 수</div>
        <div class="value" id="totalCountText">-</div>
      </div>
      <div class="summary-card">
        <div class="label">현재 진행</div>
        <div class="value" id="currentStepText">-</div>
      </div>
      <div class="summary-card">
        <div class="label">사용자</div>
        <div class="value" id="currentName" style="font-size:18px;">-</div>
      </div>
    </div>

    <!-- 메인 패널 -->
    <div class="panel">
      <h2 id="bookTitle">로딩 중...</h2>
      <p id="bookDesc" class="sub-text">단어 정보를 불러오고 있습니다.</p>

      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="loadingBox" class="loading">학습 세트를 불러오는 중입니다...</div>
      <div id="emptyBox" class="empty" style="display:none;">오늘 학습 세트가 없습니다. 단어장을 먼저 선택해주세요.</div>

      <!-- [1] 학습 카드 섹션 -->
      <div id="studyBox" style="display:none;">
        <div class="word-card">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <div id="cardOrder" style="font-weight:800; font-size:18px;">1 / 10</div>
            <div id="phaseBadge" class="pill">영단어 카드</div>
            <div id="cardHearts" class="card-hearts">❤ × 1</div>
          </div>
          <div id="wordText" class="word-text">word</div>
          <div id="cardGuide" class="sub-text">가이드를 확인하세요.</div>
          <div class="scratch-wrap">
            <div id="scratchLabel" class="scratch-label">아래 영역을 긁어서 확인하세요.</div>
            <div id="scratchCard" class="scratch-card">
              <div id="scratchAnswer" class="scratch-answer">뜻</div>
              <canvas id="scratchCanvas" class="scratch-canvas"></canvas>
            </div>
          </div>
          <div class="footer-actions">
            <button id="speakBtn" class="btn-light" type="button">🔊 다시 듣기</button>
            <button id="revealBtn" class="btn-blue" type="button">정답 공개</button>
            <button id="nextBtn" class="btn-green" type="button">다음 카드</button>
          </div>
        </div>
      </div>

      <!-- [2] 테스트 섹션 -->
      <div id="testBox" style="display:none;">
        <div class="word-card">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <div id="testOrder" style="font-weight:800; font-size:18px;">1 / 10</div>
            <div id="testPhaseBadge" class="pill">테스트</div>
            <div id="testHearts" class="card-hearts">❤ × 1</div>
          </div>
          <div id="testQuestion" class="word-text">word</div>
          <div id="testGuide" class="sub-text">알맞은 답을 고르세요.</div>
          <div id="choiceWrap" class="choice-wrap"></div>
          <div id="answerWrap" class="answer-form" style="display:none;">
            <input id="answerInput" class="answer-input" type="text" placeholder="뜻을 입력하세요" autocomplete="off" />
            <button id="answerSubmitBtn" class="btn-green answer-submit" type="button">정답 확인</button>
          </div>
        </div>
      </div>

      <!-- [3] 완료 섹션 -->
      <div id="completeBox" class="empty" style="display:none;">
        축하합니다! 오늘 학습과 테스트를 모두 마쳤습니다.<br />
        <div class="footer-actions" style="margin-top:18px;">
          <button id="restartBtn" class="btn-blue" type="button">처음부터 다시하기</button>
          <button id="goSelectBtn" class="btn-light" type="button">단어장으로 돌아가기</button>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <!-- 알림 모달 -->
  <div id="appModal" class="app-modal">
    <div class="app-modal-card">
      <div id="appModalTitle" class="app-modal-title">안내</div>
      <div id="appModalMessage" class="app-modal-message"></div>
      <div class="app-modal-actions">
        <button id="appModalConfirm" class="app-modal-btn" type="button">확인</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    // DOM 요소
    const elements = {
      currentName: document.getElementById('currentName'),
      totalCountText: document.getElementById('totalCountText'),
      currentStepText: document.getElementById('currentStepText'),
      progressBar: document.getElementById('progressBar'),
      loadingBox: document.getElementById('loadingBox'),
      emptyBox: document.getElementById('emptyBox'),
      studyBox: document.getElementById('studyBox'),
      testBox: document.getElementById('testBox'),
      completeBox: document.getElementById('completeBox'),
      bookTitle: document.getElementById('bookTitle'),
      bookDesc: document.getElementById('bookDesc'),
      status: document.getElementById('status'),
      // 카드 관련
      wordText: document.getElementById('wordText'),
      phaseBadge: document.getElementById('phaseBadge'),
      scratchAnswer: document.getElementById('scratchAnswer'),
      scratchCanvas: document.getElementById('scratchCanvas'),
      scratchCard: document.getElementById('scratchCard'),
      cardHearts: document.getElementById('cardHearts'),
      cardOrder: document.getElementById('cardOrder'),
      // 테스트 관련
      testQuestion: document.getElementById('testQuestion'),
      testPhaseBadge: document.getElementById('testPhaseBadge'),
      testHearts: document.getElementById('testHearts'),
      testOrder: document.getElementById('testOrder'),
      testGuide: document.getElementById('testGuide'),
      choiceWrap: document.getElementById('choiceWrap'),
      answerWrap: document.getElementById('answerWrap'),
      answerInput: document.getElementById('answerInput'),
      answerSubmitBtn: document.getElementById('answerSubmitBtn')
    };

    // 상태 관리 변수
    let me = null;
    let currentWords = [];
    let currentIndex = 0;
    let studyPhase = 'word_to_meaning'; // word_to_meaning -> meaning_to_word -> test_1~4
    let hearts = 3;
    let initialHearts = 3;
    let currentTestStartPhase = 'test_1';

    // 사운드 시스템
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playSound(type) {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
      } else {
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      }
      osc.connect(gain).connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    }

    // 공통 유틸리티
    function setStatus(msg, isErr = false) {
      elements.status.textContent = msg || '';
      elements.status.style.color = isErr ? '#ef4444' : '#334155';
    }

    function showAppModal(message, title = '안내', onConfirm = null) {
      document.getElementById('appModalTitle').textContent = title;
      document.getElementById('appModalMessage').textContent = message;
      const modal = document.getElementById('appModal');
      modal.classList.add('show');
      document.getElementById('appModalConfirm').onclick = () => {
        modal.classList.remove('show');
        if (onConfirm) onConfirm();
      };
    }

    function renderHeartIcons(hit = false) {
      const text = `❤ × ${hearts}`;
      elements.cardHearts.textContent = text;
      elements.testHearts.textContent = text;
      if (hit) {
        elements.cardHearts.classList.add('heart-hit');
        elements.testHearts.classList.add('heart-hit');
        setTimeout(() => {
          elements.cardHearts.classList.remove('heart-hit');
          elements.testHearts.classList.remove('heart-hit');
        }, 300);
      }
    }

    function speakWord(text) {
      if (!text) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }

    // 단어 데이터 가공
    function getMeaningText(item) {
      return (item.primary_meaning_ko || '').trim() || '뜻 없음';
    }

    function normalize(t) {
      return String(t || '').trim().replace(/\s+/g, ' ').replace(/[.,!?]/g, '');
    }

    function isCorrectInput(item, val) {
      const input = normalize(val);
      if (!input) return false;
      const accepted = [];
      if (item.primary_meaning_ko) accepted.push(normalize(item.primary_meaning_ko));
      if (Array.isArray(item.accepted_meanings_ko)) item.accepted_meanings_ko.forEach(m => accepted.push(normalize(m)));
      return accepted.includes(input);
    }

    // 셔플 및 보기 생성
    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function buildChoices(correctItem, isMeaningToWord = false) {
      const correct = isMeaningToWord ? correctItem.word : getMeaningText(correctItem);
      const pool = currentWords
        .filter(w => w.id !== correctItem.id)
        .map(w => isMeaningToWord ? w.word : getMeaningText(w));
      const wrongs = shuffle([...new Set(pool)]).slice(0, 3);
      // 보기가 부족할 때 채우기
      const fillers = isMeaningToWord ? ['apple','book','desk'] : ['상태','동작','사물'];
      while(wrongs.length < 3) wrongs.push(fillers[wrongs.length] || '보기');
      return shuffle([correct, ...wrongs]);
    }

    // [학습 카드] 렌더링
    let scratchCtx = null;
    function initScratch() {
      const canvas = elements.scratchCanvas;
      const rect = elements.scratchCard.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
      scratchCtx = canvas.getContext('2d');
      scratchCtx.scale(dpr, dpr);
      scratchCtx.fillStyle = '#dfe6ef';
      scratchCtx.fillRect(0, 0, rect.width, rect.height);
      scratchCtx.fillStyle = '#334155';
      scratchCtx.font = 'bold 14px Arial';
      scratchCtx.textAlign = 'center';
      scratchCtx.fillText('긁어서 확인', rect.width / 2, rect.height / 2 + 5);
      elements.scratchCard.classList.remove('revealed');
    }

    function renderCard() {
      if (currentIndex >= currentWords.length) {
        if (studyPhase === 'word_to_meaning') {
          studyPhase = 'meaning_to_word'; currentIndex = 0; renderCard();
        } else {
          studyPhase = 'test_1'; currentTestStartPhase = 'test_1'; currentIndex = 0; renderTestCard();
        }
        return;
      }
      const item = currentWords[currentIndex];
      const total = currentWords.length;
      const prog = (studyPhase === 'word_to_meaning' ? 0 : 33) + (currentIndex / total * 33);
      elements.progressBar.style.width = prog + '%';
      elements.cardOrder.textContent = `${currentIndex + 1} / ${total}`;
      elements.currentStepText.textContent = `${currentIndex + 1} / ${total}`;

      if (studyPhase === 'word_to_meaning') {
        elements.phaseBadge.textContent = '1단계: 영단어 보고 뜻 맞추기';
        elements.wordText.textContent = item.word;
        elements.scratchAnswer.textContent = getMeaningText(item);
        speakWord(item.word);
      } else {
        elements.phaseBadge.textContent = '2단계: 뜻 보고 영단어 맞추기';
        elements.wordText.textContent = getMeaningText(item);
        elements.scratchAnswer.textContent = item.word;
      }
      initScratch();
      elements.studyBox.style.display = 'block';
      elements.testBox.style.display = 'none';
      renderHeartIcons();
    }

    // [테스트] 렌더링
    function renderTestCard() {
      if (currentIndex >= currentWords.length) {
        const phases = ['test_1', 'test_2', 'test_3', 'test_4', 'done'];
        const nextIdx = phases.indexOf(studyPhase) + 1;
        studyPhase = phases[nextIdx];
        currentIndex = 0;
        if (studyPhase === 'done') {
          elements.testBox.style.display = 'none';
          elements.completeBox.style.display = 'block';
          elements.progressBar.style.width = '100%';
          return;
        }
        currentTestStartPhase = studyPhase;
        renderTestCard();
        return;
      }

      const item = currentWords[currentIndex];
      const total = currentWords.length;
      let stepProg = 0;
      if (studyPhase === 'test_1') stepProg = 66 + (currentIndex/total * 8);
      else if (studyPhase === 'test_2') stepProg = 74 + (currentIndex/total * 8);
      else if (studyPhase === 'test_3') stepProg = 82 + (currentIndex/total * 8);
      else if (studyPhase === 'test_4') stepProg = 90 + (currentIndex/total * 10);
      
      elements.progressBar.style.width = stepProg + '%';
      elements.testOrder.textContent = `${currentIndex + 1} / ${total}`;
      elements.currentStepText.textContent = `${currentIndex + 1} / ${total}`;
      elements.choiceWrap.innerHTML = '';
      elements.answerWrap.style.display = 'none';
      elements.choiceWrap.style.display = 'grid';

      if (studyPhase === 'test_1') {
        elements.testPhaseBadge.textContent = '테스트 1: 영단어 → 뜻 (객관식)';
        elements.testQuestion.textContent = item.word;
        renderChoices(buildChoices(item, false));
      } else if (studyPhase === 'test_2') {
        elements.testPhaseBadge.textContent = '테스트 2: 발음 → 뜻 (객관식)';
        elements.testQuestion.textContent = '🔊';
        speakWord(item.word);
        renderChoices(buildChoices(item, false));
      } else if (studyPhase === 'test_3') {
        elements.testPhaseBadge.textContent = '테스트 3: 뜻 → 영단어 (객관식)';
        elements.testQuestion.textContent = getMeaningText(item);
        renderChoices(buildChoices(item, true));
      } else if (studyPhase === 'test_4') {
        elements.testPhaseBadge.textContent = '테스트 4: 영단어 → 뜻 (주관식)';
        elements.testQuestion.textContent = item.word;
        elements.choiceWrap.style.display = 'none';
        elements.answerWrap.style.display = 'flex';
        elements.answerInput.value = '';
        elements.answerInput.classList.remove('wrong', 'shake');
        setTimeout(() => elements.answerInput.focus(), 100);
      }
      elements.studyBox.style.display = 'none';
      elements.testBox.style.display = 'block';
      renderHeartIcons();
    }

    function renderChoices(choices) {
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = () => handleTestAnswer(c);
        elements.choiceWrap.appendChild(btn);
      });
    }

    // 정답 판정 및 하트 처리
    function handleTestAnswer(choice) {
      const item = currentWords[currentIndex];
      const correct = (studyPhase === 'test_3') ? item.word : getMeaningText(item);
      const isCorrect = (choice === correct);
      
      const btns = elements.choiceWrap.querySelectorAll('.choice-btn');
      btns.forEach(b => {
        b.disabled = true;
        if(b.textContent === correct) b.classList.add('correct');
      });

      if (isCorrect) {
        playSound('correct');
        setTimeout(() => { currentIndex++; renderTestCard(); }, 600);
      } else {
        playSound('wrong');
        const clicked = Array.from(btns).find(b => b.textContent === choice);
        if(clicked) clicked.classList.add('wrong', 'shake');
        processFailure();
      }
    }

    function handleSubjective() {
      const item = currentWords[currentIndex];
      if (isCorrectInput(item, elements.answerInput.value)) {
        playSound('correct');
        elements.answerInput.style.backgroundColor = '#dcfce7';
        setTimeout(() => {
          elements.answerInput.style.backgroundColor = '';
          currentIndex++; renderTestCard();
        }, 600);
      } else {
        playSound('wrong');
        elements.answerInput.classList.add('wrong', 'shake');
        setTimeout(() => elements.answerInput.classList.remove('shake'), 300);
        processFailure();
      }
    }

    function processFailure() {
      hearts--;
      renderHeartIcons(true);
      if (hearts < 0) {
        showAppModal(`하트를 모두 소진했습니다.\n${elements.testPhaseBadge.textContent}을 처음부터 다시 시작합니다.`, '다시 도전', () => {
          hearts = initialHearts; currentIndex = 0; renderTestCard();
        });
      } else {
        setStatus(`틀렸습니다! (남은 하트: ${hearts}개)`, true);
        // 하트가 남아있어도 테스트에서는 다음 문제로 넘기지 않고 다시 기회를 주거나(주관식), 객관식은 다음으로 넘김
        if(studyPhase !== 'test_4') {
           setTimeout(() => { currentIndex++; renderTestCard(); }, 1000);
        }
      }
    }

    // 초기화 및 데이터 로드
    async function init() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) { location.href = 'login.html'; return; }
      me = user;
      const { data: prof } = await supabase.from('profiles').select('name').eq('user_id', me.id).maybeSingle();
      elements.currentName.textContent = prof?.name || me.email;

      const today = new Date().toISOString().slice(0, 10);
      const { data: set } = await supabase.from('user_vocab_daily_sets').select('*').eq('user_id', me.id).eq('study_date', today).maybeSingle();

      if (!set) {
        elements.loadingBox.style.display = 'none'; elements.emptyBox.style.display = 'block'; return;
      }

      hearts = set.heart_count || 3; initialHearts = hearts;
      const { data: words } = await supabase.from('vocab_words').select('*').in('id', set.total_words);
      
      const orderMap = new Map(set.total_words.map((id, i) => [id, i]));
      currentWords = words.sort((a, b) => orderMap.get(a.id) - orderMap.get(b.id));

      const { data: book } = await supabase.from('vocab_books').select('title, description').eq('id', set.book_id).maybeSingle();
      elements.bookTitle.textContent = book?.title || '오늘의 단어';
      elements.bookDesc.textContent = book?.description || '학습을 시작합니다.';
      elements.totalCountText.textContent = currentWords.length;
      elements.loadingBox.style.display = 'none';
      
      renderCard();
    }

    // 이벤트 리스너
    elements.scratchCanvas.onpointerdown = (e) => {
      elements.scratchCanvas.setPointerCapture(e.pointerId);
      const scratch = (ex, ey) => {
        const r = elements.scratchCanvas.getBoundingClientRect();
        scratchCtx.globalCompositeOperation = 'destination-out';
        scratchCtx.beginPath();
        scratchCtx.arc(ex - r.left, ey - r.top, 20, 0, Math.PI * 2);
        scratchCtx.fill();
      };
      scratch(e.clientX, e.clientY);
      elements.scratchCanvas.onpointermove = (ev) => scratch(ev.clientX, ev.clientY);
    };
    elements.scratchCanvas.onpointerup = () => elements.scratchCanvas.onpointermove = null;

    document.getElementById('revealBtn').onclick = () => elements.scratchCard.classList.add('revealed');
    document.getElementById('nextBtn').onclick = () => { currentIndex++; renderCard(); };
    document.getElementById('speakBtn').onclick = () => speakWord(currentWords[currentIndex].word);
    elements.answerSubmitBtn.onclick = handleSubjective;
    elements.answerInput.onkeydown = (e) => { if(e.key === 'Enter') handleSubjective(); };
    document.getElementById('restartBtn').onclick = () => location.reload();
    document.getElementById('backBtn').onclick = () => location.href = 'vocab.html';
    document.getElementById('refreshBtn').onclick = () => location.reload();
    document.getElementById('logoutBtn').onclick = () => { supabase.auth.signOut(); location.href='login.html'; };

    init();
  </script>
</body>
</html>
