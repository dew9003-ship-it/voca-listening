<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보카엔딩 - 단어 학습</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4f7fb; --card: #ffffff; --line: #e5e7eb; --text: #1f2937;
      --blue: #4f8cff; --green: #10b981; --red: #ef4444; --orange: #f59e0b;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    
    .study-wrap { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 20px; }
    
    /* 상단 헤더 */
    .study-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .heart-box { color: var(--red); font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }
    .progress-container { flex: 1; margin: 0 15px; height: 10px; background: var(--line); border-radius: 5px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: var(--blue); transition: width 0.3s; }

    /* 단어 카드 구역 */
    .card-area { flex: 1; perspective: 1000px; position: relative; margin-bottom: 30px; }
    .card {
      width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }
    
    .card-face {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #fff; border-radius: 30px; box-shadow: var(--shadow); padding: 40px;
    }
    .card-back { transform: rotateY(180deg); background: #f9faff; }

    .word-text { font-size: 48px; font-weight: 800; color: var(--blue); margin-bottom: 10px; text-align: center; }
    .phonetic { font-size: 18px; color: var(--muted); margin-bottom: 20px; }
    .meaning-text { font-size: 32px; font-weight: 700; color: var(--text); text-align: center; }
    .example-text { font-size: 16px; color: #6b7280; margin-top: 20px; line-height: 1.5; text-align: center; }

    /* 하단 버튼 */
    .bottom-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    button { 
      border: none; border-radius: 20px; padding: 20px; font-size: 18px; font-weight: 700; 
      cursor: pointer; transition: 0.2s; color: white;
    }
    .btn-unknown { background: var(--red); box-shadow: 0 4px 0 #c53030; }
    .btn-know { background: var(--green); box-shadow: 0 4px 0 #059669; }
    button:active { transform: translateY(3px); box-shadow: none; }

    /* 로딩 및 완료 화면 */
    .overlay {
      position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;
    }
    .hidden { display: none !important; }
    .result-icon { font-size: 60px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="loadingOverlay" class="overlay">
    <div class="word-text">잠시만 기다려주세요...</div>
  </div>

  <!-- 학습 완료 화면 -->
  <div id="finishOverlay" class="overlay hidden">
    <div class="result-icon">🎉</div>
    <h2 style="font-size: 28px;">오늘의 학습 완료!</h2>
    <p style="color: var(--muted); margin-bottom: 30px;">정말 멋져요. 내일도 또 만나요!</p>
    <button onclick="location.href='index.html'" style="background: var(--blue); width: 200px;">학습 종료</button>
  </div>

  <div class="study-wrap">
    <div class="study-header">
      <button onclick="confirmExit()" style="background:none; color:var(--text); padding:5px; font-size:20px;">✕</button>
      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="heart-box">❤️ <span id="heartCount">-</span></div>
    </div>

    <div class="card-area">
      <div class="card" id="mainCard" onclick="flipCard()">
        <!-- 앞면 (단어) -->
        <div class="card-face card-front">
          <div id="wordDisplay" class="word-text">Word</div>
          <div id="phoneticDisplay" class="phonetic">/pronunciation/</div>
          <div style="color: var(--muted); font-size: 14px; margin-top: 20px;">터치하여 뜻 확인</div>
        </div>
        <!-- 뒷면 (뜻) -->
        <div class="card-face card-back">
          <div id="meaningDisplay" class="meaning-text">뜻</div>
          <div id="exampleDisplay" class="example-text">예문이 이곳에 표시됩니다.</div>
        </div>
      </div>
    </div>

    <div class="bottom-btns">
      <button class="btn-unknown" onclick="handleAnswer(false)">모르겠어요</button>
      <button class="btn-know" onclick="handleAnswer(true)">알아요</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    // URL 파라미터 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const setId = urlParams.get('setId');

    let currentWords = [];
    let currentIndex = 0;
    let hearts = 0;
    let isFlipped = false;

    async function init() {
      if (!setId) { alert('잘못된 접근입니다.'); location.href='index.html'; return; }

      // 1. 학습 세트 정보 및 하트 수 가져오기
      const { data: setInfo, error: setErr } = await supabase
        .from('user_vocab_daily_sets')
        .select('*')
        .eq('id', setId)
        .single();

      if (setErr || !setInfo) { alert('데이터를 불러오지 못했습니다.'); return; }
      
      hearts = setInfo.heart_count || 5;
      document.getElementById('heartCount').textContent = hearts;

      // 2. 단어 상세 정보 가져오기
      const { data: wordList, error: wordErr } = await supabase
        .from('vocab_words')
        .select('*')
        .in('id', setInfo.total_words);

      if (wordErr) { alert('단어 정보를 불러오지 못했습니다.'); return; }

      // DB의 total_words 순서대로 정렬
      currentWords = setInfo.total_words.map(id => wordList.find(w => w.id === id)).filter(Boolean);

      document.getElementById('loadingOverlay').classList.add('hidden');
      renderWord();
    }

    // 카드 렌더링
    function renderWord() {
      if (currentIndex >= currentWords.length) {
        completeStudy();
        return;
      }

      const word = currentWords[currentIndex];
      isFlipped = false;
      document.getElementById('mainCard').classList.remove('flipped');
      
      document.getElementById('wordDisplay').textContent = word.word;
      document.getElementById('phoneticDisplay').textContent = word.phonetic || '';
      document.getElementById('meaningDisplay').textContent = word.meaning;
      document.getElementById('exampleDisplay').textContent = word.example_en || '예문이 없습니다.';
      
      // 진행바 업데이트
      const progress = (currentIndex / currentWords.length) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
    }

    // 카드 뒤집기
    window.flipCard = () => {
      isFlipped = !isFlipped;
      document.getElementById('mainCard').classList.toggle('flipped', isFlipped);
    };

    // 정답 처리 (알아요/몰라요)
    window.handleAnswer = async (known) => {
      if (!known) {
        hearts--;
        document.getElementById('heartCount').textContent = hearts;
        if (hearts <= 0) {
          alert('생명을 모두 소진했습니다! 다시 도전하세요.');
          location.href = 'index.html';
          return;
        }
      }

      // 학습 기록 저장 로직 (필요 시 API 호출)
      // await supabase.from('user_vocab_word_progress').upsert({...});

      currentIndex++;
      if (currentIndex <= currentWords.length) {
        renderWord();
      }
    };

    // 학습 완료
    async function completeStudy() {
      document.getElementById('progressBar').style.width = `100%`;
      
      // DB 상태 업데이트
      await supabase.from('user_vocab_daily_sets')
        .update({ status: 'completed', completed_at: new Date() })
        .eq('id', setId);

      document.getElementById('finishOverlay').classList.remove('hidden');
    }

    window.confirmExit = () => {
      if (confirm('학습을 중단하고 나갈까요? 저장되지 않은 진행 상황은 사라집니다.')) {
        location.href = 'index.html';
      }
    };

    init();
  </script>
</body>
</html>
