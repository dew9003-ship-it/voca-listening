<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보카엔딩 단어 학습</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --blue:#4f8cff;
      --green:#4caf50;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:20px;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .title-box h1{
      margin:0;
      font-size:30px;
      font-weight:800;
    }

    .title-box p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .btns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:14px;
      padding:11px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-blue{ background:var(--blue); color:#fff; }
    .btn-green{ background:var(--green); color:#fff; }
    .btn-slate{ background:#607d8b; color:#fff; }
    .btn-light{ background:#fff; color:#334155; border:1px solid var(--line); }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .summary-card,.panel{
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .summary-card{ padding:18px; }

    .summary-card .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .summary-card .value{
      font-size:28px;
      font-weight:800;
    }

    .panel{
      padding:18px;
      margin-bottom:18px;
    }

    .progress-wrap{
      width:100%;
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:18px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#4f8cff,#6fcf97);
      transition:width .2s ease;
    }

    .word-card{
      border:1px solid var(--line);
      background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);
      border-radius:22px;
      padding:24px;
      text-align:center;
      min-height:420px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:16px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 12px;
      border-radius:999px;
      background:#eef4ff;
      color:#355ea9;
      font-size:12px;
      font-weight:800;
      width:max-content;
      margin:0 auto;
    }

    .word-text{
      font-size:52px;
      font-weight:900;
      line-height:1.15;
      word-break:break-word;
    }

    .sub-text{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .scratch-wrap{
      width:100%;
      max-width:760px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .scratch-label{
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    .scratch-card{
      position:relative;
      width:100%;
      min-height:140px;
      border-radius:22px;
      overflow:hidden;
      border:2px dashed #bfd5ff;
      background:#f8fbff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .scratch-answer{
      position:relative;
      z-index:1;
      font-size:34px;
      font-weight:800;
      line-height:1.5;
      text-align:center;
      word-break:keep-all;
      padding:10px;
    }

    .scratch-cover{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0)),
        repeating-linear-gradient(
          135deg,
          #dfe6ef 0px,
          #dfe6ef 12px,
          #d4dde8 12px,
          #d4dde8 24px
        );
      transition:opacity .25s ease, transform .25s ease;
      cursor:pointer;
    }

    .scratch-cover::after{
      content:'긁어서 확인';
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.9);
      color:#334155;
      font-size:13px;
      font-weight:800;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .scratch-card.revealed .scratch-cover{
      opacity:0;
      transform:scale(1.02);
      pointer-events:none;
    }

    .footer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:16px;
    }

    .status{
      margin-top:14px;
      min-height:24px;
      color:#334155;
      font-size:14px;
      text-align:center;
    }

    .empty,.loading{
      padding:36px 14px;
      text-align:center;
      color:var(--muted);
      font-weight:700;
    }

    @media (max-width:640px){
      .wrap{ padding:14px; }
      .title-box h1{ font-size:25px; }
      .word-text{ font-size:38px; }
      .scratch-answer{ font-size:26px; }
      .footer-actions button{ width:100%; }
      .word-card{ min-height:360px; padding:18px; }
      .scratch-card{ min-height:120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-box">
        <h1>오늘의 단어 학습</h1>
        <p>영단어를 보고 발음을 들은 뒤 뜻을 확인해요. 1차 카드와 2차 카드를 모두 학습합니다.</p>
      </div>
      <div class="btns">
        <button id="backBtn" class="btn-light" type="button">단어장 선택</button>
        <button id="refreshBtn" class="btn-blue" type="button">새로고침</button>
        <button id="logoutBtn" class="btn-slate" type="button">로그아웃</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">오늘 학습 단어 수</div>
        <div class="value" id="totalCountText">-</div>
      </div>
      <div class="summary-card">
        <div class="label">현재 카드</div>
        <div class="value" id="currentStepText">-</div>
      </div>
      <div class="summary-card">
        <div class="label">현재 사용자</div>
        <div class="value" id="currentName" style="font-size:22px;">-</div>
      </div>
    </div>

    <div class="panel">
      <h2 id="bookTitle">단어 학습</h2>
      <p id="bookDesc" class="sub-text">오늘 생성된 학습 세트를 불러옵니다.</p>

      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="loadingBox" class="loading">오늘 학습 세트를 불러오는 중입니다...</div>
      <div id="emptyBox" class="empty" style="display:none;">오늘 학습 세트가 없습니다. 먼저 단어장과 플랜을 선택해 주세요.</div>

      <div id="studyBox" style="display:none;">
        <div class="word-card">
          <div id="phaseBadge" class="pill">영단어 카드</div>
          <div id="wordText" class="word-text">word</div>
          <div id="cardGuide" class="sub-text">단어가 보일 때 발음도 함께 재생됩니다.</div>

          <div class="scratch-wrap">
            <div id="scratchLabel" class="scratch-label">아래 영역을 눌러 정답을 확인하세요.</div>
            <div id="scratchCard" class="scratch-card">
              <div id="scratchAnswer" class="scratch-answer">뜻</div>
              <div id="scratchCover" class="scratch-cover"></div>
            </div>
          </div>

          <div class="footer-actions">
            <button id="speakBtn" class="btn-light" type="button">발음 다시 듣기</button>
            <button id="revealBtn" class="btn-blue" type="button">뜻 확인</button>
            <button id="nextBtn" class="btn-green" type="button">다음 카드</button>
          </div>
        </div>
      </div>

      <div id="completeBox" class="empty" style="display:none;">
        오늘 1차·2차 단어 카드 학습을 모두 끝냈습니다.<br />
        <div class="footer-actions" style="margin-top:18px;">
          <button id="restartBtn" class="btn-blue" type="button">처음부터 다시 보기</button>
          <button id="goSelectBtn" class="btn-light" type="button">단어장 선택으로</button>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    const currentNameEl = document.getElementById('currentName');
    const totalCountText = document.getElementById('totalCountText');
    const currentStepText = document.getElementById('currentStepText');
    const bookTitle = document.getElementById('bookTitle');
    const bookDesc = document.getElementById('bookDesc');
    const progressBar = document.getElementById('progressBar');
    const loadingBox = document.getElementById('loadingBox');
    const emptyBox = document.getElementById('emptyBox');
    const studyBox = document.getElementById('studyBox');
    const completeBox = document.getElementById('completeBox');
    const wordText = document.getElementById('wordText');
    const phaseBadge = document.getElementById('phaseBadge');
    const cardGuide = document.getElementById('cardGuide');
    const scratchLabel = document.getElementById('scratchLabel');
    const scratchCard = document.getElementById('scratchCard');
    const scratchAnswer = document.getElementById('scratchAnswer');
    const scratchCover = document.getElementById('scratchCover');
    const statusEl = document.getElementById('status');

    let me = null;
    let role = 'student';
    let currentWords = [];
    let currentIndex = 0;
    let studyPhase = 'word_to_meaning';

    function setStatus(message, isError = false) {
      statusEl.textContent = message || '';
      statusEl.style.color = isError ? '#b42318' : '#334155';
    }

    function resetScratch() {
      scratchCard.classList.remove('revealed');
    }

    function revealScratch() {
      scratchCard.classList.add('revealed');
    }

    async function requireAuth() {
      const { data: authData, error: authError } = await supabase.auth.getUser();
      if (authError || !authData.user) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return false;
      }

      me = authData.user;

      const { data: profileData } = await supabase
        .from('profiles')
        .select('user_id, name, role')
        .eq('user_id', me.id)
        .maybeSingle();

      if (profileData?.role) role = profileData.role;
      currentNameEl.textContent = profileData?.name || me.email || '사용자';
      return true;
    }

    function speakWord(text) {
      if (!text) return;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        console.error(error);
      }
    }

    function renderCard() {
      if (!currentWords.length) return;

      if (currentIndex >= currentWords.length) {
        if (studyPhase === 'word_to_meaning') {
          studyPhase = 'meaning_to_word';
          currentIndex = 0;
          renderCard();
          return;
        }

        studyBox.style.display = 'none';
        completeBox.style.display = 'block';
        progressBar.style.width = '100%';
        currentStepText.textContent = `${currentWords.length} / ${currentWords.length}`;
        setStatus('오늘 단어 카드 학습 완료');
        return;
      }

      const item = currentWords[currentIndex];
      const total = currentWords.length;
      const baseProgress = studyPhase === 'word_to_meaning' ? 0 : 50;
      const progress = total > 0 ? baseProgress + ((currentIndex / total) * 50) : 0;

      if (studyPhase === 'word_to_meaning') {
        phaseBadge.textContent = '영단어 카드';
        wordText.textContent = item.word || '-';
        scratchAnswer.textContent = item.primary_meaning_ko || '뜻 미입력';
        scratchLabel.textContent = '아래 영역을 눌러 뜻을 확인하세요.';
        cardGuide.textContent = '단어가 보일 때 발음도 함께 재생됩니다.';
        resetScratch();
        speakWord(item.tts_text || item.word || '');
        setStatus('1차 학습: 영단어를 보고 뜻을 확인하세요.');
      } else {
        phaseBadge.textContent = '뜻 카드';
        wordText.textContent = item.primary_meaning_ko || '뜻 미입력';
        scratchAnswer.textContent = item.word || '-';
        scratchLabel.textContent = '아래 영역을 눌러 영단어를 확인하세요.';
        cardGuide.textContent = '뜻을 보고 어떤 영단어인지 떠올려 보세요.';
        resetScratch();
        setStatus('2차 학습: 뜻을 보고 영단어를 확인하세요.');
      }

      totalCountText.textContent = String(total);
      currentStepText.textContent = `${currentIndex + 1} / ${total}`;
      progressBar.style.width = `${progress}%`;
      studyBox.style.display = 'block';
      completeBox.style.display = 'none';
    }

    async function loadTodaySet() {
      loadingBox.style.display = 'block';
      emptyBox.style.display = 'none';
      studyBox.style.display = 'none';
      completeBox.style.display = 'none';

      const today = new Date().toISOString().slice(0,10);

      const { data: setRow, error: setError } = await supabase
        .from('user_vocab_daily_sets')
        .select('id, book_id, study_date, total_words')
        .eq('user_id', me.id)
        .eq('study_date', today)
        .maybeSingle();

      if (setError || !setRow) {
        console.error(setError);
        loadingBox.style.display = 'none';
        emptyBox.style.display = 'block';
        setStatus('오늘 학습 세트를 불러오지 못했습니다.', true);
        return;
      }

      const { data: bookRow } = await supabase
        .from('vocab_books')
        .select('title, description')
        .eq('id', setRow.book_id)
        .maybeSingle();

      bookTitle.textContent = bookRow?.title || '오늘의 단어 학습';
      bookDesc.textContent = bookRow?.description || '오늘 생성된 학습 세트';

      const wordIds = Array.isArray(setRow.total_words) ? setRow.total_words : [];
      if (!wordIds.length) {
        loadingBox.style.display = 'none';
        emptyBox.style.display = 'block';
        setStatus('오늘 세트에 단어가 없습니다.', true);
        return;
      }

      const { data: wordRows, error: wordError } = await supabase
        .from('vocab_words')
        .select('id, word, tts_text, primary_meaning_ko')
        .in('id', wordIds);

      loadingBox.style.display = 'none';

      if (wordError) {
        console.error(wordError);
        emptyBox.style.display = 'block';
        setStatus('단어 상세 정보를 불러오지 못했습니다.', true);
        return;
      }

      const orderMap = new Map(wordIds.map((id, idx) => [id, idx]));
      currentWords = (wordRows || []).slice().sort((a, b) => {
        return (orderMap.get(a.id) ?? 9999) - (orderMap.get(b.id) ?? 9999);
      });

      if (!currentWords.length) {
        emptyBox.style.display = 'block';
        setStatus('오늘 세트 단어를 표시할 수 없습니다.', true);
        return;
      }

      studyPhase = 'word_to_meaning';
      currentIndex = 0;
      renderCard();
    }

    scratchCover.addEventListener('click', () => {
      revealScratch();
      setStatus('정답을 확인했습니다.');
    });

    document.getElementById('revealBtn').addEventListener('click', () => {
      revealScratch();
      setStatus('정답을 확인했습니다.');
    });

    document.getElementById('speakBtn').addEventListener('click', () => {
      if (!currentWords.length) return;
      if (studyPhase !== 'word_to_meaning') {
        setStatus('2차 카드에서는 발음 재생이 없습니다.');
        return;
      }
      const item = currentWords[currentIndex];
      speakWord(item.tts_text || item.word || '');
      setStatus('발음을 다시 재생했습니다.');
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentIndex += 1;
      renderCard();
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      studyPhase = 'word_to_meaning';
      currentIndex = 0;
      renderCard();
    });

    document.getElementById('goSelectBtn').addEventListener('click', () => {
      location.href = 'vocab.html';
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      location.href = 'vocab.html';
    });

    document.getElementById('refreshBtn').addEventListener('click', () => location.reload());

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      location.href = 'login.html';
    });

    async function init() {
      const ok = await requireAuth();
      if (!ok) return;
      await loadTodaySet();
    }

    init();
  </script>
</body>
</html>
