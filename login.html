<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보카엔딩 로그인</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f7fbff 50%, #edf7f2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      padding: 36px 28px 28px;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f8cff, #6fcf97);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 28px;
      color: #1f2937;
    }

    .subtitle {
      margin: 10px 0 28px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    .input {
      width: 100%;
      height: 50px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .input:focus {
      border-color: #4f8cff;
      box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.12);
    }

    .login-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f8cff, #3b82f6);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .login-btn:hover {
      opacity: 0.95;
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #ef4444;
    }

    .footer-text {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 28px 20px 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">V</div>
    <h1>보카엔딩 로그인</h1>
    <div class="subtitle">
      영어 듣기·진도 학습 시스템에 로그인하세요.
    </div>

    <div class="field">
      <label class="label" for="email">이메일</label>
      <input class="input" type="email" id="email" placeholder="example@email.com" />
    </div>

    <div class="field">
      <label class="label" for="password">비밀번호</label>
      <input class="input" type="password" id="password" placeholder="비밀번호를 입력하세요" />
    </div>

    <button id="loginBtn" class="login-btn" type="button">로그인</button>
    <div id="message" class="message"></div>

    <div class="footer-text">
      VocaEnding Admin / Student Access
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    const btn = document.getElementById('loginBtn');
    const messageEl = document.getElementById('message');

    function setMessage(text, isError = true) {
      messageEl.textContent = text;
      messageEl.style.color = isError ? '#ef4444' : '#16a34a';
    }

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        setMessage('이메일과 비밀번호를 입력하세요.');
        return;
      }

      setMessage('');
      btn.disabled = true;
      btn.textContent = '로그인 중...';

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setMessage('로그인 실패: ' + error.message);
        btn.disabled = false;
        btn.textContent = '로그인';
        return;
      }

      const user = data.user;
const guessedName = email.split('@')[0];

const { data: existingProfile, error: existingProfileError } = await supabase
  .from('profiles')
  .select('user_id, role')
  .eq('user_id', user.id)
  .maybeSingle();

if (existingProfileError) {
  setMessage('profiles 조회 실패: ' + existingProfileError.message);
  btn.disabled = false;
  btn.textContent = '로그인';
  return;
}

if (!existingProfile) {
  const { error: profileError } = await supabase
    .from('profiles')
    .insert({
      user_id: user.id,
      email: user.email,
      name: guessedName,
      role: 'student',
      last_login_at: new Date().toISOString()
    });

  if (profileError) {
    setMessage('profiles 저장 실패: ' + profileError.message);
    btn.disabled = false;
    btn.textContent = '로그인';
    return;
  }
} else {
  const { error: updateProfileError } = await supabase
    .from('profiles')
    .update({
      last_login_at: new Date().toISOString()
    })
    .eq('user_id', user.id);

  if (updateProfileError) {
    setMessage('최근 접속시간 저장 실패: ' + updateProfileError.message);
    btn.disabled = false;
    btn.textContent = '로그인';
    return;
  }
}

setMessage('로그인 성공!', false);

if (existingProfile?.role === 'admin') {
  location.href = 'admin.html';
} else {
  location.href = 'index.html';
}
    });

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        btn.click();
      }
    });
  </script>
</body>
</html>
