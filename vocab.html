<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>보카엔딩 단어 학습관</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root{
--bg:#f4f7fb; --card:#ffffff; --line:#e5e7eb; --text:#1f2937; --muted:#6b7280;
--blue:#4f8cff; --green:#4caf50; --red:#ef4444; --shadow:0 10px 30px rgba(15,23,42,.08);
}
    body{
      margin:0; font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%);
      color:var(--text); overflow-x:hidden;
    }
    body{ margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.wrap{ max-width:1000px; margin:0 auto; padding:15px; min-height:100vh; }
.topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
    .topbar h1{ margin:0; font-size:22px; font-weight:800; letter-spacing:-0.02em; }
    .topbar h1{ margin:0; font-size:22px; font-weight:800; }

    button{
      border:none; border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer;
      transition:all .12s ease;
    }
    button{ border:none; border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer; transition:all .12s ease; }
.btn-blue{ background:var(--blue); color:#fff; }
.btn-slate{ background:#607d8b; color:#fff; }
.btn-light{ background:#fff; color:#334155; border:1px solid var(--line); }

    /* 화면 전환 애니메이션 */
.view-section { display: none; animation: slideIn 0.2s ease-out; }
.view-section.active { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* 상단 요약 바 */
.summary-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:15px; }
.summary-card{ background:var(--card); border-radius:16px; padding:10px; box-shadow:var(--shadow); text-align:center; border:1.5px solid transparent; }
.summary-card.highlight { border-color: var(--blue); background:#f0f7ff; }
.summary-card .label{ color:var(--muted); font-size:10px; margin-bottom:4px; }
    .summary-card .value{ font-size:12px; font-weight:800; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-card .value{ font-size:12px; font-weight:800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.panel{ padding:18px; margin-bottom:15px; background:var(--card); border-radius:20px; box-shadow:var(--shadow); }
    .panel-head{ margin-bottom:12px; }
    .panel-head h2{ margin:0; font-size:17px; font-weight:800; }

    /* 카드 그리드: 모바일 2열 */
.grid-layout { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
    .select-card{
      border:1.5px solid var(--line); background:#fff; border-radius:16px;
      padding:12px; min-height:100px; display:flex; flex-direction:column;
      justify-content:space-between; cursor:pointer; text-align:left;
    }
    .select-card:hover { border-color:var(--blue); }
    .select-card{ border:1.5px solid var(--line); background:#fff; border-radius:16px; padding:12px; min-height:100px; display:flex; flex-direction:column; justify-content:center; cursor:pointer; text-align:left; }
.select-card.selected { border-color:var(--blue); background:#f0f7ff; }
    .card-title{ font-size:15px; font-weight:800; }

    .badge{ display:inline-flex; padding:3px 7px; border-radius:6px; font-size:10px; font-weight:800; background:#eef4ff; color:#335ea8; margin-bottom:6px; }
    .card-title{ font-size:15px; font-weight:800; margin-bottom:4px; line-height:1.3; }
    .card-meta{ color:var(--muted); font-size:11px; }

    /* 로비 모드 카드 */
.mode-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
    .mode-card{
      border:1.5px solid #f1f5f9; background:#fff; border-radius:20px; padding:20px 10px;
      text-align:center; cursor:pointer; transition: transform 0.2s;
    }
    .mode-card:active { transform: scale(0.95); }
    .mode-card{ border:1.5px solid #f1f5f9; background:#fff; border-radius:20px; padding:20px 10px; text-align:center; cursor:pointer; }
.mode-card .icon{ font-size:32px; margin-bottom:8px; display:block; }
    .mode-card h3{ margin:0 0 5px; font-size:15px; font-weight:800; }
    .mode-card p{ margin:0; font-size:11px; color:var(--muted); line-height:1.3; }
    .status{ margin-top:10px; text-align:center; font-size:12px; color:var(--blue); font-weight:700; }

    .loading{ padding:40px; text-align:center; color:var(--muted); font-size:14px; }
    .status{ margin-top:10px; text-align:center; font-size:12px; min-height:18px; color:var(--blue); font-weight:700; }

    @media (min-width:768px){
      .grid-layout { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .mode-grid { grid-template-columns: repeat(4, 1fr); }
      .summary-card .value { font-size: 15px; }
    }
    @media (min-width:768px){ .grid-layout { grid-template-columns: repeat(3, 1fr); } .mode-grid { grid-template-columns: repeat(4, 1fr); } }
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<h1>단어 학습관</h1>
<div class="btns">
<button id="prevBtn" class="btn-light" style="display:none;">이전</button>
<button id="logoutBtn" class="btn-slate">로그아웃</button>
</div>
</div>

<div class="summary-grid">
      <div id="sumBookCard" class="summary-card">
        <div class="label">단어장</div>
        <div id="sumBook" class="value">미선택</div>
      </div>
      <div id="sumPlanCard" class="summary-card">
        <div class="label">학습량</div>
        <div id="sumPlan" class="value">미선택</div>
      </div>
      <div class="summary-card">
        <div class="label">학습자</div>
        <div id="currentName" class="value">-</div>
      </div>
      <div id="sumBookCard" class="summary-card"><div class="label">단어장</div><div id="sumBook" class="value">미선택</div></div>
      <div id="sumPlanCard" class="summary-card"><div class="label">학습량</div><div id="sumPlan" class="value">미선택</div></div>
      <div class="summary-card"><div class="label">학습자</div><div id="currentName" class="value">-</div></div>
</div>

<div id="step1" class="view-section active">
      <div class="panel">
        <div class="panel-head"><h2>1단계 · 단어장 선택</h2></div>
        <div id="bookGrid" class="grid-layout"></div>
        <div id="bookLoading" class="loading">단어장을 불러오는 중...</div>
      </div>
      <div class="panel"><h3>1단계 · 단어장 선택</h3><div id="bookGrid" class="grid-layout"></div></div>
</div>

<div id="step2" class="view-section">
      <div class="panel">
        <div class="panel-head"><h2>2단계 · 학습량 선택</h2></div>
        <div id="planGrid" class="grid-layout"></div>
        <div id="planLoading" class="loading">플랜을 불러오는 중...</div>
      </div>
      <div class="panel"><h3>2단계 · 학습량 선택</h3><div id="planGrid" class="grid-layout"></div></div>
</div>

<div id="step3" class="view-section">
<div class="panel">
        <div class="panel-head"><h2>3단계 · 학습 모드 선택</h2></div>
        <h3>3단계 · 학습 모드 선택</h3>
<div class="mode-grid">
          <div class="mode-card" onclick="startStudy('card')">
            <span class="icon">🗂️</span>
            <h3>카드 학습</h3>
            <p>익히기</p>
          </div>
          <div class="mode-card" onclick="startStudy('basic')">
            <span class="icon">📝</span>
            <h3>기초 테스트</h3>
            <p>객관식</p>
          </div>
          <div class="mode-card" onclick="startStudy('advanced')">
            <span class="icon">⌨️</span>
            <h3>심화 테스트</h3>
            <p>주관식</p>
          </div>
          <div class="mode-card" onclick="startStudy('game')">
            <span class="icon">🧩</span>
            <h3>매칭 게임</h3>
            <p>짝 맞추기</p>
          </div>
          <div class="mode-card" onclick="startStudy('card')"><span class="icon">🗂️</span><h4>카드 학습</h4></div>
          <div class="mode-card" onclick="startStudy('basic')"><span class="icon">📝</span><h4>기초 테스트</h4></div>
          <div class="mode-card" onclick="startStudy('advanced')"><span class="icon">⌨️</span><h4>심화 테스트</h4></div>
          <div class="mode-card" onclick="startStudy('game')"><span class="icon">🧩</span><h4>매칭 게임</h4></div>
</div>
<div id="status" class="status"></div>
</div>
</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('https://uuzhdxangctewuklvmlv.supabase.co', 'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F');

    let me = null;
    let currentStep = 1;
    let selectedBook = null;
    let selectedPlan = null;
    let books = [];
    let plans = [];

    const views = {
      s1: document.getElementById('step1'), s2: document.getElementById('step2'), s3: document.getElementById('step3'),
      prevBtn: document.getElementById('prevBtn'), sumBook: document.getElementById('sumBook'), sumPlan: document.getElementById('sumPlan'),
      status: document.getElementById('status')
    };
    let me = null; let currentStep = 1; let selectedBook = null; let selectedPlan = null; let books = []; let plans = [];
    const views = { s1: document.getElementById('step1'), s2: document.getElementById('step2'), s3: document.getElementById('step3'), prevBtn: document.getElementById('prevBtn'), sumBook: document.getElementById('sumBook'), sumPlan: document.getElementById('sumPlan'), status: document.getElementById('status') };

async function init() {
const { data: { user } } = await supabase.auth.getUser();
if (!user) { location.href = 'login.html'; return; }
me = user;
const { data: prof } = await supabase.from('profiles').select('name').eq('user_id', me.id).maybeSingle();
document.getElementById('currentName').textContent = prof?.name || me.email.split('@')[0];
await Promise.all([loadBooks(), loadPlans()]);
}

async function loadBooks() {
const { data } = await supabase.from('vocab_books').select('*').eq('is_active', true).order('sort_order');
      document.getElementById('bookLoading').style.display = 'none';
books = data || [];
      document.getElementById('bookGrid').innerHTML = books.map(b => `
        <div class="select-card" onclick="nextStep(2, '${b.id}')">
          <div><div class="badge">단어장</div><div class="card-title">${b.title}</div></div>
          <div class="card-meta">${b.description || '단어 학습'}</div>
        </div>
      `).join('');
      document.getElementById('bookGrid').innerHTML = books.map(b => `<div class="select-card" onclick="nextStep(2, '${b.id}')"><div class="card-title">${b.title}</div></div>`).join('');
}

async function loadPlans() {
const { data } = await supabase.from('vocab_plans').select('*').eq('is_active', true).order('sort_order');
      document.getElementById('planLoading').style.display = 'none';
plans = data || [];
      document.getElementById('planGrid').innerHTML = plans.map(p => `
        <div class="select-card" onclick="nextStep(3, '${p.id}')">
          <div><div class="badge">학습량</div><div class="card-title">${p.title}</div></div>
          <div class="card-meta">${p.daily_new_count}단어</div>
        </div>
      `).join('');
      document.getElementById('planGrid').innerHTML = plans.map(p => `<div class="select-card" onclick="nextStep(3, '${p.id}')"><div class="card-title">${p.title}</div></div>`).join('');
}

window.nextStep = async (step, id) => {
if (step === 2) {
        selectedBook = books.find(b => b.id === id);
        views.sumBook.textContent = selectedBook.title;
        document.getElementById('sumBookCard').classList.add('highlight');
        views.s1.classList.remove('active'); views.s2.classList.add('active');
        views.prevBtn.style.display = 'block'; currentStep = 2;
        selectedBook = books.find(b => b.id === id); views.sumBook.textContent = selectedBook.title;
        views.s1.classList.remove('active'); views.s2.classList.add('active'); views.prevBtn.style.display = 'block'; currentStep = 2;
} 
else if (step === 3) {
        selectedPlan = plans.find(p => p.id === id);
        views.sumPlan.textContent = selectedPlan.title;
        document.getElementById('sumPlanCard').classList.add('highlight');
        views.status.textContent = '학습 세트 갱신 중...';
        selectedPlan = plans.find(p => p.id === id); views.sumPlan.textContent = selectedPlan.title;
        views.status.textContent = '단어 데이터 동기화 중... (' + selectedPlan.daily_new_count + '개)';
try {
          await createTodaySet(); // 여기서 20개면 20개로 DB를 덮어씌움
          views.s2.classList.remove('active'); views.s3.classList.add('active');
          currentStep = 3; views.status.textContent = '준비 완료!';
        } catch (e) { alert(e.message); }
          await createTodaySet();
          views.s2.classList.remove('active'); views.s3.classList.add('active'); currentStep = 3;
          views.status.textContent = '준비 완료! 학습 모드를 선택하세요.';
        } catch (e) { alert('데이터 생성 실패: ' + e.message); }
}
};

views.prevBtn.onclick = () => {
      if (currentStep === 2) {
        views.s2.classList.remove('active'); views.s1.classList.add('active');
        views.prevBtn.style.display = 'none'; views.sumBook.textContent = '미선택';
        document.getElementById('sumBookCard').classList.remove('highlight');
        currentStep = 1;
      } else if (currentStep === 3) {
        views.s3.classList.remove('active'); views.s2.classList.add('active');
        views.sumPlan.textContent = '미선택';
        document.getElementById('sumPlanCard').classList.remove('highlight');
        currentStep = 2;
      }
      if (currentStep === 2) { views.s2.classList.remove('active'); views.s1.classList.add('active'); views.prevBtn.style.display = 'none'; currentStep = 1; }
      else if (currentStep === 3) { views.s3.classList.remove('active'); views.s2.classList.add('active'); currentStep = 2; }
};

async function createTodaySet() {
const today = new Date().toISOString().slice(0, 10);
      const { data: enroll } = await supabase.from('user_vocab_enrollments').upsert({ user_id: me.id, book_id: selectedBook.id, plan_id: selectedPlan.id, status: 'studying' }, { onConflict: 'user_id,book_id' }).select().single();

      // 1. Enrollment 생성/수정
      const { data: enroll } = await supabase.from('user_vocab_enrollments')
        .upsert({ user_id: me.id, book_id: selectedBook.id, plan_id: selectedPlan.id, status: 'studying' }, { onConflict: 'user_id,book_id' })
        .select().single();
      
      // 2. 단어 가져오기 (선택한 개수만큼)
      const { data: words } = await supabase.from('vocab_book_words')
        .select('word_id').eq('book_id', selectedBook.id).order('book_order').limit(selectedPlan.daily_new_count);
      const { data: words } = await supabase.from('vocab_book_words').select('word_id').eq('book_id', selectedBook.id).order('book_order').limit(selectedPlan.daily_new_count);

      if (!words?.length) throw new Error('단어장에 단어가 없습니다.');
      if (!words || words.length === 0) throw new Error('불러올 단어가 없습니다.');

      // 3. Upsert: 기존에 10개로 기록되어 있더라도 현재 선택한 20개로 강제 업데이트
await supabase.from('user_vocab_daily_sets').upsert({
        enrollment_id: enroll.id, 
        user_id: me.id, 
        book_id: selectedBook.id, 
        plan_id: selectedPlan.id,
        day_no: 1, 
        study_date: today, 
        total_words: words.map(w => w.word_id), 
        heart_count: selectedPlan.heart_count
        enrollment_id: enroll.id, user_id: me.id, book_id: selectedBook.id, plan_id: selectedPlan.id,
        study_date: today, total_words: words.map(w => w.word_id), heart_count: selectedPlan.heart_count, day_no: 1
}, { onConflict: 'user_id,study_date' });
}

window.startStudy = (mode) => { location.href = `vocab_study.html?mode=${mode}`; };
document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); location.href = 'login.html'; };

init();
</script>
</body>
</html>
