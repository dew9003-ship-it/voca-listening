<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .refresh-btn { background: #2196f3; color: white; }
    .logout-btn { background: #607d8b; color: white; }
    .home-btn { background: #4caf50; color: white; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .summary .item {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
    .summary .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .summary .value {
      font-size: 24px;
      font-weight: bold;
    }

    .status {
      margin-bottom: 12px;
      font-size: 14px;
      color: #444;
    }

    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: white;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-admin {
      background: #fff3cd;
      color: #8a6d3b;
    }
    .badge-student {
      background: #e3f2fd;
      color: #1565c0;
    }
    .muted {
      color: #888;
    }
    .progress-box {
      min-width: 140px;
    }
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      background: #4caf50;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>관리자 페이지</h1>
      <div class="btns">
  <button class="refresh-btn" id="refreshBtn">새로고침</button>
  <button class="home-btn" id="homeBtn">듣기 페이지</button>
  <button class="home-btn" id="grammarBtn">문법 페이지</button>
  <button class="logout-btn" id="logoutBtn">로그아웃</button>
</div>
    </div>

    <div class="summary">
      <div class="item">
        <div class="label">전체 사용자 수</div>
        <div class="value" id="totalUsers">-</div>
      </div>
      <div class="item">
        <div class="label">학생 수</div>
        <div class="value" id="totalStudents">-</div>
      </div>
      <div class="item">
        <div class="label">관리자 수</div>
        <div class="value" id="totalAdmins">-</div>
      </div>
      <div class="item">
        <div class="label">진도 데이터 있는 사용자</div>
        <div class="value" id="totalProgressUsers">-</div>
      </div>
    </div>
<div class="card">
  <h2 style="margin:0 0 14px 0; font-size:20px;">숙제 만들기</h2>

  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px;">
    <select id="assignmentClass" style="padding:10px; border:1px solid #ddd; border-radius:10px;">
  <option value="">반 선택</option>
</select>
    <input id="assignmentTitle" type="text" placeholder="숙제 제목" style="padding:10px; border:1px solid #ddd; border-radius:10px;" />

    <select id="assignmentCategory" style="padding:10px; border:1px solid #ddd; border-radius:10px;">
      <option value="listening">듣기</option>
      <option value="grammar">문법</option>
      <option value="exam">시험대비</option>
    </select>

    <select id="assignmentGrade" style="padding:10px; border:1px solid #ddd; border-radius:10px;">
  <option value="">학년 선택</option>
  <option value="중1">중1</option>
  <option value="중2">중2</option>
  <option value="중3">중3</option>
  <option value="고1">고1</option>
  <option value="고2">고2</option>
  <option value="고3">고3</option>
</select>
    <select id="assignmentPublisher" style="padding:10px; border:1px solid #ddd; border-radius:10px;">
  <option value="">출판사 선택</option>
  <option value="천재">천재</option>
  <option value="비상">비상</option>
  <option value="동아">동아</option>
  <option value="미래엔">미래엔</option>
  <option value="능률">능률</option>
  <option value="YBM">YBM</option>
</select>
    <input id="assignmentUnit" type="text" placeholder="단원명" style="padding:10px; border:1px solid #ddd; border-radius:10px;" />

    <input id="assignmentStartIndex" type="number" placeholder="시작 번호" style="padding:10px; border:1px solid #ddd; border-radius:10px;" />
    <input id="assignmentEndIndex" type="number" placeholder="끝 번호" style="padding:10px; border:1px solid #ddd; border-radius:10px;" />
    <input id="assignmentDueDate" type="date" style="padding:10px; border:1px solid #ddd; border-radius:10px;" />
  </div>

  <div style="margin-top:12px;">
    <button id="createAssignmentBtn" class="home-btn">숙제 생성</button>
  </div>

  <div id="assignmentCreateStatus" style="margin-top:10px; font-size:14px; color:#444;"></div>
</div>
    <div class="card">
  <div class="status" id="status">불러오는 중...</div>

  <div id="classFilterWrap" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
    <button id="classAllBtn" type="button" style="border:none; border-radius:999px; padding:8px 12px; font-size:13px; font-weight:bold; cursor:pointer; background:#4f8cff; color:white;">전체</button>
  </div>

  <div class="table-wrap">
        <table>
          <thead>
            <tr>
  <th>이름</th>
  <th>진도율</th>
              <th>문법</th>
  <th>최근학습시간</th>
  <th>이메일</th>
  <th>권한</th>
  <th>반</th>
              <th>반관리</th>
  <th>user_id</th>
  <th>max_index</th>
  <th>가입일</th>
</tr>
          </thead>
          <tbody id="studentTableBody">
            <tr>
              <td colspan="8">데이터를 불러오는 중입니다...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    const TOTAL_SENTENCES = 177;

    const statusEl = document.getElementById('status');
const tbody = document.getElementById('studentTableBody');
const classFilterWrap = document.getElementById('classFilterWrap');

let selectedClassName = '전체';
let allProfiles = [];
let allProgressMap = new Map();
let grammarMap = new Map();
    
    const totalUsersEl = document.getElementById('totalUsers');
    const totalStudentsEl = document.getElementById('totalStudents');
    const totalAdminsEl = document.getElementById('totalAdmins');
    const totalProgressUsersEl = document.getElementById('totalProgressUsers');
    const assignmentClassEl = document.getElementById('assignmentClass');

    const createAssignmentBtn = document.getElementById('createAssignmentBtn');
const assignmentCreateStatusEl = document.getElementById('assignmentCreateStatus');

const assignmentTitleEl = document.getElementById('assignmentTitle');
const assignmentCategoryEl = document.getElementById('assignmentCategory');
const assignmentGradeEl = document.getElementById('assignmentGrade');
const assignmentPublisherEl = document.getElementById('assignmentPublisher');
const assignmentUnitEl = document.getElementById('assignmentUnit');
const assignmentStartIndexEl = document.getElementById('assignmentStartIndex');
const assignmentEndIndexEl = document.getElementById('assignmentEndIndex');
const assignmentDueDateEl = document.getElementById('assignmentDueDate');

    document.getElementById('refreshBtn').addEventListener('click', loadAdminPage);
    document.getElementById('homeBtn').addEventListener('click', () => {
      location.href = 'index.html';
    });
    document.getElementById('grammarBtn').addEventListener('click', () => {
  location.href = 'grammar.html';
});
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      location.href = 'login.html';
    });

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString('ko-KR');
    }

    function renderClassFilters(profiles) {
  const classNames = [...new Set(
    (profiles || [])
      .map(p => (p.class_name || '').trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'ko'));

  classFilterWrap.innerHTML = '';

  if (assignmentClassEl) {
    assignmentClassEl.innerHTML = '<option value="">반 선택</option>';
    for (const className of classNames) {
      const option = document.createElement('option');
      option.value = className;
      option.textContent = className;
      assignmentClassEl.appendChild(option);
    }
  }

  const allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.textContent = '전체';
  allBtn.style.border = 'none';
  allBtn.style.borderRadius = '999px';
  allBtn.style.padding = '8px 12px';
  allBtn.style.fontSize = '13px';
  allBtn.style.fontWeight = 'bold';
  allBtn.style.cursor = 'pointer';
  allBtn.style.background = selectedClassName === '전체' ? '#4f8cff' : '#e5e7eb';
  allBtn.style.color = selectedClassName === '전체' ? 'white' : '#333';
  allBtn.onclick = () => {
    selectedClassName = '전체';
    renderTable();
    renderClassFilters(allProfiles);
  };
  classFilterWrap.appendChild(allBtn);

  for (const className of classNames) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = className;
    btn.style.border = 'none';
    btn.style.borderRadius = '999px';
    btn.style.padding = '8px 12px';
    btn.style.fontSize = '13px';
    btn.style.fontWeight = 'bold';
    btn.style.cursor = 'pointer';
    btn.style.background = selectedClassName === className ? '#4caf50' : '#e5e7eb';
    btn.style.color = selectedClassName === className ? 'white' : '#333';
    btn.onclick = () => {
      selectedClassName = className;
      renderTable();
      renderClassFilters(allProfiles);
    };
    classFilterWrap.appendChild(btn);
  }
}

    function renderTable() {
  const filteredProfiles = (allProfiles || []).filter(profile => {
    if (selectedClassName === '전체') return true;
    return (profile.class_name || '') === selectedClassName;
  });


      

  if (!filteredProfiles.length) {
    tbody.innerHTML = '<tr><td colspan="9">해당 반의 학생이 없습니다.</td></tr>';
    statusEl.textContent =
      selectedClassName === '전체'
        ? '표시할 사용자 데이터가 없습니다.'
        : `${selectedClassName} 반 학생이 없습니다.`;
    return;
  }

  const rowsHtml = filteredProfiles.map(profile => {
    const progress = allProgressMap.get(profile.user_id);
    const maxIndex = progress?.max_index ?? null;
    const progressInfo = calcProgress(maxIndex);

    const grammar = grammarMap.get(profile.user_id);
const grammarCount = grammar?.completed_topic_count ?? 0;

    return `
      <tr>
        <td>${escapeHtml(profile.name || '-')}</td>
        <td class="progress-box">
  <div>${escapeHtml(progressInfo.text)}</div>
  <div class="progress-bar">
    <div class="progress-fill" style="width:${progressInfo.percent}%"></div>
  </div>
</td>

<td>${grammarCount}개</td>
            <div class="progress-fill" style="width:${progressInfo.percent}%"></div>
          </div>
        </td>
        <td>${escapeHtml(formatDate(progress?.last_studied_at))}</td>
        <td>${escapeHtml(profile.email || '-')}</td>
        <td>${getRoleBadge(profile.role)}</td>
        <td>${escapeHtml(profile.class_name || '-')}</td>

<td>
  <input 
    type="text" 
    value="${escapeHtml(profile.class_name || '')}" 
    id="class-${profile.user_id}"
    style="width:90px; padding:4px; font-size:12px;"
  />
  <button 
    class="save-class-btn"
    data-user-id="${profile.user_id}"
    style="margin-top:4px; font-size:11px; padding:4px 6px; cursor:pointer;"
  >
    저장
  </button>
</td>

<td style="font-size:12px;">${escapeHtml(profile.user_id || '-')}</td>
        <td>${maxIndex ?? '<span class="muted">없음</span>'}</td>
        <td>${escapeHtml(formatDate(profile.created_at))}</td>
      </tr>
    `;
  }).join('');

  tbody.innerHTML = rowsHtml;

tbody.querySelectorAll('.save-class-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const userId = btn.dataset.userId;
    updateClassName(userId);
  });
});

const shownCount = filteredProfiles.length;
statusEl.textContent =
  selectedClassName === '전체'
    ? `총 ${allProfiles.length}명의 사용자 데이터를 불러왔습니다.`
    : `${selectedClassName} 반 학생 ${shownCount}명을 표시하고 있습니다.`;
}

    async function updateClassName(userId) {
  const input = document.getElementById(`class-${userId}`);
  if (!input) return;

  const newClassName = input.value.trim();

  const { error } = await supabase
    .from('profiles')
    .update({
      class_name: newClassName || null
    })
    .eq('user_id', userId);

  if (error) {
  console.error('반 수정 실패:', error);
  alert('반 수정 실패: ' + error.message);
  return;
}

  const target = allProfiles.find(p => p.user_id === userId);
  if (target) {
    target.class_name = newClassName || null;
  }

  renderClassFilters(allProfiles);
  renderTable();
  alert('반이 저장되었습니다.');
}

    function setAssignmentStatus(text, isError = false) {
  assignmentCreateStatusEl.textContent = text;
  assignmentCreateStatusEl.style.color = isError ? '#ef4444' : '#16a34a';
}

function resetAssignmentForm() {
  assignmentClassEl.value = '';
  assignmentTitleEl.value = '';
  assignmentCategoryEl.value = 'listening';
  assignmentGradeEl.value = '';
  assignmentPublisherEl.value = '';
  assignmentUnitEl.value = '';
  assignmentStartIndexEl.value = '';
  assignmentEndIndexEl.value = '';
  assignmentDueDateEl.value = '';
}

async function createAssignment() {
  const adminUser = await requireAdmin();
  if (!adminUser) return;

  const className = assignmentClassEl.value.trim();
  const title = assignmentTitleEl.value.trim();
  const category = assignmentCategoryEl.value;
  const grade = assignmentGradeEl.value;
  const publisher = assignmentPublisherEl.value;
  const unit = assignmentUnitEl.value.trim();
  const startIndex = Number(assignmentStartIndexEl.value);
  const endIndex = Number(assignmentEndIndexEl.value);
  const dueDate = assignmentDueDateEl.value;

  if (!className) {
    setAssignmentStatus('반을 선택하세요.', true);
    return;
  }

  if (!title) {
    setAssignmentStatus('숙제 제목을 입력하세요.', true);
    return;
  }

  if (!grade) {
    setAssignmentStatus('학년을 선택하세요.', true);
    return;
  }

  if (!publisher) {
    setAssignmentStatus('출판사를 선택하세요.', true);
    return;
  }

  if (!unit) {
    setAssignmentStatus('단원명을 입력하세요.', true);
    return;
  }

  if (!Number.isFinite(startIndex) || !Number.isFinite(endIndex)) {
    setAssignmentStatus('시작 번호와 끝 번호를 입력하세요.', true);
    return;
  }

  if (startIndex <= 0 || endIndex <= 0) {
    setAssignmentStatus('번호는 1 이상이어야 합니다.', true);
    return;
  }

  if (startIndex > endIndex) {
    setAssignmentStatus('시작 번호는 끝 번호보다 클 수 없습니다.', true);
    return;
  }

  if (!dueDate) {
    setAssignmentStatus('마감일을 선택하세요.', true);
    return;
  }

  createAssignmentBtn.disabled = true;
  createAssignmentBtn.textContent = '생성 중...';
  setAssignmentStatus('');

  const payload = {
    class_name: className,
    title,
    category,
    grade,
    publisher,
    unit,
    start_index: startIndex,
    end_index: endIndex,
    due_date: dueDate,
    created_by: adminUser.id
  };

  const { error } = await supabase
    .from('assignments')
    .insert(payload);

  if (error) {
    console.error('숙제 생성 실패:', error);
    setAssignmentStatus('숙제 생성 실패: ' + error.message, true);
    createAssignmentBtn.disabled = false;
    createAssignmentBtn.textContent = '숙제 생성';
    return;
  }

  setAssignmentStatus('숙제가 생성되었습니다.');
  resetAssignmentForm();

  createAssignmentBtn.disabled = false;
  createAssignmentBtn.textContent = '숙제 생성';
}

    function getRoleBadge(role) {
      if (role === 'admin') {
        return '<span class="badge badge-admin">admin</span>';
      }
      return '<span class="badge badge-student">student</span>';
    }

    function calcProgress(maxIndex) {
      const safe = Number(maxIndex);
      if (!Number.isFinite(safe) || safe < 0) {
        return { percent: 0, text: '0 / 177' };
      }

      const completed = Math.min(safe, TOTAL_SENTENCES);
      const percent = Math.min((completed / TOTAL_SENTENCES) * 100, 100);

      return {
        percent,
        text: `${completed} / ${TOTAL_SENTENCES}`
      };
    }

    async function requireAdmin() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData.user) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return null;
      }

      const user = authData.user;

      const { data: me, error: meError } = await supabase
        .from('profiles')
        .select('user_id, email, name, role')
        .eq('user_id', user.id)
        .single();

      if (meError) {
        alert('내 프로필을 확인할 수 없습니다: ' + meError.message);
        location.href = 'index.html';
        return null;
      }

      if (!me || me.role !== 'admin') {
        alert('관리자만 접근할 수 있습니다.');
        location.href = 'index.html';
        return null;
      }

      return user;
    }

    async function loadAdminPage() {
      statusEl.textContent = '불러오는 중...';
      tbody.innerHTML = '<tr><td colspan="8">데이터를 불러오는 중입니다...</td></tr>';

      const user = await requireAdmin();
      if (!user) return;

      const { data: profiles, error: profilesError } = await supabase
  .from('profiles')
  .select('id, user_id, email, name, role, class_name, created_at, last_login_at')
  .order('last_login_at', { ascending: false, nullsFirst: false });

      if (profilesError) {
        console.error(profilesError);
        statusEl.textContent = 'profiles 조회 실패';
        tbody.innerHTML = `<tr><td colspan="8">profiles 조회 실패: ${escapeHtml(profilesError.message)}</td></tr>`;
        return;
      }

      const { data: progressRows, error: progressError } = await supabase
  .from('listening_progress')
  .select('id, user_id, max_index, created_at, last_studied_at')
  .order('last_studied_at', { ascending: false, nullsFirst: false });

      const { data: grammarRows, error: grammarError } = await supabase
  .from('grammar_progress')
  .select('user_id, completed_topic_count, last_studied_at')
  .order('last_studied_at', { ascending: false, nullsFirst: false });

      if (progressError) {
        console.error(progressError);
        statusEl.textContent = 'listening_progress 조회 실패';
        tbody.innerHTML = `<tr><td colspan="8">progress 조회 실패: ${escapeHtml(progressError.message)}</td></tr>`;
        return;
      }

      if (grammarError) {
  console.error(grammarError);
  statusEl.textContent = 'grammar_progress 조회 실패';
  tbody.innerHTML = `<tr><td colspan="8">grammar_progress 조회 실패: ${escapeHtml(grammarError.message)}</td></tr>`;
  return;
}

      allProgressMap = new Map();
for (const row of progressRows || []) {
  if (!allProgressMap.has(row.user_id)) {
    allProgressMap.set(row.user_id, row);
  }
}

      grammarMap = new Map();
for (const row of grammarRows || []) {
  grammarMap.set(row.user_id, row);
}

      allProfiles = profiles || [];
renderClassFilters(allProfiles);

const totalUsers = (profiles || []).length;
const totalStudents = (profiles || []).filter(x => x.role === 'student').length;
