<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 계정 생성</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f7fbff 50%, #edf7f2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      padding: 36px 28px 28px;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f8cff, #6fcf97);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 28px;
      color: #1f2937;
    }

    .subtitle {
      margin: 10px 0 26px;
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    .input,
    .select {
      width: 100%;
      height: 50px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .input:focus,
    .select:focus {
      border-color: #4f8cff;
      box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.12);
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f8cff, #3b82f6);
    }

    .btn-secondary {
      margin-top: 10px;
      background: #607d8b;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #ef4444;
      line-height: 1.4;
    }

    .footer-text {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }

    .info-box {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px 22px;
        border-radius: 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">+</div>
    <h1>학생 계정 생성</h1>
    <div class="subtitle">
      선생님 또는 관리자만 사용할 수 있는 계정 생성 페이지입니다.
    </div>

    <div class="info-box">
      학생에게 배부할 이메일/비밀번호를 직접 생성합니다.<br />
      생성 후 자동으로 <b>profiles</b> 테이블에도 저장됩니다.
    </div>

    <div class="field">
      <label class="label" for="name">이름</label>
      <input class="input" type="text" id="name" placeholder="학생 이름 입력" />
    </div>

    <div class="field">
      <label class="label" for="email">이메일</label>
      <input class="input" type="email" id="email" placeholder="student01@email.com" />
    </div>

    <div class="field">
      <label class="label" for="password">비밀번호</label>
      <input class="input" type="password" id="password" placeholder="비밀번호 입력" />
    </div>

    <div class="field">
      <label class="label" for="className">반 이름</label>
      <input class="input" type="text" id="className" placeholder="예: 중1A반 / 고1영어반" />
    </div>

    <div class="field">
      <label class="label" for="role">권한</label>
      <select class="select" id="role">
        <option value="student" selected>student</option>
        <option value="admin">admin</option>
      </select>
    </div>

    <button id="createBtn" class="btn btn-primary" type="button">계정 생성</button>
    <button id="goLoginBtn" class="btn btn-secondary" type="button">로그인 페이지로 이동</button>

    <div id="message" class="message"></div>

    <div class="footer-text">
      Teacher Only Account Creation
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'https://uuzhdxangctewuklvmlv.supabase.co',
      'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
    );

    const createBtn = document.getElementById('createBtn');
    const goLoginBtn = document.getElementById('goLoginBtn');
    const messageEl = document.getElementById('message');

    function setMessage(text, isError = true) {
      messageEl.textContent = text;
      messageEl.style.color = isError ? '#ef4444' : '#16a34a';
    }

    async function requireAdmin() {
      const { data: authData, error: authError } = await supabase.auth.getUser();

      if (authError || !authData.user) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return null;
      }

      const { data: me, error: meError } = await supabase
        .from('profiles')
        .select('user_id, role')
        .eq('user_id', authData.user.id)
        .single();

      if (meError || !me) {
        alert('관리자 권한 확인 실패');
        location.href = 'login.html';
        return null;
      }

      if (me.role !== 'admin') {
        alert('관리자만 접근할 수 있습니다.');
        location.href = 'index.html';
        return null;
      }

      return authData.user;
    }

    async function createAccount() {
      const adminUser = await requireAdmin();
      if (!adminUser) return;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const className = document.getElementById('className').value.trim();
      const role = document.getElementById('role').value;

      if (!name || !email || !password) {
        setMessage('이름, 이메일, 비밀번호를 입력하세요.');
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = '생성 중...';
      setMessage('');

      const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
        email,
        password
      });

      if (signUpError) {
        setMessage('계정 생성 실패: ' + signUpError.message);
        createBtn.disabled = false;
        createBtn.textContent = '계정 생성';
        return;
      }

      const newUser = signUpData.user;

      if (!newUser) {
        setMessage('사용자 정보 생성에 실패했습니다.');
        createBtn.disabled = false;
        createBtn.textContent = '계정 생성';
        return;
      }

      const { error: profileError } = await supabase
        .from('profiles')
        .upsert(
          {
            user_id: newUser.id,
            email,
            name,
            role,
            class_name: className || null
          },
          {
            onConflict: 'user_id'
          }
        );

      if (profileError) {
        setMessage('profiles 저장 실패: ' + profileError.message);
        createBtn.disabled = false;
        createBtn.textContent = '계정 생성';
        return;
      }

      setMessage('계정 생성 완료!', false);

      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';
      document.getElementById('className').value = '';
      document.getElementById('role').value = 'student';

      createBtn.disabled = false;
      createBtn.textContent = '계정 생성';
    }

    createBtn.addEventListener('click', createAccount);

    goLoginBtn.addEventListener('click', () => {
      location.href = 'login.html';
    });
  </script>
</body>
</html>
