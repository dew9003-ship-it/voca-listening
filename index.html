<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening Academy - 보카엔딩</title>
    
    <link rel="stylesheet" href="global.css">
    <style>
        /* 학습관 전용 레이아웃 */
        .stage-btn { aspect-ratio:1; font-size:18px; border-radius:18px; border:none; font-weight:800; cursor:pointer; transition:all .12s ease; }
        .stage-unlocked { background: linear-gradient(180deg,#5aa6ff 0%, #4f8cff 100%); color:white; border: 2px solid #3b82f6; }
        .stage-locked { background:#e5e7eb; color:#9ca3af; cursor: not-allowed; }
        
        .progress-pill { display:inline-flex; align-items:center; gap:8px; background:#eef4ff; color:#2f5da8; border-radius:999px; padding:8px 16px; font-size:14px; font-weight:700; margin-bottom: 10px; }
        .progress-bar-wrap { width:100%; height:12px; background:#e2e8f0; border-radius:999px; overflow:hidden; margin-bottom:20px; border: 1px solid #cbd5e1; }
        .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#4f8cff,#10b981); transition:width .3s ease; }

        .control-row { display:flex; gap:10px; margin-bottom:20px; }
        #playBtn { flex: 1.5; background: #f97316; color:#fff; padding:14px; font-size: 16px; border-radius: 14px; border:none; cursor:pointer; font-weight:800; }
        #speedControl { flex: 1; border:2px solid #cbd5e1; border-radius: 14px; padding: 0 10px; font-weight: 700; outline:none; }
        #checkBtn { flex: 1.5; background: #10b981; color:#fff; padding:14px; font-size: 16px; border-radius: 14px; border:none; cursor:pointer; font-weight:800; }

        .question-card { background:#fff; border:2px solid #e2e8f0; border-radius:24px; padding:25px; box-shadow: var(--shadow); }
        #stepLabel { display:inline-block; padding:6px 14px; border-radius:999px; background:#fff4e8; color:#f97316; font-size:13px; font-weight:800; margin-bottom:15px; }
        #meaningBox { padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; text-align:center; font-weight:700; font-size:17px; color:#1e293b; margin-bottom:15px; border-left: 5px solid #4f8cff; }

        .drop-zone { min-height:100px; border:2px dashed #cbd5e1; border-radius:18px; display:flex; flex-wrap:wrap; gap:8px; padding:15px; margin-bottom: 15px; background: #fdfdfd; }
        .word-bank { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
        .word-btn { padding:10px 15px; font-size:15px; border-radius:12px; background:#fff; border:2px solid #e2e8f0; font-weight:700; cursor:pointer; transition: 0.2s; }
        .word-btn:hover { border-color: #4f8cff; color: #4f8cff; transform:translateY(-2px); }

        .type-input { width:100%; min-height:80px; padding:15px; font-size:18px; border:2px solid #cbd5e1; border-radius:18px; outline:none; transition: 0.2s; resize:none; font-family: inherit; }
        .type-input:focus { border-color:#4f8cff; box-shadow:0 0 0 4px rgba(79, 140, 255, 0.1); }
        
        @media (max-width: 640px) {
            .grid-container { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div id="menuView">
            <div class="unit-grid" style="margin-bottom: 25px;">
                <div class="unit-card" style="min-height: 100px; cursor: default;">
                    <span class="badge">STATS</span>
                    <div class="unit-title" id="totalCountText">-</div>
                    <div class="meta">전체 문장 수</div>
                </div>
                <div class="unit-card" style="min-height: 100px; cursor: default;">
                    <span class="badge">PROGRESS</span>
                    <div class="unit-title" id="unlockedText">1</div>
                    <div class="meta">현재 해금 단계</div>
                </div>
            </div>

            <div class="panel" style="background:#fff; padding:25px; border-radius:24px; border:2px solid #e2e8f0;">
                <h2 style="margin-top:0;">듣기 목차</h2>
                <div id="stageGrid" class="grid-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap:12px;"></div>
                <button id="resetProgressBtn" style="margin-top:20px; width:100%; background:none; border:none; color:#ef4444; text-decoration:underline; cursor:pointer; font-size:13px;">학습 기록 초기화 (관리자 전용)</button>
            </div>
        </div>

        <div id="gameView" style="display:none;">
            <div class="quiz-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div class="progress-pill" id="progressText">1/-</div>
                <button class="btn-global btn-logout" id="backBtn" style="padding:8px 15px;">목차로</button>
            </div>
            <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
            <div class="control-row">
                <button id="playBtn">🔊 듣기</button>
                <select id="speedControl">
                    <option value="0.8">0.8x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.2">1.2x</option>
                </select>
                <button id="checkBtn">제출</button>
            </div>
            <div class="question-card">
                <div id="stepLabel">Step 1</div>
                <div id="meaningBox"></div>
                <div id="contentArea">
                    <div id="step1Area">
                        <div id="answerArea" class="drop-zone"></div>
                        <div id="wordBank" class="word-bank"></div>
                    </div>
                    <div id="step2Area" style="display:none;">
                        <textarea id="typeInput" class="type-input" placeholder="문장을 입력하세요..." spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // [수정] 외부 파일들로부터 필요한 기능 및 데이터를 임포트합니다.
        import { supabase, initHeader, showAlert, initSecurity } from './global.js';
        import { db } from './data-listening.js';

        const ADMIN_PASSWORD = '569020';
        let maxUnlockedIndex = 0;
        let currentIndex = 0;
        let currentStep = 1;
        let currentSentence = '';
        const audio = new Audio();

        const menuView = document.getElementById('menuView');
        const gameView = document.getElementById('gameView');
        const stageGrid = document.getElementById('stageGrid');
        const typeInput = document.getElementById('typeInput');

        async function init() {
            await initHeader('듣기 학습관');
            initSecurity(typeInput);

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { location.href = 'login.html'; return; }

            const { data } = await supabase.from('listening_progress').select('max_index').eq('user_id', user.id).maybeSingle();
            maxUnlockedIndex = data?.max_index || 0;
            renderMenu();
        }

        async function saveProgress(value) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;
            const newMax = Math.max(maxUnlockedIndex, value);
            const { error } = await supabase.from('listening_progress').upsert({ 
                user_id: user.id, max_index: newMax, last_studied_at: new Date().toISOString() 
            });
            if (error) showAlert('저장 실패', '진도 저장 중 오류가 발생했습니다.', true);
            else maxUnlockedIndex = newMax;
        }

        function renderMenu() {
            stageGrid.innerHTML = '';
            document.getElementById('totalCountText').innerText = db.length;
            document.getElementById('unlockedText').innerText = maxUnlockedIndex + 1;
            for (let i = 0; i < db.length; i++) {
                const btn = document.createElement('button');
                const isUnlocked = i <= maxUnlockedIndex;
                btn.className = 'stage-btn ' + (isUnlocked ? 'stage-unlocked' : 'stage-locked');
                btn.innerText = isUnlocked ? (i + 1) : '🔒';
                if (isUnlocked) btn.onclick = () => startGame(i, 1);
                stageGrid.appendChild(btn);
            }
        }

        function startGame(idx, step) {
            currentIndex = idx; currentStep = step;
            currentSentence = db[idx].en;
            menuView.style.display = 'none';
            gameView.style.display = 'block';
            document.getElementById('progressText').innerText = `${idx + 1} / ${db.length}`;
            document.getElementById('progressBar').style.width = `${((idx + 1) / db.length) * 100}%`;
            document.getElementById('stepLabel').innerText = `Step ${step}`;
            document.getElementById('meaningBox').innerText = db[idx].ko;
            
            const isTyping = (step === 2 || step === 4);
            document.getElementById('step1Area').style.display = isTyping ? 'none' : 'block';
            document.getElementById('step2Area').style.display = isTyping ? 'block' : 'none';
            
            if (!isTyping) renderWords();
            else { typeInput.value = ''; setTimeout(() => typeInput.focus(), 200); }

            audio.src = db[idx].audioUrl;
            if(step <= 2) playAudio();
        }

        function renderWords() {
            const answerArea = document.getElementById('answerArea');
            const wordBank = document.getElementById('wordBank');
            answerArea.innerHTML = ''; wordBank.innerHTML = '';
            const words = [...currentSentence.split(' ')].sort(() => Math.random() - 0.5);
            words.forEach(w => {
                const b = document.createElement('button');
                b.className = 'word-btn'; b.innerText = w;
                b.onclick = () => {
                    if (b.parentElement === wordBank) answerArea.appendChild(b);
                    else wordBank.appendChild(b);
                };
                wordBank.appendChild(b);
            });
        }

        async function checkAnswer() {
            let userAns = (currentStep === 1 || currentStep === 3) 
                ? Array.from(document.getElementById('answerArea').children).map(b => b.innerText).join(' ')
                : typeInput.value.trim();

            const clean = (s) => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
            
            if (clean(userAns) === clean(currentSentence)) {
                if (currentStep < 2) { // 2단계(받아쓰기)까지만 진행 (기존 로직 유지)
                    showAlert('정답입니다!', '다음 단계로 이동합니다.', false, () => startGame(currentIndex, currentStep + 1));
                } else {
                    await saveProgress(currentIndex + 1);
                    showAlert('완벽합니다!', '다음 문장으로 넘어갑니다.', false, () => {
                        if (currentIndex + 1 < db.length) startGame(currentIndex + 1, 1);
                        else location.reload();
                    });
                }
            } else {
                showAlert('오답입니다', '다시 한 번 확인해 보세요!', true);
            }
        }

        function playAudio() {
            audio.playbackRate = parseFloat(document.getElementById('speedControl').value);
            audio.play().catch(e => console.log("재생 오류:", e));
        }

        document.getElementById('playBtn').onclick = playAudio;
        document.getElementById('checkBtn').onclick = checkAnswer;
        document.getElementById('backBtn').onclick = () => location.reload();
        
        document.getElementById('resetProgressBtn').onclick = () => {
            const pw = prompt('관리자 비밀번호를 입력하세요.');
            if (pw === ADMIN_PASSWORD) {
                showAlert('경고', '학습 기록을 초기화하시겠습니까?', true, async () => {
                    const { data: { user } } = await supabase.auth.getUser();
                    await supabase.from('listening_progress').upsert({ user_id: user.id, max_index: 0 });
                    location.reload();
                });
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && gameView.style.display === 'block') {
                const modal = document.getElementById('globalModal');
                if (!modal || modal.style.display === 'none') checkAnswer();
            }
        });

        init();
    </script>
</body>
</html>
