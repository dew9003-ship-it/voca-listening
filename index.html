<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening Academy</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root{
            --bg:#f4f7fb;
            --card:#ffffff;
            --line:#e5e7eb;
            --text:#1f2937;
            --muted:#6b7280;
            --blue:#4f8cff;
            --green:#4caf50;
            --orange:#ff9800;
            --slate:#607d8b;
            --shadow:0 10px 30px rgba(15, 23, 42, 0.08);
        }

        html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%);
    color: var(--text);
    user-select: none;
    overflow-y: auto;   /* ✅ 스크롤 허용 */
    overflow-x: hidden; /* 가로 스크롤만 막기 */
}

        body{
            display:flex;
            flex-direction:column;
        }

        .wrap{
            width:100%;
            max-width:1100px;
            margin:0 auto;
            padding:20px;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            min-height:0;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }

        .title-box h1{
            margin:0;
            font-size:30px;
            font-weight:800;
            letter-spacing:-0.02em;
        }

        .title-box p{
            margin:8px 0 0;
            color:var(--muted);
            font-size:14px;
            line-height:1.5;
        }

        .btns{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
        }

        button, select, .btn{
            border:none;
            border-radius:14px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
        }

        button:hover, .btn:hover{
            opacity:.96;
            box-shadow:0 8px 18px rgba(0,0,0,.08);
        }

        button:active, .btn:active{
            transform:translateY(1px);
        }

        .btn-blue{ background:var(--blue); color:#fff; padding:11px 16px; }
        .btn-green{ background:var(--green); color:#fff; padding:11px 16px; }
        .btn-orange{ background:var(--orange); color:#fff; padding:11px 16px; }
        .btn-slate{ background:var(--slate); color:#fff; padding:11px 16px; }
        .btn-light{
            background:#fff;
            color:#334155;
            border:1px solid var(--line);
            padding:11px 16px;
        }

        .summary-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(190px,1fr));
            gap:12px;
            margin-bottom:18px;
        }

        .summary-card, .panel{
            background:var(--card);
            border-radius:24px;
            box-shadow:var(--shadow);
        }

        .summary-card{ padding:18px; }
        .summary-card .label{
            color:var(--muted);
            font-size:13px;
            margin-bottom:8px;
        }
        .summary-card .value{
            font-size:28px;
            font-weight:800;
        }

        .panel{
            padding:18px;
            margin-bottom:18px;
            min-height:0;
        }

        .panel-head{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
            flex-wrap:wrap;
        }

        .panel-head h2{
            margin:0;
            font-size:20px;
        }

        .panel-head p{
            margin:6px 0 0;
            color:var(--muted);
            font-size:13px;
            line-height:1.5;
        }

        #menuView{
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:0;
            overflow-y:auto;
        }

        .grid-container{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
            gap:12px;
        }

        .stage-btn{
            aspect-ratio:1;
            font-size:18px;
            border-radius:18px;
            border:none;
            font-weight:800;
            cursor:pointer;
            transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
        }

        .stage-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 14px 28px rgba(15,23,42,.08);
        }

        .stage-unlocked{
            background:linear-gradient(180deg,#5aa6ff 0%, #4f8cff 100%);
            color:white;
        }

        .stage-locked{
            background:#e5e7eb;
            color:#9ca3af;
        }

        .reset-btn{
            margin-top:12px;
            width:100%;
            padding:10px;
            font-size:12px;
            color:#ef4444;
            background:none;
            border:none;
            text-decoration:underline;
            cursor:pointer;
        }

        .guide-box{
            margin-top:12px;
            padding:14px;
            background:#fff;
            border-radius:18px;
            font-size:13px;
            color:#555;
            line-height:1.6;
            border:1px solid var(--line);
        }

        #gameView{
    display:none;
    flex-direction:column;
    min-height:0;
    flex:1;
    overflow-y:auto; /* ✅ 게임 화면도 스크롤 가능 */
}

        .quiz-head{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:14px;
        }

        .progress-pill{
            display:inline-flex;
            align-items:center;
            gap:8px;
            background:#eef4ff;
            color:#2f5da8;
            border-radius:999px;
            padding:8px 12px;
            font-size:13px;
            font-weight:700;
        }

        .progress-bar-wrap{
            width:100%;
            height:10px;
            background:#e5e7eb;
            border-radius:999px;
            overflow:hidden;
            margin-bottom:18px;
        }

        .progress-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#4f8cff,#6fcf97);
            transition:width .2s ease;
        }

        .control-row{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:14px;
        }

        #playBtn{
            min-width:140px;
            background:var(--orange);
            color:#fff;
            padding:13px 18px;
        }

        #speedControl{
            min-width:110px;
            padding:0 12px;
            height:46px;
            border:1px solid var(--line);
            background:#fff;
            color:var(--text);
            outline:none;
        }

        #checkBtn{
            min-width:140px;
            background:var(--green);
            color:#fff;
            padding:13px 18px;
            margin-left:auto;
        }

        .question-card{
            background:linear-gradient(180deg,#fff 0%,#fafcff 100%);
            border:1px solid var(--line);
            border-radius:22px;
            padding:22px;
            margin-bottom:16px;
            min-height:0;
        }

        #stepLabel{
            display:inline-block;
            padding:7px 12px;
            border-radius:999px;
            background:#fff4e8;
            color:#f97316;
            font-size:12px;
            font-weight:800;
            margin-bottom:14px;
        }

        #meaningBox{
            padding:14px 16px;
            background:#eef6ff;
            border:1px solid #cfe1ff;
            border-radius:16px;
            text-align:center;
            font-weight:700;
            font-size:15px;
            color:#1565c0;
            display:none;
            line-height:1.5;
            margin-bottom:14px;
        }

        #contentArea{
            display:flex;
            flex-direction:column;
            min-height:0;
        }

        #step1Area{
            display:flex;
            flex-direction:column;
            gap:12px;
            min-height:0;
        }

        .drop-zone{
            min-height:120px;
            border:2px dashed #93c5fd;
            border-radius:18px;
            background:#fff;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            padding:14px;
            align-content:flex-start;
            justify-content:center;
        }

        .word-bank{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            justify-content:center;
            align-content:flex-start;
            padding-top:4px;
        }

        .word-btn{
            padding:10px 14px;
            font-size:14px;
            border-radius:12px;
            background:#4f8cff;
            color:white;
            border:none;
            font-weight:800;
            box-shadow:0 4px 10px rgba(79,140,255,.25);
            cursor:pointer;
        }

        #step2Area{
            display:none;
            padding-top:4px;
        }

        .type-input{
            width:100%;
            min-height:64px;
            padding:14px 16px;
            font-size:18px;
            border:2px solid #bfdbfe;
            border-radius:18px;
            outline:none;
            background:#fff;
            color:var(--text);

            
        }

        .type-input:focus{
            border-color:#4f8cff;
            box-shadow:0 0 0 4px rgba(79,140,255,.12);
        }

        #modalOverlay{
            position:fixed;
            inset:0;
            background:rgba(15,23,42,.56);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:2000;
            padding:20px;
        }

        .modal-content{
            background:#fff;
            border-radius:24px;
            padding:24px;
            width:min(92vw, 360px);
            text-align:center;
            box-shadow:0 24px 60px rgba(15,23,42,.18);
        }

        .m-btn{
            width:100%;
            padding:15px;
            margin-top:10px;
            border-radius:14px;
            border:none;
            font-weight:800;
            font-size:16px;
            cursor:pointer;
        }

        @media (max-width:640px){
            .wrap{ padding:12px; }
            .title-box h1{ font-size:25px; }
            .summary-card .value{ font-size:24px; }
            .panel{ padding:14px; }
            .question-card{ padding:14px; }
            .grid-container{ grid-template-columns:repeat(4, minmax(0, 1fr)); }
            .quiz-head{ margin-bottom:10px; }
            .progress-bar-wrap{ margin-bottom:12px; }
            .control-row{
                display:grid;
                grid-template-columns:1.15fr .85fr 1fr;
                gap:8px;
                margin-bottom:10px;
            }
            #playBtn, #speedControl, #checkBtn{
                width:100%;
                min-width:0;
                margin-left:0;
                height:40px;
                padding:0 10px;
                font-size:13px;
                border-radius:12px;
            }
            #progressText{
                padding:6px 10px;
                font-size:12px;
            }
            #stepLabel{
                margin-bottom:10px;
                padding:6px 10px;
                font-size:11px;
            }
            #meaningBox{
                margin-bottom:10px;
                padding:12px;
                font-size:14px;
            }
            .drop-zone{
                min-height:90px;
                padding:10px;
                gap:8px;
            }
            .word-bank{
                gap:8px;
                padding-top:0;
            }
            .word-btn{
                padding:8px 10px;
                font-size:13px;
                border-radius:10px;
            }
            .type-input{
                min-height:56px;
                padding:12px 14px;
                font-size:16px;
                border-radius:14px;
            }
        }
    </style>

</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="title-box">
                <h1>듣기 학습관</h1>
                 
            </div>
            <div class="btns">
                <button id="homeBtn" class="btn-light" type="button">학습 홈</button>
                <button id="logoutBtn" class="btn-slate" type="button">로그아웃</button>
            </div>
        </div>

        <div id="menuView">
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="label">전체 문장 수</div>
                    <div class="value" id="totalCountText">-</div>
                </div>
                <div class="summary-card">
                    <div class="label">현재 해금 위치</div>
                    <div class="value" id="unlockedText">1</div>
                </div>
                <div class="summary-card">
                    <div class="label">현재 모드</div>
                    <div class="value" style="font-size:22px;">Listening</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <div>
                        <h2>듣기 목차</h2>
                        <p>원하는 번호를 눌러 바로 시작하세요. 잠긴 단계는 회색으로 표시됩니다.</p>
                    </div>
                </div>

                <div id="stageGrid" class="grid-container"></div>
                <button id="resetProgressBtn" class="reset-btn" type="button">학습 기록 초기화 (관리자 전용)</button>

                
            </div>
        </div>

        <div id="gameView">
            <div class="panel" style="display:flex; flex-direction:column; min-height:0; flex:1;">
                <div class="quiz-head">
                    <div>
                        <div class="progress-pill" id="progressText">1/-</div>
                         
                    </div>
                    <div class="btns">
                        <button class="btn-light" id="backBtn" type="button">목차</button>
                    </div>
                </div>

                <div class="progress-bar-wrap">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div class="control-row">
                    <button id="playBtn" class="btn" type="button">🔊 듣기</button>

                    <select id="speedControl" aria-label="재생 속도">
                        <option value="0.8">0.8x</option>
                        <option value="1.0" selected>1.0x</option>
                        <option value="1.2">1.2x</option>
                    </select>

                    <button id="checkBtn" class="btn" type="button">제출</button>
                </div>

                <div class="question-card">
                    <div id="stepLabel">Step 1</div>
                    <div id="meaningBox">한글 뜻 표시 영역</div>

                    <div id="contentArea">
                        <div id="step1Area">
                            <div id="answerArea" class="drop-zone"></div>
                            <div id="wordBank" class="word-bank"></div>
                        </div>

                        <div id="step2Area">
                            <input
                                type="text"
                                id="typeInput"
                                class="type-input"
                                placeholder="문장을 입력하세요..."
                                autocomplete="off"
                                autocorrect="off"
                                autocapitalize="off"
                                spellcheck="false"
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay">
        <div class="modal-content">
            <h3 id="mTitle" style="margin:0 0 10px 0;">결과</h3>
            <p id="mMsg" style="margin:0 0 20px 0; line-height:1.5;"></p>
            <button class="m-btn" id="mYes" style="background:#4caf50; color:white;" type="button">확인 (Enter)</button>
            <button class="m-btn" id="mNo" style="background:#eee; color:#333;" type="button">목록으로</button>
        </div>
    </div>

    <script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://uuzhdxangctewuklvmlv.supabase.co',
  'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
);

let me = null;
let role = 'student';

async function requireAuth() {
    const { data, error } = await supabase.auth.getUser();
    if (error || !data.user) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return null;
    }

    me = data.user;

    const { data: profileData } = await supabase
        .from('profiles')
        .select('user_id, name, role')
        .eq('user_id', me.id)
        .maybeSingle();

    if (profileData?.role) {
        role = profileData.role;
    }

    return data.user;
}

        const db = [
  // 1-53번 (기존과 동일하므로 대본 확인 완료)
  { "en": "Emily, what are you doing this weekend?", "ko": "Emily, 이번 주말에 무엇을 할 거니?", "audioUrl": "audio/1.mp3" },
  { "en": "I’m going out for dinner to celebrate my friend Jenny’s birthday.", "ko": "내 친구 Jenny의 생일을 축하하기 위해 저녁을 먹으러 나갈 거야.", "audioUrl": "audio/2.mp3" },
  { "en": "Sounds fun. Did you get something for her?", "ko": "재미있게 들린다. 그녀에게 줄 것을 뭔가 샀니?", "audioUrl": "audio/3.mp3" },
  { "en": "Mr. Lee, do you have time to talk about our winter team-building workshop?", "ko": "Mr. Lee, 우리의 동계 팀웍 다지기 워크숍에 대해 이야기할 시간이 있습니까?", "audioUrl": "audio/4.mp3" },
  { "en": "Sure. Actually, I was wondering if you had found any good locations yet.", "ko": "물론이죠. 사실 저는 당신이 어떤 좋은 장소를 벌써 찾았는지 궁금해 하고 있었어요.", "audioUrl": "audio/5.mp3" },
  { "en": "Yes, I have, and we have some options. Here, I picked up some brochures from the travel agency.", "ko": "네, 이미 찾았고 우리는 몇 개의 선택이 있어요. 내가 여행사에서 안내 책자 몇 권을 집어왔는데, 여기 있어요.", "audioUrl": "audio/6.mp3" },
  { "en": "May I have your attention please?", "ko": "여러분, 주목해 주세요.", "audioUrl": "audio/7.mp3" },
  { "en": "This is principal Wilson.", "ko": "저는 교장 Wilson입니다.", "audioUrl": "audio/8.mp3" },
  { "en": "As you know, this Friday is the last day of our month-long item donation event.", "ko": "아시다시피 이번 금요일은 우리의 한 달 동안의 물품 기부 행사의 마지막 날입니다.", "audioUrl": "audio/9.mp3" },
  { "en": "Thank you to those who have already participated.", "ko": "이미 참석한 사람들에게 감사드립니다.", "audioUrl": "audio/10.mp3" },
  { "en": "However, our involvement in the event has not met expectations yet, so we need to do more.", "ko": "그러나 그 행사에 대한 우리의 참여가 아직 기대에 미치지 못해서 우리는 더 많은 것을 할 필요가 있습니다.", "audioUrl": "audio/11.mp3" },
  { "en": "The items we are still looking for are children’s clothes, toys, school supplies, and books.", "ko": "우리가 아직도 찾고 있는 물품은 어린이옷, 장난감, 학용품 그리고 책입니다.", "audioUrl": "audio/12.mp3" },
  { "en": "If you have any of these items, please drop them off in the school cafeteria by Friday.", "ko": "이 물품들을 어느 것이라도 갖고 있으면 금요일까지 학교 식당으로 가져다 놓으세요.", "audioUrl": "audio/13.mp3" },
  { "en": "Any donation, even just a single pencil, will be a great help.", "ko": "어떤 기부도, 심지어 단 하나의 연필도 큰 도움이 될 것입니다.", "audioUrl": "audio/14.mp3" },
  { "en": "Don’t forget that your small actions can make a big difference.", "ko": "여러분의 작은 행동이 큰 영향을 미칠 수 있다는 것을 잊지 마세요.", "audioUrl": "audio/15.mp3" },
  { "en": "I really encourage you to participate in this event.", "ko": "여러분이 이 행사에 참여하기를 정말로 권장합니다.", "audioUrl": "audio/16.mp3" },
  { "en": "Thank you for listening.", "ko": "들어주어서 감사합니다.", "audioUrl": "audio/17.mp3" },
  { "en": "Brian, you look really tired.", "ko": "Brian, 너 정말로 피곤해 보인다.", "audioUrl": "audio/18.mp3" },
  { "en": "Yeah, I’ve been having difficulty sleeping recently.", "ko": "그래, 나는 요즘 잠을 자는데 애를 먹고 있어.", "audioUrl": "audio/19.mp3" },
  { "en": "Why? Is something troubling you?", "ko": "왜? 뭔가가 너를 괴롭히고 있니?", "audioUrl": "audio/20.mp3" },
  { "en": "Not really, but I don’t know how to get over this problem.", "ko": "그렇지는 않지만 이 문제를 어떻게 극복해야 할지 모르겠어.", "audioUrl": "audio/21.mp3" },
  { "en": "Well, keeping a regular sleep pattern can help.", "ko": "음, 규칙적인 수면 패턴을 지키는 것이 도움이 될 수 있어.", "audioUrl": "audio/22.mp3" },
  { "en": "I usually go to bed and wake up at the same time every day, but it doesn’t work.", "ko": "나는 보통 매일 똑같은 시간에 잠을 자고 잠에서 깨지만 그것이 효과가 없어.", "audioUrl": "audio/23.mp3" },
  { "en": "Hmm, do you do anything particular before bed?", "ko": "음, 잠자기 전에 특별한 것이라도 하니?", "audioUrl": "audio/24.mp3" },
  { "en": "Well, I use my phone to play games or text with friends for a little while.", "ko": "음, 나는 전화를 사용해서 잠깐 동안 게임을 하거나 친구와 문자 메시지를 주고받아.", "audioUrl": "audio/25.mp3" },
  { "en": "Oh, that’s not good. It’s important not to use media devices for at least an hour before sleep.", "ko": "아, 그것은 좋지 않아. 잠자기 전에 적어도 한 시간 동안 미디어 기기를 사용하지 않는 것이 중요해.", "audioUrl": "audio/26.mp3" },
  { "en": "Really? I thought it would help relieve my stress.", "ko": "정말? 나는 그것이 내 스트레스를 없애는데 도움이 될 거라고 생각했는데.", "audioUrl": "audio/27.mp3" },
  { "en": "It can overexcite your senses and cause trouble sleeping.", "ko": "그것이 네 감각을 너무 자극시키고 수면 장애를 일으킬 수 있어.", "audioUrl": "audio/28.mp3" },
  { "en": "I see.", "ko": "알겠어.", "audioUrl": "audio/29.mp3" },
  { "en": "One other tip for sound sleep is to drink some warm milk before bed.", "ko": "깊은 수면을 위한 다른 하나의 조언은 자기 전에 따뜻한 우유를 좀 마시는 거야.", "audioUrl": "audio/30.mp3" },
  { "en": "Okay, I’ll try those things and see if they work. Thanks.", "ko": "좋았어, 내가 그것들을 시도해보고 효과가 있는지 알아볼게. 고마워.", "audioUrl": "audio/31.mp3" },
  { "en": "Good evening, Ms. Jackson. Thank you for joining us.", "ko": "안녕하세요, Jackson 씨. 저희와 함께 해 주셔서 감사합니다.", "audioUrl": "audio/32.mp3" },
  { "en": "I’m happy to be here.", "ko": "함께 해서 저도 기쁩니다.", "audioUrl": "audio/33.mp3" },
  { "en": "Well, before the main part of the show, can you give the audience any simple tips for the kitchen?", "ko": "본격적인 프로그램에 들어가기 전에 시청자들에게 부엌을 위한 간단한 조언을 해주실 수 있나요?", "audioUrl": "audio/34.mp3" },
  { "en": "Sure. Sometimes we have to cook without enough time to go grocery shopping, like when we have unexpected guests, right?", "ko": "물론이죠. 가끔 우리는 예기치 않은 손님이 찾아 올 때와 같이, 장을 볼 충분한 시간이 없이 요리를 해야 하죠, 그렇죠?", "audioUrl": "audio/35.mp3" },
  { "en": "Yeah, that happens. As a professional, what would you do in such a case? Our audience may want to know.", "ko": "네. 그런 일이 생기지요. 전문가로서 그런 경우에 당신은 어떻게 합니까? 저희 시청자들이 알고 싶어 할 것 같아서요.", "audioUrl": "audio/36.mp3" },
  { "en": "Well, throwing a quick meal together is easy if you have some basic ingredients.", "ko": "여러분이 기본적인 재료를 가지고 있으면 음식을 빨리 차려 내는 것이 쉽지요.", "audioUrl": "audio/37.mp3" },
  { "en": "Please, tell us what those are.", "ko": "그것들이 무엇인지 저희에게 말씀해 주시겠어요.", "audioUrl": "audio/38.mp3" },
  { "en": "First, 300 to 400 grams of frozen pork or beef is useful.", "ko": "먼저, 300에서 400 그램의 냉동 돼지고기나 소고기가 있으면 유용하지요.", "audioUrl": "audio/39.mp3" },
  { "en": "I see. What else?", "ko": "알겠습니다. 다른 것은요?", "audioUrl": "audio/40.mp3" },
  { "en": "I also recommend potatoes and onions. With these ingredients, you can make so many different dishes.", "ko": "감자와 양파도 또한 추천해 드립니다. 이러한 재료들을 가지고, 여러분은 너무나 많은 다양한 요리를 만들 수 있습니다.", "audioUrl": "audio/41.mp3" },
  { "en": "Thanks for the tip. Now, let’s move on to your special recipe.", "ko": "조언을 해 주셔서 감사드립니다. 이제, 당신의 특별 요리법으로 넘어가 보지요.", "audioUrl": "audio/42.mp3" },
  { "en": "Honey, how’s the preparation going for Amy’s birthday party?", "ko": "여보, Amy의 생일 파티를 위한 준비는 어떻게 돼가고 있어요?", "audioUrl": "audio/43.mp3" },
  { "en": "Almost done. We just need to find some places to hide the candy for the kids’ treasure hunt.", "ko": "거의 다 됐어요. 아이들의 보물찾기를 위해 사탕을 숨길 장소를 찾기만 하면 돼요.", "audioUrl": "audio/44.mp3" },
  { "en": "Okay. Would the water fountain next to the steps be good?", "ko": "좋아요. 계단 옆에 있는 분수대가 좋지 않을까요?", "audioUrl": "audio/45.mp3" },
  { "en": "Hmm.... If we put the candy there, it would get wet. Let’s choose somewhere dry. How about the flower pot in front of the window?", "ko": "음.... 우리가 사탕을 거기에 두면, 젖어 버릴 거예요. 젖지 않는 다른 곳으로 선택해 봅시다. 창문 앞에 있는 화분은 어때요?", "audioUrl": "audio/46.mp3" },
  { "en": "Yeah, I think that’s good. We could also put some in the basket on the table.", "ko": "네, 좋은 것 같아요. 또 일부는 탁자 위에 있는 바구니에 놓아 둘 수도 있을 것 같아요.", "audioUrl": "audio/47.mp3" },
  { "en": "Great. Then, I’ll sit in the chair beside the table and pretend nothing’s there.", "ko": "훌륭해요. 그러면 나는 탁자 옆에 있는 의자에 앉아 있으면서 거기에 아무것도 없는 척 할게요.", "audioUrl": "audio/48.mp3" },
  { "en": "I like that idea. Now, let’s find one more place.", "ko": "그 아이디어가 마음에 들어요. 이제 한 장소만 더 찾아봅시다.", "audioUrl": "audio/49.mp3" },
  { "en": "All right. Umm, the bunny would be good.", "ko": "좋아요. 음, 토끼가 좋겠네요.", "audioUrl": "audio/50.mp3" },
  { "en": "You’re right.", "ko": "맞아요.", "audioUrl": "audio/51.mp3" },
  { "en": "We could put the rest of the candy inside the hat in the bunny’s hand.", "ko": "나머지 캔디는 토끼의 손에 있는 모자 안에 둘 수 있을 것 같아요.", "audioUrl": "audio/52.mp3" },
  { "en": "Perfect! I hope the kids have fun.", "ko": "완벽해요! 아이들이 즐거워했으면 좋겠어요.", "audioUrl": "audio/53.mp3" },

  // 54번부터 이미지 대본 바탕으로 새로 작성 (Election/Baseball/Cake/Hair/Essay/Park/Interview/Printer/Sandra/Thompson)
  { "en": "Eva, I've decided to run for student council president!", "ko": "Eva, 나 학생회장 선거에 나가기로 결심했어!", "audioUrl": "audio/54.mp3" },
  { "en": "Great, Matthew!", "ko": "멋지다, Matthew!", "audioUrl": "audio/55.mp3" },
  { "en": "Now I need to start working on some campaign promises.", "ko": "이제 선거 공약들을 준비하기 시작해야 해.", "audioUrl": "audio/56.mp3" },
  { "en": "You're right. You'll have to think about what the students want. By the way, did you hear Tony Johnson is running, too?", "ko": "맞아. 학생들이 무엇을 원하는지 생각해야 할 거야. 그런데, Tony Johnson도 출마한다는 소식 들었니?", "audioUrl": "audio/57.mp3" },
  { "en": "Yeah, I know. I don't think it'll be easy to win without a good campaign team.", "ko": "응, 알아. 좋은 선거 팀 없이는 이기기 쉽지 않을 것 같아.", "audioUrl": "audio/58.mp3" },
  { "en": "That's true. You'll need people to help you with posters, speeches, and everything else.", "ko": "맞아. 포스터, 연설, 그리고 그 밖의 모든 것들을 도와줄 사람들이 필요할 거야.", "audioUrl": "audio/59.mp3" },
  { "en": "Exactly. So I need an adviser like you for my campaign. Can you give me a hand?", "ko": "바로 그거야. 그래서 내 선거 운동에 너 같은 조언자가 필요해. 나 좀 도와줄 수 있니?", "audioUrl": "audio/60.mp3" },
  { "en": "Me? I'd love to help, but do you really think I'm qualified for that position?", "ko": "내가? 돕고 싶긴 하지만, 내가 그 자리에 자격이 있다고 정말 생각하니?", "audioUrl": "audio/61.mp3" },
  { "en": "Of course. You'll be a great help with the election.", "ko": "물론이지. 너는 선거에 큰 도움이 될 거야.", "audioUrl": "audio/62.mp3" },
  { "en": "Then, okay. I'll do my best.", "ko": "그럼 좋아. 최선을 다해볼게.", "audioUrl": "audio/63.mp3" },
  { "en": "Thanks.", "ko": "고마워.", "audioUrl": "audio/64.mp3" },
  { "en": "Hello?", "ko": "여보세요?", "audioUrl": "audio/65.mp3" },
  { "en": "Hey, Sarah. It's Alex. I have a question for you.", "ko": "안녕, Sarah. 나 Alex야. 질문이 하나 있어.", "audioUrl": "audio/66.mp3" },
  { "en": "Sure. What's up?", "ko": "물론이지. 무슨 일이야?", "audioUrl": "audio/67.mp3" },
  { "en": "Well, I've got two tickets to the National Baseball Championship next Friday, but unfortunately I can't go. Do you want them?", "ko": "저기, 다음 주 금요일 전국 야구 챔피언십 티켓이 두 장 있는데, 불행히도 내가 갈 수가 없어. 너 가질래?", "audioUrl": "audio/68.mp3" },
  { "en": "Yes, of course, but I thought the tickets were sold out.", "ko": "응, 당연하지, 하지만 티켓이 매진된 줄 알았는데.", "audioUrl": "audio/69.mp3" },
  { "en": "They are. But my company buys tickets to every game in advance, and I was able to get some.", "ko": "매진됐어. 하지만 우리 회사가 모든 경기 티켓을 미리 사두어서, 몇 장 구할 수 있었어.", "audioUrl": "audio/70.mp3" },
  { "en": "That's cool, but why can't you go?", "ko": "멋지다, 그런데 왜 못 가는 거야?", "audioUrl": "audio/71.mp3" },
  { "en": "I have to fly out of town for an important meeting with a client on that day, so I can't make it.", "ko": "그날 고객과 중요한 회의가 있어서 다른 도시로 비행기를 타고 가야 해서 갈 수가 없어.", "audioUrl": "audio/72.mp3" },
  { "en": "Maybe you can take your brother with you.", "ko": "네 남동생을 데려가면 되겠네.", "audioUrl": "audio/73.mp3" },
  { "en": "Yeah, he'd love to go. But I feel sorry that you can't go to the game because of work.", "ko": "응, 걔는 가는 걸 아주 좋아할 거야. 하지만 네가 일 때문에 경기에 못 가서 아쉽다.", "audioUrl": "audio/74.mp3" },
  { "en": "Don't worry about it. Enjoy the game.", "ko": "걱정 마. 경기 잘 즐겨.", "audioUrl": "audio/75.mp3" },
  { "en": "May I help you?", "ko": "도와드릴까요?", "audioUrl": "audio/76.mp3" },
  { "en": "That cheesecake looks delicious! How much is it?", "ko": "저 치즈케이크 정말 맛있어 보이네요! 얼마인가요?", "audioUrl": "audio/77.mp3" },
  { "en": "It's 30 dollars for the whole cake or 5 dollars per piece.", "ko": "케이크 한 판에 30달러이고 한 조각에 5달러입니다.", "audioUrl": "audio/78.mp3" },
  { "en": "Okay. I'll take two pieces.", "ko": "네. 두 조각 주세요.", "audioUrl": "audio/79.mp3" },
  { "en": "Would you like ice cream with your cake? It's two dollars per scoop.", "ko": "케이크와 함께 아이스크림도 드시겠어요? 한 스쿱에 2달러입니다.", "audioUrl": "audio/80.mp3" },
  { "en": "No, thanks.", "ko": "아니요, 괜찮습니다.", "audioUrl": "audio/81.mp3" },
  { "en": "All right. Would you like anything to drink?", "ko": "알겠습니다. 마실 것도 필요하신가요?", "audioUrl": "audio/82.mp3" },
  { "en": "Yes, I'll have two medium coffees.", "ko": "네, 중간 사이즈 커피 두 잔 주세요.", "audioUrl": "audio/83.mp3" },
  { "en": "A medium coffee is 3 dollars and a large one is 6 dollars. But since you're buying cake, each large coffee costs just 5 dollars.", "ko": "중간 사이즈는 3달러이고 큰 사이즈는 6달러입니다. 하지만 케이크를 사시니까 큰 사이즈 커피를 한 잔당 5달러에 드립니다.", "audioUrl": "audio/84.mp3" },
  { "en": "Great! Make them large then, please.", "ko": "좋네요! 그럼 큰 걸로 주세요.", "audioUrl": "audio/85.mp3" },
  { "en": "So, that's two pieces of cheesecake and two large coffees. Do you need anything else?", "ko": "치즈케이크 두 조각과 큰 커피 두 잔이네요. 더 필요한 게 있으신가요?", "audioUrl": "audio/86.mp3" },
  { "en": "No, but I have a discount coupon. Can I use it now?", "ko": "아니요, 그런데 할인 쿠폰이 있어요. 지금 쓸 수 있나요?", "audioUrl": "audio/87.mp3" },
  { "en": "Let me see. Sure. You get 10% off the total price.", "ko": "어디 보죠. 네. 총 금액에서 10% 할인을 받으십니다.", "audioUrl": "audio/88.mp3" },
  { "en": "Oh, great. Here's my credit card.", "ko": "오, 좋네요. 여기 제 신용카드요.", "audioUrl": "audio/89.mp3" },
  { "en": "Hey, Jennifer. There's something different about you today.", "ko": "안녕, Jennifer. 오늘 너 좀 달라 보인다.", "audioUrl": "audio/90.mp3" },
  { "en": "Yeah. I got my hair cut yesterday. How do I look?", "ko": "응. 어제 머리 잘랐어. 어때 보여?", "audioUrl": "audio/91.mp3" },
  { "en": "That style really suits you. What's the name of the hair salon? I need a haircut, too.", "ko": "그 스타일 너한테 정말 잘 어울린다. 그 미용실 이름이 뭐야? 나도 머리 잘라야 하거든.", "audioUrl": "audio/92.mp3" },
  { "en": "It's called \"Beautiful Hair, Wonderful Day.\"", "ko": "\"Beautiful Hair, Wonderful Day\"라는 곳이야.", "audioUrl": "audio/93.mp3" },
  { "en": "Hmm, I think I've seen it before. Can you tell me where it is?", "ko": "흠, 전에 본 적 있는 것 같아. 어디 있는지 말해줄 수 있니?", "audioUrl": "audio/94.mp3" },
  { "en": "Sure. It's located on Main Street, near the Central Shopping Mall.", "ko": "물론이지. 메인 스트리트에 있어, 센트럴 쇼핑몰 근처야.", "audioUrl": "audio/95.mp3" },
  { "en": "Oh yeah, now I remember where it is. Do you know how much a man's haircut costs there?", "ko": "아 맞아, 이제 어디인지 기억난다. 거기 남자 커트 비용이 얼마인지 아니?", "audioUrl": "audio/96.mp3" },
  { "en": "I think it's about 15 dollars, but you can check the price on the salon's website to make sure.", "ko": "15달러 정도인 것 같은데, 확실하게 미용실 웹사이트에서 가격을 확인해볼 수 있어.", "audioUrl": "audio/97.mp3" },
  { "en": "I'll check online later.", "ko": "나중에 온라인으로 확인해볼게.", "audioUrl": "audio/98.mp3" },
  { "en": "I can recommend a stylist if you want. She does a great job with men's hair.", "ko": "원한다면 헤어 디자이너를 추천해줄 수 있어. 남자 머리를 아주 잘하시거든.", "audioUrl": "audio/99.mp3" },
  { "en": "Okay. What's her name?", "ko": "좋아. 성함이 어떻게 되셔?", "audioUrl": "audio/100.mp3" },
  { "en": "Alice Moore. She's really good.", "ko": "Alice Moore야. 정말 실력이 좋으셔.", "audioUrl": "audio/101.mp3" },
  { "en": "Great. Thanks.", "ko": "좋다. 고마워.", "audioUrl": "audio/102.mp3" },
  { "en": "Good morning, everyone! This is Ms. Adams, your science teacher.", "ko": "여러분, 안녕하세요! 저는 여러분의 과학 선생님인 Ms. Adams입니다.", "audioUrl": "audio/103.mp3" },
  { "en": "I'm happy to announce the science essay contest sponsored by the ABC Science Institute.", "ko": "ABC 과학 연구소에서 후원하는 과학 에세이 대회를 발표하게 되어 기쁩니다.", "audioUrl": "audio/104.mp3" },
  { "en": "This contest is for high school students, so any of you can participate.", "ko": "이 대회는 고등학생들을 대상으로 하니, 여러분 누구나 참여할 수 있습니다.", "audioUrl": "audio/105.mp3" },
  { "en": "There're two essay topics to choose from.", "ko": "선택할 수 있는 두 가지 에세이 주제가 있습니다.", "audioUrl": "audio/106.mp3" },
  { "en": "The first is \"How to Save the Earth,\" and the second is \"The Most Creative Invention.\"", "ko": "첫 번째는 \"지구를 구하는 방법\"이고, 두 번째는 \"가장 창의적인 발명품\"입니다.", "audioUrl": "audio/107.mp3" },
  { "en": "The essay must be a minimum of 5 pages and a maximum of 10.", "ko": "에세이는 최소 5페이지, 최대 10페이지여야 합니다.", "audioUrl": "audio/108.mp3" },
  { "en": "Additionally, the deadline for submission is November 30th.", "ko": "또한, 제출 마감일은 11월 30일입니다.", "audioUrl": "audio/109.mp3" },
  { "en": "Only online submission of essays will be accepted.", "ko": "에세이는 온라인 제출만 가능합니다.", "audioUrl": "audio/110.mp3" },
  { "en": "Please, be sure to follow these guidelines exactly.", "ko": "이 가이드라인을 반드시 정확하게 따라주세요.", "audioUrl": "audio/111.mp3" },
  { "en": "Lastly, the first prize winner of all participants will be given an opportunity to visit the ABC Science Institute, the contest's sponsor.", "ko": "마지막으로, 모든 참가자 중 1등 수상자에게는 대회의 후원사인 ABC 과학 연구소를 방문할 기회가 주어집니다.", "audioUrl": "audio/112.mp3" },
  { "en": "The deadline is quickly approaching, so get out there and get writing. Good luck!", "ko": "마감이 빠르게 다가오고 있으니, 어서 가서 글을 쓰기 시작하세요. 행운을 빕니다!", "audioUrl": "audio/113.mp3" },
  { "en": "Honey. Here's a pamphlet for the attraction packages at Grandlife Amusement Park. Let's choose one of them.", "ko": "여보. 여기 Grandlife 놀이공원의 어트랙션 패키지 팜플렛이 있어요. 그중 하나를 골라봅시다.", "audioUrl": "audio/114.mp3" },
  { "en": "Okay. How much do you think we should spend?", "ko": "좋아요. 우리가 얼마 정도 써야 한다고 생각해요?", "audioUrl": "audio/115.mp3" },
  { "en": "Well, I don't want to spend more than 50 dollars per person.", "ko": "음, 인당 50달러 이상은 쓰고 싶지 않아요.", "audioUrl": "audio/116.mp3" },
  { "en": "All right. For the 3D movie, would you rather watch Amazing Sea or Jungle Safari?", "ko": "알겠어요. 3D 영화는 Amazing Sea와 Jungle Safari 중 어떤 걸 보고 싶어요?", "audioUrl": "audio/117.mp3" },

       async function saveProgress(value) {
    maxUnlockedIndex = Math.min(value, db.length - 1);

    const { data, error } = await supabase.auth.getUser();
    if (error || !data.user) return;

    const userId = data.user.id;

    const { data: existingRow, error: fetchError } = await supabase
        .from('listening_progress')
        .select('user_id, max_index, reached_at, last_studied_at')
        .eq('user_id', userId)
        .maybeSingle();

    if (fetchError) {
        console.error('기존 진도 조회 실패:', fetchError);
        alert('기존 진도 조회 실패: ' + fetchError.message);
        return;
    }

    const existingMax = Number(existingRow?.max_index ?? -1);
    const now = new Date().toISOString();

    const payload = {
        user_id: userId,
        max_index: Number.isFinite(existingMax) ? Math.max(existingMax, maxUnlockedIndex) : maxUnlockedIndex,
        last_studied_at: now,
        reached_at: (!existingRow || existingMax < maxUnlockedIndex)
            ? now
            : existingRow.reached_at
    };

    const { error: progressError } = await supabase
        .from('listening_progress')
        .upsert(payload, {
            onConflict: 'user_id'
        });

    if (progressError) {
        console.error('listening_progress 저장 실패:', progressError);
        alert('진도 저장 실패: ' + progressError.message);
        return;
    }

    maxUnlockedIndex = payload.max_index;
}

        function shuffleWords(words) {
            const arr = [...words];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function clean(s) {
            return s
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function stopAudio(resetSource = false) {
            pendingAutoplay = false;
            try { audio.pause(); } catch (e) {}
            try { audio.currentTime = 0; } catch (e) {}
            playBtn.innerText = '🔊 듣기';
            if (resetSource) {
                try {
                    audio.removeAttribute('src');
                    audio.load();
                } catch (e) {}
            }
        }

        function setAudioSource(url) {
            stopAudio(false);
            audio.src = url;
            audio.load();
            audio.playbackRate = parseFloat(speedControl.value);
        }

        function safePlay(resetToStart = false) {
            if (!audio.src) return;
            if (resetToStart) {
                try { audio.currentTime = 0; } catch (e) {}
            }
            audio.playbackRate = parseFloat(speedControl.value);

            const doPlay = () => {
                const p = audio.play();
                if (p && typeof p.then === 'function') {
                    p.then(() => {
                        playBtn.innerText = '⏸ 중단';
                    }).catch(() => {
                        playBtn.innerText = '🔊 듣기';
                    });
                } else {
                    playBtn.innerText = '⏸ 중단';
                }
            };

            if (audio.readyState >= 2) {
                doPlay();
            } else {
                pendingAutoplay = true;
                audio.addEventListener('canplay', function onCanPlay() {
                    audio.removeEventListener('canplay', onCanPlay);
                    if (!pendingAutoplay) return;
                    pendingAutoplay = false;
                    doPlay();
                }, { once: true });
            }
        }

        function renderMenu() {
            stageGrid.innerHTML = '';
            const effectiveUnlockedIndex = Number.isFinite(FORCE_UNLOCK_INDEX)
                ? Math.max(maxUnlockedIndex, Math.min(FORCE_UNLOCK_INDEX - 1, db.length - 1))
                : maxUnlockedIndex;

            totalCountText.innerText = db.length;
            unlockedText.innerText = Math.min(effectiveUnlockedIndex + 1, db.length);

            for (let i = 0; i < db.length; i++) {
                const btn = document.createElement('button');
                const isUnlocked = i <= effectiveUnlockedIndex;
                btn.className = 'stage-btn ' + (isUnlocked ? 'stage-unlocked' : 'stage-locked');
                btn.innerText = isUnlocked ? String(i + 1) : '🔒';
                if (isUnlocked) {
                    btn.onclick = () => startGame(i, 1);
                }
                stageGrid.appendChild(btn);
            }
        }

        function showMenu() {
            stopAudio(true);
            modalOverlay.style.display = 'none';
            gameView.style.display = 'none';
            menuView.style.display = 'flex';
            progressBar.style.width = '0%';
            renderMenu();
        }

        function startGame(idx, step) {
            currentIndex = idx;
            currentStep = step;
            currentSentence = db[idx].en;
            currentMeaning = db[idx].ko;
            setAudioSource(db[idx].audioUrl);

            menuView.style.display = 'none';
            gameView.style.display = 'flex';
            progressText.innerText = (idx + 1) + '/' + db.length;
            progressBar.style.width = `${((idx + 1) / db.length) * 100}%`;

            meaningBox.style.display = (step >= 3) ? 'block' : 'none';
            meaningBox.innerText = currentMeaning;
            playBtn.style.visibility = (step >= 3) ? 'hidden' : 'visible';
            stepLabel.innerText = stepInfo[step];

            if (step === 1 || step === 3) {
                step1Area.style.display = 'flex';
                step2Area.style.display = 'none';
                answerArea.innerHTML = '';
                wordBank.innerHTML = '';
                shuffleWords(currentSentence.split(' ')).forEach((w) => {
                    const b = document.createElement('button');
                    b.className = 'word-btn';
                    b.innerText = w;
                    b.onclick = () => {
                        if (b.parentElement === wordBank) answerArea.appendChild(b);
                        else wordBank.appendChild(b);
                    };
                    wordBank.appendChild(b);
                });
            } else {
                step1Area.style.display = 'none';
                step2Area.style.display = 'block';
                typeInput.value = '';
                setTimeout(() => typeInput.focus(), 300);
            }

            if (step <= 2) {
                safePlay(true);
            } else {
                playBtn.innerText = '🔊 듣기';
            }
        }

        function openPopup(success) {
            modalOverlay.style.display = 'flex';

            if (success) {
                mTitle.innerText = '정답입니다!';
                mTitle.style.color = '#4caf50';
                mMsg.innerText = encouragement[currentStep];
                mYes.onclick = () => {
                    modalOverlay.style.display = 'none';
                    if (currentStep < 4) {
                        startGame(currentIndex, currentStep + 1);
                    } else if (currentIndex + 1 < db.length) {
                        if (currentIndex >= maxUnlockedIndex) {
                            saveProgress(currentIndex + 1);
                        }
                        startGame(currentIndex + 1, 1);
                    } else {
                        saveProgress(db.length - 1);
                        alert('모든 문장을 완료했습니다! 🎉');
                        showMenu();
                    }
                };
            } else {
                mTitle.innerText = '오답입니다';
                mTitle.style.color = '#f44336';
                mMsg.innerText = '다시 한 번 차근차근 확인해보세요!';
                mYes.onclick = () => {
                    modalOverlay.style.display = 'none';
                    if (currentStep <= 2) {
                        safePlay(true);
                    }
                };
            }
        }

        document.getElementById('checkBtn').onclick = () => {
            let isCorrect = false;

            if (currentStep === 1 || currentStep === 3) {
                const ans = Array.from(answerArea.children).map((b) => b.innerText).join(' ');
                isCorrect = (clean(ans) === clean(currentSentence));
            } else {
                isCorrect = (clean(typeInput.value) === clean(currentSentence));
            }

            openPopup(isCorrect);
        };

        playBtn.onclick = () => {
            audio.playbackRate = parseFloat(speedControl.value);
            if (audio.paused) {
                safePlay(false);
            } else {
                pendingAutoplay = false;
                audio.pause();
                playBtn.innerText = '🔊 듣기';
            }
        };

        speedControl.onchange = () => {
            audio.playbackRate = parseFloat(speedControl.value);
        };

        audio.onended = () => {
            playBtn.innerText = '🔊 듣기';
        };

        document.getElementById('backBtn').onclick = showMenu;
        mNo.onclick = showMenu;

        document.getElementById('resetProgressBtn').onclick = async () => {
            const pw = prompt('관리자 비밀번호를 입력하세요.');
            if (pw === null) return;
            if (pw !== ADMIN_PASSWORD) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            const user = await requireAuth();
if (!user) return;

const { data: profileData } = await supabase
    .from('profiles')
    .select('role')
    .eq('user_id', user.id)
    .maybeSingle();

if (profileData?.role) {
    role = profileData.role;
}

            const ok = confirm('현재 로그인한 계정의 듣기 학습 기록을 서버에서 초기화하시겠습니까?');
            if (!ok) return;

            const now = new Date().toISOString();
            const { error: resetError } = await supabase
                .from('listening_progress')
                .upsert({
                    user_id: user.id,
                    max_index: 0,
                    reached_at: now,
                    last_studied_at: now
                }, {
                    onConflict: 'user_id'
                });

            if (resetError) {
                console.error('듣기 진도 초기화 실패:', resetError);
                alert('초기화 실패: ' + resetError.message);
                return;
            }

            maxUnlockedIndex = 0;
            alert('서버 학습 기록 초기화가 완료되었습니다.');
            renderMenu();
        };

        homeBtn.onclick = () => {
    if (role === 'admin') location.href = 'admin.html';
    else location.href = 'class.html';
};

        logoutBtn.onclick = async () => {
            const ok = confirm('로그아웃하시겠습니까?');
            if (!ok) return;
            await supabase.auth.signOut();
            location.href = 'login.html';
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (modalOverlay.style.display === 'flex') mYes.click();
                else if (gameView.style.display === 'flex') document.getElementById('checkBtn').click();
            }
        });

        async function init() {
    const user = await requireAuth();
    if (!user) return;

    const { data: serverProgress, error: serverError } = await supabase
        .from('listening_progress')
        .select('max_index')
        .eq('user_id', user.id)
        .maybeSingle();

    if (serverError) {
        console.error('서버 듣기 진도 조회 실패:', serverError);
        maxUnlockedIndex = 0;
    } else {
        const serverMax = Number(serverProgress?.max_index ?? 0);
        maxUnlockedIndex = Number.isFinite(serverMax) && serverMax >= 0 ? serverMax : 0;
    }

    renderMenu();
}

        init();


// 입력창 복사/붙여넣기 및 부정한 조작 차단
const typeInput = document.getElementById('typeInput');

typeInput.addEventListener('paste', (e) => {
    e.preventDefault();
    alert('직접 듣고 타이핑해야 학습 효과가 좋습니다! (붙여넣기 금지)');
});

// 2. 복사 금지 (입력한 내용을 다음 문제에 쓰지 못하게)
typeInput.addEventListener('copy', (e) => {
    e.preventDefault();
});

// 3. 잘라내기 금지
typeInput.addEventListener('cut', (e) => {
    e.preventDefault();
});

// 4. 마우스 우클릭 메뉴 금지
typeInput.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});

// 5. 텍스트 드래그해서 끌어다 놓기 금지
typeInput.addEventListener('drop', (e) => {
    e.preventDefault();
});
        
    </script>
