<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening Academy</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root{
            --bg:#f4f7fb;
            --card:#ffffff;
            --line:#e5e7eb;
            --text:#1f2937;
            --muted:#6b7280;
            --blue:#4f8cff;
            --green:#4caf50;
            --orange:#ff9800;
            --slate:#607d8b;
            --shadow:0 10px 30px rgba(15, 23, 42, 0.08);
        }

        html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#eff5ff 0%,#f4f7fb 35%,#eef8f1 100%);
    color: var(--text);
    user-select: none;
    overflow-y: auto;   /* ✅ 스크롤 허용 */
    overflow-x: hidden; /* 가로 스크롤만 막기 */
}

        body{
            display:flex;
            flex-direction:column;
        }

        .wrap{
            width:100%;
            max-width:1100px;
            margin:0 auto;
            padding:20px;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            min-height:0;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }

        .title-box h1{
            margin:0;
            font-size:30px;
            font-weight:800;
            letter-spacing:-0.02em;
        }

        .title-box p{
            margin:8px 0 0;
            color:var(--muted);
            font-size:14px;
            line-height:1.5;
        }

        .btns{
            display:flex;
            gap:8px;
            flex-wrap:wrap;
        }

        button, select, .btn{
            border:none;
            border-radius:14px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
        }

        button:hover, .btn:hover{
            opacity:.96;
            box-shadow:0 8px 18px rgba(0,0,0,.08);
        }

        button:active, .btn:active{
            transform:translateY(1px);
        }

        .btn-blue{ background:var(--blue); color:#fff; padding:11px 16px; }
        .btn-green{ background:var(--green); color:#fff; padding:11px 16px; }
        .btn-orange{ background:var(--orange); color:#fff; padding:11px 16px; }
        .btn-slate{ background:var(--slate); color:#fff; padding:11px 16px; }
        .btn-light{
            background:#fff;
            color:#334155;
            border:1px solid var(--line);
            padding:11px 16px;
        }

        .summary-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(190px,1fr));
            gap:12px;
            margin-bottom:18px;
        }

        .summary-card, .panel{
            background:var(--card);
            border-radius:24px;
            box-shadow:var(--shadow);
        }

        .summary-card{ padding:18px; }
        .summary-card .label{
            color:var(--muted);
            font-size:13px;
            margin-bottom:8px;
        }
        .summary-card .value{
            font-size:28px;
            font-weight:800;
        }

        .panel{
            padding:18px;
            margin-bottom:18px;
            min-height:0;
        }

        .panel-head{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
            flex-wrap:wrap;
        }

        .panel-head h2{
            margin:0;
            font-size:20px;
        }

        .panel-head p{
            margin:6px 0 0;
            color:var(--muted);
            font-size:13px;
            line-height:1.5;
        }

        #menuView{
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:0;
            overflow-y:auto;
        }

        .grid-container{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
            gap:12px;
        }

        .stage-btn{
            aspect-ratio:1;
            font-size:18px;
            border-radius:18px;
            border:none;
            font-weight:800;
            cursor:pointer;
            transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
        }

        .stage-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 14px 28px rgba(15,23,42,.08);
        }

        .stage-unlocked{
            background:linear-gradient(180deg,#5aa6ff 0%, #4f8cff 100%);
            color:white;
        }

        .stage-locked{
            background:#e5e7eb;
            color:#9ca3af;
        }

        .reset-btn{
            margin-top:12px;
            width:100%;
            padding:10px;
            font-size:12px;
            color:#ef4444;
            background:none;
            border:none;
            text-decoration:underline;
            cursor:pointer;
        }

        .guide-box{
            margin-top:12px;
            padding:14px;
            background:#fff;
            border-radius:18px;
            font-size:13px;
            color:#555;
            line-height:1.6;
            border:1px solid var(--line);
        }

        #gameView{
    display:none;
    flex-direction:column;
    min-height:0;
    flex:1;
    overflow-y:auto; /* ✅ 게임 화면도 스크롤 가능 */
}

        .quiz-head{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:14px;
        }

        .progress-pill{
            display:inline-flex;
            align-items:center;
            gap:8px;
            background:#eef4ff;
            color:#2f5da8;
            border-radius:999px;
            padding:8px 12px;
            font-size:13px;
            font-weight:700;
        }

        .progress-bar-wrap{
            width:100%;
            height:10px;
            background:#e5e7eb;
            border-radius:999px;
            overflow:hidden;
            margin-bottom:18px;
        }

        .progress-bar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#4f8cff,#6fcf97);
            transition:width .2s ease;
        }

        .control-row{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-bottom:14px;
        }

        #playBtn{
            min-width:140px;
            background:var(--orange);
            color:#fff;
            padding:13px 18px;
        }

        #speedControl{
            min-width:110px;
            padding:0 12px;
            height:46px;
            border:1px solid var(--line);
            background:#fff;
            color:var(--text);
            outline:none;
        }

        #checkBtn{
            min-width:140px;
            background:var(--green);
            color:#fff;
            padding:13px 18px;
            margin-left:auto;
        }

        .question-card{
            background:linear-gradient(180deg,#fff 0%,#fafcff 100%);
            border:1px solid var(--line);
            border-radius:22px;
            padding:22px;
            margin-bottom:16px;
            min-height:0;
        }

        #stepLabel{
            display:inline-block;
            padding:7px 12px;
            border-radius:999px;
            background:#fff4e8;
            color:#f97316;
            font-size:12px;
            font-weight:800;
            margin-bottom:14px;
        }

        #meaningBox{
            padding:14px 16px;
            background:#eef6ff;
            border:1px solid #cfe1ff;
            border-radius:16px;
            text-align:center;
            font-weight:700;
            font-size:15px;
            color:#1565c0;
            display:none;
            line-height:1.5;
            margin-bottom:14px;
        }

        #contentArea{
            display:flex;
            flex-direction:column;
            min-height:0;
        }

        #step1Area{
            display:flex;
            flex-direction:column;
            gap:12px;
            min-height:0;
        }

        .drop-zone{
            min-height:120px;
            border:2px dashed #93c5fd;
            border-radius:18px;
            background:#fff;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            padding:14px;
            align-content:flex-start;
            justify-content:center;
        }

        .word-bank{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            justify-content:center;
            align-content:flex-start;
            padding-top:4px;
        }

        .word-btn{
            padding:10px 14px;
            font-size:14px;
            border-radius:12px;
            background:#4f8cff;
            color:white;
            border:none;
            font-weight:800;
            box-shadow:0 4px 10px rgba(79,140,255,.25);
            cursor:pointer;
        }

        #step2Area{
            display:none;
            padding-top:4px;
        }

        .type-input{
            width:100%;
            min-height:64px;
            padding:14px 16px;
            font-size:18px;
            border:2px solid #bfdbfe;
            border-radius:18px;
            outline:none;
            background:#fff;
            color:var(--text);
        }

        .type-input:focus{
            border-color:#4f8cff;
            box-shadow:0 0 0 4px rgba(79,140,255,.12);
        }

        #modalOverlay{
            position:fixed;
            inset:0;
            background:rgba(15,23,42,.56);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:2000;
            padding:20px;
        }

        .modal-content{
            background:#fff;
            border-radius:24px;
            padding:24px;
            width:min(92vw, 360px);
            text-align:center;
            box-shadow:0 24px 60px rgba(15,23,42,.18);
        }

        .m-btn{
            width:100%;
            padding:15px;
            margin-top:10px;
            border-radius:14px;
            border:none;
            font-weight:800;
            font-size:16px;
            cursor:pointer;
        }

        @media (max-width:640px){
            .wrap{ padding:12px; }
            .title-box h1{ font-size:25px; }
            .summary-card .value{ font-size:24px; }
            .panel{ padding:14px; }
            .question-card{ padding:14px; }
            .grid-container{ grid-template-columns:repeat(4, minmax(0, 1fr)); }
            .quiz-head{ margin-bottom:10px; }
            .progress-bar-wrap{ margin-bottom:12px; }
            .control-row{
                display:grid;
                grid-template-columns:1.15fr .85fr 1fr;
                gap:8px;
                margin-bottom:10px;
            }
            #playBtn, #speedControl, #checkBtn{
                width:100%;
                min-width:0;
                margin-left:0;
                height:40px;
                padding:0 10px;
                font-size:13px;
                border-radius:12px;
            }
            #progressText{
                padding:6px 10px;
                font-size:12px;
            }
            #stepLabel{
                margin-bottom:10px;
                padding:6px 10px;
                font-size:11px;
            }
            #meaningBox{
                margin-bottom:10px;
                padding:12px;
                font-size:14px;
            }
            .drop-zone{
                min-height:90px;
                padding:10px;
                gap:8px;
            }
            .word-bank{
                gap:8px;
                padding-top:0;
            }
            .word-btn{
                padding:8px 10px;
                font-size:13px;
                border-radius:10px;
            }
            .type-input{
                min-height:56px;
                padding:12px 14px;
                font-size:16px;
                border-radius:14px;
            }
        }
    </style>

</head>

    <div class="wrap">

                    </div>
                </div>

                <div id="stageGrid" class="grid-container"></div>

            </div>
        </div>

        <div id="gameView">

                        <div class="progress-pill" id="progressText">1/177</div>
                         
                    </div>
                    <div class="btns">
                        <button class="btn-light" id="backBtn" type="button">목차</button>
                    </div>
                </div>

                <div class="progress-bar-wrap">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div class="control-row">
                    <button id="playBtn" class="btn" type="button">🔊 듣기</button>

                    <select id="speedControl" aria-label="재생 속도">
                        <option value="0.8">0.8x</option>
                        <option value="1.0" selected>1.0x</option>
                        <option value="1.2">1.2x</option>

                    <button id="checkBtn" class="btn" type="button">제출</button>

                <div class="question-card">

                    <div id="meaningBox">한글 뜻 표시 영역</div>

                    <div id="contentArea">

                            <div id="answerArea" class="drop-zone"></div>
                            <div id="wordBank" class="word-bank"></div>
                        </div>

                        <div id="step2Area">
                            <input
                                type="text"
                                id="typeInput"
                                class="type-input"
                                placeholder="문장을 입력하세요..."
                                autocomplete="off"
                                autocorrect="off"
                                autocapitalize="off"
                                spellcheck="false"
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay">

            <h3 id="mTitle" style="margin:0 0 10px 0;">결과</h3>
            <p id="mMsg" style="margin:0 0 20px 0; line-height:1.5;"></p>
            <button class="m-btn" id="mYes" style="background:#4caf50; color:white;" type="button">확인 (Enter)</button>
            <button class="m-btn" id="mNo" style="background:#eee; color:#333;" type="button">목록으로</button>
        </div>
    </div>

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://uuzhdxangctewuklvmlv.supabase.co',
  'sb_publishable_vv0I9z-5PnmOabrpVspufQ_ABmB_F-F'
);

let me = null;
let role = 'student';

async function requireAuth() {
    const { data, error } = await supabase.auth.getUser();
    if (error || !data.user) {
        alert('로그인이 필요합니다.');
        location.href = 'login.html';
        return null;
    }

    me = data.user;

    const { data: profileData } = await supabase
        .from('profiles')
        .select('user_id, name, role')
        .eq('user_id', me.id)
        .maybeSingle();

    if (profileData?.role) {
        role = profileData.role;
    }

    return data.user;
}

       async function saveProgress(value) {
    maxUnlockedIndex = Math.min(value, db.length - 1);

    const { data, error } = await supabase.auth.getUser();
    if (error || !data.user) return;

    const userId = data.user.id;

    const { data: existingRow, error: fetchError } = await supabase
        .from('listening_progress')
        .select('user_id, max_index, reached_at, last_studied_at')
        .eq('user_id', userId)
        .maybeSingle();

    if (fetchError) {
        console.error('기존 진도 조회 실패:', fetchError);
        alert('기존 진도 조회 실패: ' + fetchError.message);
        return;
    }

    const existingMax = Number(existingRow?.max_index ?? -1);
    const now = new Date().toISOString();

    const payload = {
        user_id: userId,
        max_index: Number.isFinite(existingMax) ? Math.max(existingMax, maxUnlockedIndex) : maxUnlockedIndex,
        last_studied_at: now,
        reached_at: (!existingRow || existingMax < maxUnlockedIndex)
            ? now
            : existingRow.reached_at
    };

    const { error: progressError } = await supabase
        .from('listening_progress')
        .upsert(payload, {
            onConflict: 'user_id'
        });

    if (progressError) {
        console.error('listening_progress 저장 실패:', progressError);
        alert('진도 저장 실패: ' + progressError.message);
        return;
    }

    maxUnlockedIndex = payload.max_index;
}

        function shuffleWords(words) {
            const arr = [...words];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function clean(s) {
            return s
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function stopAudio(resetSource = false) {
            pendingAutoplay = false;
            try { audio.pause(); } catch (e) {}
            try { audio.currentTime = 0; } catch (e) {}
            playBtn.innerText = '🔊 듣기';
            if (resetSource) {
                try {
                    audio.removeAttribute('src');
                    audio.load();
                } catch (e) {}
            }
        }

        function setAudioSource(url) {
            stopAudio(false);
            audio.src = url;
            audio.load();
            audio.playbackRate = parseFloat(speedControl.value);
        }

        function safePlay(resetToStart = false) {
            if (!audio.src) return;
            if (resetToStart) {
                try { audio.currentTime = 0; } catch (e) {}
            }
            audio.playbackRate = parseFloat(speedControl.value);

            const doPlay = () => {
                const p = audio.play();
                if (p && typeof p.then === 'function') {
                    p.then(() => {
                        playBtn.innerText = '⏸ 중단';
                    }).catch(() => {
                        playBtn.innerText = '🔊 듣기';
                    });
                } else {
                    playBtn.innerText = '⏸ 중단';
                }
            };

            if (audio.readyState >= 2) {
                doPlay();
            } else {
                pendingAutoplay = true;
                audio.addEventListener('canplay', function onCanPlay() {
                    audio.removeEventListener('canplay', onCanPlay);
                    if (!pendingAutoplay) return;
                    pendingAutoplay = false;
                    doPlay();
                }, { once: true });
            }
        }

        function renderMenu() {
            stageGrid.innerHTML = '';
            const effectiveUnlockedIndex = Number.isFinite(FORCE_UNLOCK_INDEX)
                ? Math.max(maxUnlockedIndex, Math.min(FORCE_UNLOCK_INDEX - 1, db.length - 1))
                : maxUnlockedIndex;

            totalCountText.innerText = db.length;
            unlockedText.innerText = Math.min(effectiveUnlockedIndex + 1, db.length);

            for (let i = 0; i < db.length; i++) {
                const btn = document.createElement('button');
                const isUnlocked = i <= effectiveUnlockedIndex;
                btn.className = 'stage-btn ' + (isUnlocked ? 'stage-unlocked' : 'stage-locked');
                btn.innerText = isUnlocked ? String(i + 1) : '🔒';
                if (isUnlocked) {
                    btn.onclick = () => startGame(i, 1);
                }
                stageGrid.appendChild(btn);
            }
        }

        function showMenu() {
            stopAudio(true);
            modalOverlay.style.display = 'none';
            gameView.style.display = 'none';
            menuView.style.display = 'flex';
            progressBar.style.width = '0%';
            renderMenu();
        }

        function startGame(idx, step) {
            currentIndex = idx;
            currentStep = step;
            currentSentence = db[idx].en;
            currentMeaning = db[idx].ko;
            setAudioSource(db[idx].audioUrl);

            menuView.style.display = 'none';
            gameView.style.display = 'flex';
            progressText.innerText = (idx + 1) + '/' + db.length;
            progressBar.style.width = `${((idx + 1) / db.length) * 100}%`;

            meaningBox.style.display = (step >= 3) ? 'block' : 'none';
            meaningBox.innerText = currentMeaning;
            playBtn.style.visibility = (step >= 3) ? 'hidden' : 'visible';
            stepLabel.innerText = stepInfo[step];

            if (step === 1 || step === 3) {
                step1Area.style.display = 'flex';
                step2Area.style.display = 'none';
                answerArea.innerHTML = '';
                wordBank.innerHTML = '';
                shuffleWords(currentSentence.split(' ')).forEach((w) => {
                    const b = document.createElement('button');
                    b.className = 'word-btn';
                    b.innerText = w;
                    b.onclick = () => {
                        if (b.parentElement === wordBank) answerArea.appendChild(b);
                        else wordBank.appendChild(b);
                    };
                    wordBank.appendChild(b);
                });
            } else {
                step1Area.style.display = 'none';
                step2Area.style.display = 'block';
                typeInput.value = '';
                setTimeout(() => typeInput.focus(), 300);
            }

            if (step <= 2) {
                safePlay(true);
            } else {
                playBtn.innerText = '🔊 듣기';
            }
        }

        function openPopup(success) {
            modalOverlay.style.display = 'flex';

            if (success) {
                mTitle.innerText = '정답입니다!';
                mTitle.style.color = '#4caf50';
                mMsg.innerText = encouragement[currentStep];
                mYes.onclick = () => {
                    modalOverlay.style.display = 'none';
                    if (currentStep < 4) {
                        startGame(currentIndex, currentStep + 1);
                    } else if (currentIndex + 1 < db.length) {
                        if (currentIndex >= maxUnlockedIndex) {
                            saveProgress(currentIndex + 1);
                        }
                        startGame(currentIndex + 1, 1);
                    } else {
                        saveProgress(db.length - 1);
                        alert('모든 문장을 완료했습니다! 🎉');
                        showMenu();
                    }
                };
            } else {
                mTitle.innerText = '오답입니다';
                mTitle.style.color = '#f44336';
                mMsg.innerText = '다시 한 번 차근차근 확인해보세요!';
                mYes.onclick = () => {
                    modalOverlay.style.display = 'none';
                    if (currentStep <= 2) {
                        safePlay(true);
                    }
                };
            }
        }

        document.getElementById('checkBtn').onclick = () => {
            let isCorrect = false;

            if (currentStep === 1 || currentStep === 3) {
                const ans = Array.from(answerArea.children).map((b) => b.innerText).join(' ');
                isCorrect = (clean(ans) === clean(currentSentence));
            } else {
                isCorrect = (clean(typeInput.value) === clean(currentSentence));
            }

            openPopup(isCorrect);
        };

        playBtn.onclick = () => {

        async function init() {
    const user = await requireAuth();
    if (!user) return;

    const { data: serverProgress, error: serverError } = await supabase
        .from('listening_progress')
        .select('max_index')
        .eq('user_id', user.id)
        .maybeSingle();

    if (serverError) {
        console.error('서버 듣기 진도 조회 실패:', serverError);
        maxUnlockedIndex = 0;
    } else {
        const serverMax = Number(serverProgress?.max_index ?? 0);
        maxUnlockedIndex = Number.isFinite(serverMax) && serverMax >= 0 ? serverMax : 0;
    }

    renderMenu();
}
