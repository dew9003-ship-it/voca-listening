<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listening Academy - 보카엔딩</title>
    
    <link rel="stylesheet" href="global.css">
    <style>
        /* [기존 UI 스타일 유지] */
        .progress-pill { display:inline-flex; align-items:center; background:#eef4ff; color:#2f5da8; border-radius:999px; padding:6px 14px; font-size:13px; font-weight:700; }
        .link-back { color: #64748b; text-decoration: none; font-size: 13px; font-weight: 800; padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; transition: 0.2s; }
        
        .progress-bar-wrap { width: 100%; height: 12px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 15px 0 20px 0; }
        .progress-bar { height: 100%; width: 0%; background: #448aff; transition: width 0.4s ease; }

        .control-row { display:flex; gap:8px; margin-bottom:15px; }
        #playBtn, #checkBtn { border:none; border-radius:12px; padding:12px; font-weight:800; font-size:16px; cursor:pointer; transition: all 0.2s ease; outline:none; }
        
        #playBtn { flex:1.2; background:#ff9800; color:#fff; min-width: 100px; }
        #playBtn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        #playBtn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; transform: none; }

        #checkBtn { flex:1.2; background:#4caf50; color:#fff; }
        #checkBtn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        #speedControl { flex:0.8; border:1.5px solid #cbd5e1; border-radius:12px; padding:0 8px; font-weight:800; outline:none; background:#fff; text-align:center; font-size:15px; }

        .question-card { background:#fff; border:1px solid #e5e7eb; border-radius:24px; padding:22px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #stepLabel { display:inline-block; padding:5px 12px; border-radius:8px; background:#fff4e8; color:#f97316; font-size:12px; font-weight:800; margin-bottom:12px; }
        #meaningBox { padding:18px; background:#eef6ff; border:1px solid #cfe1ff; border-radius:16px; text-align:center; font-weight:800; font-size:17px; color:#1565c0; margin-bottom:15px; }

        .drop-zone { min-height:120px; border:2px dashed #93c5fd; border-radius:18px; display:flex; flex-wrap:wrap; gap:10px; padding:14px; margin-bottom:15px; background:#fff; align-content: flex-start; }
        .word-bank { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
        .word-btn { padding:11px 16px; font-size:15px; border-radius:10px; background:#448aff; color:#fff; border:none; font-weight:800; cursor:pointer; box-shadow: 0 4px 10px rgba(68,138,255,0.3); transition: all 0.2s ease; }
        .word-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 18px rgba(68,138,255,0.4); }

        .type-input { width:100%; min-height:80px; padding:15px; font-size:18px; border:2px solid #bfdbfe; border-radius:18px; outline:none; resize:none; font-family:inherit; overflow:hidden; }

        .grid-container { display:grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap:12px; }
        .stage-btn { aspect-ratio:1; border-radius:15px; border:none; font-weight:800; font-size:18px; cursor:pointer; transition: all 0.2s ease; }
        .stage-completed { background: #4caf50; color: #fff; }
        .stage-current { background: #448aff; color: #fff; box-shadow: 0 4px 12px rgba(68,138,255,0.3); }
        .stage-locked { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }

        @media (max-width: 640px) {
            .grid-container { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
            .stage-btn { font-size: 16px !important; border-radius: 12px !important; }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div id="menuView">
            <div class="unit-grid" style="margin-bottom:20px;">
                <div class="unit-card" style="min-height:90px; padding:18px;"><span class="badge">TOTAL</span><div class="unit-title" id="totalCountText">-</div></div>
                <div class="unit-card" style="min-height:90px; padding:18px;"><span class="badge">UNLOCKED</span><div class="unit-title" id="unlockedText">1</div></div>
            </div>
            <div class="panel" style="background:#fff; padding:25px; border-radius:24px; border:1px solid #e5e7eb;">
                <h2 style="margin:0 0 15px 0; font-size:20px; font-weight:800;">학습 목차</h2>
                <div id="stageGrid" class="grid-container"></div>
                <button id="resetProgressBtn" style="margin-top:25px; width:100%; background:none; border:none; color:#94a3b8; text-decoration:underline; font-size:12px; cursor:pointer;">학습 기록 초기화</button>
            </div>
        </div>

        <div id="gameView" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <div class="progress-pill" id="progressText">1 / 179</div>
                <a href="javascript:void(0)" onclick="location.reload()" class="link-back">목차로 돌아가기</a>
            </div>
            <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
            <div class="control-row">
                <button id="playBtn">🔊 듣기</button>
                <select id="speedControl">
                    <option value="0.8">0.8x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.2">1.2x</option>
                </select>
                <button id="checkBtn">제출</button>
            </div>
            <div class="question-card">
                <div id="stepLabel">Step 1</div>
                <div id="meaningBox" style="display:none;"></div>
                <div id="contentArea">
                    <div id="step1Area">
                        <div id="answerArea" class="drop-zone"></div>
                        <div id="wordBank" class="word-bank"></div>
                    </div>
                    <div id="step2Area" style="display:none;">
                        <textarea id="typeInput" class="type-input" placeholder="입력하세요..." spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, initHeader, showAlert, initSecurity } from './global.js';
        import { db } from './data-listening.js';

        let maxUnlockedIndex = 0;
        let currentIndex = 0;
        let currentStep = 1;
        let currentSentence = '';
        const audio = new Audio();

        const menuView = document.getElementById('menuView');
        const gameView = document.getElementById('gameView');
        const stageGrid = document.getElementById('stageGrid');
        const typeInput = document.getElementById('typeInput');
        const meaningBox = document.getElementById('meaningBox');
        const progressBar = document.getElementById('progressBar');
        const playBtn = document.getElementById('playBtn');

        async function init() {
            await initHeader('듣기 학습관');
            initSecurity(typeInput);
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { location.href = 'login.html'; return; }
            const { data } = await supabase.from('listening_progress').select('max_index').eq('user_id', user.id).maybeSingle();
            maxUnlockedIndex = data?.max_index || 0;
            renderMenu();
        }

        // [긴급 수정] 데이터베이스 구조에 맞게 저장 로직 복구
async function saveProgress(value) {
    try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return false;

        const userId = user.id;
        const now = new Date().toISOString();
        const newMaxVal = Math.max(maxUnlockedIndex, value);

        // 1. 기존 데이터 조회 (reached_at 컬럼 유지를 위해 필요)
        const { data: existingRow, error: fetchError } = await supabase
            .from('listening_progress')
            .select('max_index, reached_at')
            .eq('user_id', userId)
            .maybeSingle();

        if (fetchError) {
            console.error("기존 진도 조회 실패:", fetchError);
            return false;
        }

        const existingMax = existingRow ? Number(existingRow.max_index) : -1;

        // 2. 저장할 데이터 구성 (기존 테이블 컬럼명 정확히 일치)
        const payload = {
            user_id: userId,
            max_index: Math.max(existingMax, newMaxVal),
            last_studied_at: now,
            reached_at: (!existingRow || existingMax < newMaxVal) ? now : existingRow.reached_at
        };

        // 3. 서버 저장 (onConflict 옵션을 명시해야 서버에서 허용함)
        const { error: upsertError } = await supabase
            .from('listening_progress')
            .upsert(payload, { onConflict: 'user_id' });

        if (upsertError) {
            console.error("Upsert 오류:", upsertError);
            return false;
        }

        maxUnlockedIndex = payload.max_index;
        return true;
    } catch (err) {
        console.error("예상치 못한 오류:", err);
        return false;
    }
}
        function renderMenu() {
            stageGrid.innerHTML = '';
            document.getElementById('totalCountText').innerText = db.length;
            document.getElementById('unlockedText').innerText = maxUnlockedIndex + 1;
            for (let i = 0; i < db.length; i++) {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                if (i < maxUnlockedIndex) { btn.className = 'stage-btn stage-completed'; btn.onclick = () => startGame(i, 1); }
                else if (i === maxUnlockedIndex) { btn.className = 'stage-btn stage-current'; btn.onclick = () => startGame(i, 1); }
                else { btn.className = 'stage-btn stage-locked'; btn.innerText = '🔒'; }
                stageGrid.appendChild(btn);
            }
        }

        function startGame(idx, step) {
            currentIndex = idx; currentStep = step;
            currentSentence = db[idx].en;
            menuView.style.display = 'none';
            gameView.style.display = 'block';
            document.getElementById('progressText').innerText = `${idx + 1} / ${db.length}`;
            progressBar.style.width = ((idx + 1) / db.length * 100) + '%';
            meaningBox.innerText = db[idx].ko;
            const labels = ["", "Step 1. 듣고 배열하기", "Step 2. 듣고 타이핑하기", "Step 3. 뜻 보고 배열하기 (영작)", "Step 4. 뜻 보고 타이핑하기 (영작)"];
            document.getElementById('stepLabel').innerText = labels[step];
            
            meaningBox.style.display = (step >= 3) ? 'block' : 'none';
            playBtn.disabled = (step >= 3);
            
            const isTyping = (step === 2 || step === 4);
            document.getElementById('step1Area').style.display = isTyping ? 'none' : 'block';
            document.getElementById('step2Area').style.display = isTyping ? 'block' : 'none';
            if (!isTyping) renderWords();
            else { typeInput.value = ''; setTimeout(() => typeInput.focus(), 200); }
            
            audio.src = db[idx].audioUrl;
            playBtn.innerHTML = '🔊 듣기';
            if(step <= 2) toggleAudio(true);
        }

        function renderWords() {
            const answerArea = document.getElementById('answerArea');
            const wordBank = document.getElementById('wordBank');
            answerArea.innerHTML = ''; wordBank.innerHTML = '';
            const words = [...currentSentence.split(' ')].sort(() => Math.random() - 0.5);
            words.forEach(w => {
                const b = document.createElement('button');
                b.className = 'word-btn'; b.innerText = w;
                b.onclick = () => { if (b.parentElement === wordBank) answerArea.appendChild(b); else wordBank.appendChild(b); };
                wordBank.appendChild(b);
            });
        }

        async function checkAnswer() {
            let userAns = (currentStep === 1 || currentStep === 3) 
                ? Array.from(document.getElementById('answerArea').children).map(b => b.innerText).join(' ')
                : typeInput.value.trim();
            const clean = (s) => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
            
            if (clean(userAns) === clean(currentSentence)) {
                audio.pause();
                if (currentStep < 4) {
                    showAlert('정답입니다!', '다음 단계로 진행합니다.', false, () => startGame(currentIndex, currentStep + 1));
                } else {
                    // [핵심] 저장 시도 및 결과 확인
                    const isSaved = await saveProgress(currentIndex + 1);
                    if (isSaved) {
                        showAlert('성공!', '미션 완료!', false, () => {
                            if (currentIndex + 1 < db.length) startGame(currentIndex + 1, 1);
                            else location.reload();
                        });
                    } else {
                        // 저장 실패 시: 사용자를 붙잡아두고 재시도 버튼 제공
                        showAlert('저장 실패', '서버에 진도를 저장하지 못했습니다. 다시 시도할까요?', true, () => checkAnswer());
                    }
                }
            } else showAlert('오답', '다시 확인해 보세요.', true);
        }

        function toggleAudio(forcePlay = false) {
            if (currentStep >= 3) return;
            audio.playbackRate = parseFloat(document.getElementById('speedControl').value);
            if (forcePlay || audio.paused) { audio.play().catch(e => {}); playBtn.innerHTML = '⏸ 중단'; }
            else { audio.pause(); playBtn.innerHTML = '🔊 듣기'; }
        }

        audio.onended = () => { playBtn.innerHTML = '🔊 듣기'; };
        playBtn.onclick = () => toggleAudio();
        document.getElementById('checkBtn').onclick = checkAnswer;
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const modal = document.getElementById('globalModal');
                if (modal && modal.style.display === 'flex') { e.preventDefault(); document.getElementById('gYes').click(); }
                else if (gameView.style.display === 'block') { e.preventDefault(); checkAnswer(); }
            }
        });

        init();
    </script>
</body>
</html>
